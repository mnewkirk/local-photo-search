# ============================================================================
# local-photo-search — Docker Compose
#
# Services:
#   photosearch — the main app: web UI + CLI for indexing/searching
#   ollama      — OPT-IN LLaVA model server (profile: ollama; see below)
#
# Quick start:
#   1. Copy .env.example to .env and set PHOTO_DIR to your library path
#   2. docker compose up -d
#   3. Open http://localhost:8000
#
# LLM passes (describe / category-* / keywords / verify / aesthetics) need a
# model backend. Point OLLAMA_HOST at a native Ollama, or set
# PHOTOSEARCH_TEXT_LLM_URL to an OpenAI-compatible endpoint (LM Studio) — see
# CLAUDE.md. Only if you want the containerized Ollama, opt in explicitly:
#   docker compose --profile ollama up -d
#   docker compose --profile ollama exec ollama ollama pull llava:13b
#
# To index photos (first time or after adding new photos):
#   docker compose run --rm photosearch index /photos --faces --describe
#
# To index without Ollama (CLIP + faces only, no descriptions):
#   docker compose run --rm photosearch index /photos --faces --no-colors
#
# On a UGREEN NAS, PHOTO_DIR might be /volume1/photos or similar.
# ============================================================================

services:
  photosearch:
    build: .
    container_name: photosearch
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8000}:8000"
    volumes:
      # Your photo library — mounted read-only for safety
      - ${PHOTO_DIR:?Set PHOTO_DIR in .env}:/photos:ro
      # Persistent data: database, thumbnails, model cache
      - photosearch-data:/data
    environment:
      - PHOTOSEARCH_DB=/data/photo_index.db
      - OLLAMA_HOST=http://ollama:11434
      - INSIGHTFACE_HOME=/data/.insightface
      - PYTHONUNBUFFERED=1
      - PHOTOSEARCH_CACHE=/data/.cache/photosearch
    # Default: run the web UI
    # Override with: docker compose run --rm photosearch index /photos
    command: ["serve"]

  ollama:
    # OPT-IN. Behind a compose profile, so a plain `docker compose up` does NOT
    # start it — the LLM passes route to LM Studio (PHOTOSEARCH_TEXT_LLM_URL)
    # or to a native Ollama on the host, and this container was left running
    # idle either way. Start it explicitly when you want the containerized one:
    #   docker compose --profile ollama up -d
    # The photosearch service deliberately has no depends_on here: with the
    # profile off, a hard dependency would fail the whole `up`.
    profiles: ["ollama"]
    image: ollama/ollama:latest
    container_name: photosearch-ollama
    restart: unless-stopped
    volumes:
      # Persist downloaded models (LLaVA ~4.7 GB + minicpm-v ~5 GB)
      - ollama-models:/root/.ollama
    # No ports exposed by default — only the photosearch container needs access.
    # Uncomment to access Ollama directly from the host:
    # ports:
    #   - "11434:11434"

    # Resource limits — tune for your NAS hardware.
    # LLaVA 13B needs ~10 GB RAM; 7B needs ~5 GB.
    # On a UGREEN with 16 GB RAM, these defaults work well.
    # deploy:
    #   resources:
    #     limits:
    #       memory: 12G

volumes:
  photosearch-data:
    driver: local
  ollama-models:
    driver: local
