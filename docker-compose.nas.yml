# ============================================================================
# local-photo-search — UGREEN NAS deployment
#
# This compose file deploys these containers:
#   photosearch — web UI + indexing engine (port 8000)
#   photosearch-mcp — MCP server (port 8848)
#   ollama      — LLaVA model server for scene descriptions
#   syncthing   — receives phone camera-roll uploads into _incoming/
#
# Remote access is via **host-level Tailscale on the NAS** (node DXP4800-F976).
# The old in-compose `tailscale` sidecar was removed 2026-07-03 — it shared the
# photosearch netns and could only expose :8000, not host ssh/smb, and its netns
# coupling made restarts fragile. The host tailnet IP serves the published :8000.
#
# Quick start (see NAS_SETUP.md for full walkthrough):
#   1. Copy .env.example to .env and set PHOTO_DIR
#   2. docker compose -f docker-compose.nas.yml up -d
#   3. Access at http://<nas-tailscale-ip>:8000 from your tailnet
#
# First-time model setup:
#   docker compose -f docker-compose.nas.yml exec ollama ollama pull llava
#   docker compose -f docker-compose.nas.yml exec ollama ollama pull minicpm-v
#
# Index photos:
#   docker compose -f docker-compose.nas.yml run --rm photosearch \
#       index /photos --faces --describe --quality
# ============================================================================

# Pinning the project name here makes compose recognize existing containers
# regardless of where the invocation is run from. Without this, the deploy
# panel (running inside the container with -f /repo/docker-compose.nas.yml)
# would derive project=`repo` from the compose-file parent dir, while a NAS-
# shell run from /volume1/docker/photosearch derives project=`photosearch` —
# leading to name conflicts on the explicit container_name fields.
name: photosearch

services:
  photosearch:
    build:
      context: .
      args:
        # Set by the /status deploy panel when it triggers a rebuild, so
        # /api/admin/version can report which commit the running image holds.
        # Manual builds can pass via:
        #   GIT_SHA=$(git rev-parse HEAD) docker compose build photosearch
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: photosearch
    restart: unless-stopped
    ports:
      # Expose on LAN for local access — Tailscale handles remote access
      - "${WEB_PORT:-8000}:8000"
    volumes:
      # rw so ingest-incoming can move files from /photos/_incoming/<source>/
      # into the year/date library tree. Docker-sock is already mounted, so
      # ro on this volume wasn't buying meaningful isolation.
      - ${PHOTO_DIR:?Set PHOTO_DIR in .env}:/photos:rw
      # _incoming is the natural ${PHOTO_DIR}/_incoming subdir of the /photos
      # mount above — the SAME place the SD-card importer writes (via the
      # personal_folder SMB share, Samba path=%H = /home/cantimatt) and where
      # Syncthing lands phone rolls (see the syncthing service below).
      # Do NOT re-add a `./photos/_incoming:/photos/_incoming` overlay: that
      # relative bind (a) put staging in the repo dir, diverging from where the
      # Mac writes, and (b) resolved to a bogus /repo/photos/_incoming when the
      # /status restart helper ran `compose up -w /repo`, shadowing the real
      # files so ingest-incoming saw an empty dir. Keeping _incoming under
      # PHOTO_DIR with no relative bind avoids both. Excluded from indexing by
      # _BUILTIN_EXCLUDED_DIRS in photosearch/index.py.
      - photosearch-data:/data
      # Deploy-control panel (/status): mount the repo so git pull + docker
      # compose build / up can be triggered from the UI. WARNING:
      # docker.sock gives the container effective root on the host — only
      # acceptable because this service is on a private LAN/tailnet.
      - ${REPO_DIR:-/volume1/docker/photosearch}:/repo
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PHOTOSEARCH_DB=/data/photo_index.db
      - OLLAMA_HOST=http://ollama:11434
      - INSIGHTFACE_HOME=/data/.insightface
      - PHOTO_ROOT=/photos
      - PYTHONUNBUFFERED=1
      - PHOTOSEARCH_CACHE=/data/.cache/photosearch
      - HF_TOKEN=${HF_TOKEN}
      # Host-side path to the repo (matches the volume mount above). The
      # /api/admin/restart endpoint spawns a separate docker:cli helper
      # container that does `compose up`; the helper needs the HOST path
      # for its own /repo mount, not the in-container /repo. Defaulted in
      # admin_api.py if unset, but pin it here so the panel doesn't guess.
      - HOST_REPO_DIR=${REPO_DIR:-/volume1/docker/photosearch}
      # Deployment-specific subfolders to skip during indexing
      # (colon-separated; folder basenames, not full paths). These are
      # NAS-local trees that hold organizational duplicates of photos
      # already indexed elsewhere — see CLAUDE.md / the de-index pattern.
      - PHOTOSEARCH_EXCLUDED_DIRS=01 - Organizational folders:02 - Gopro
      # If deploying a DB built on Mac, set this once to remap paths:
      # - REMAP_FROM=/Users/yourname/Pictures
    depends_on:
      ollama:
        condition: service_started
    command: ["serve"]
    # Workers pull /api/photos/<id>/full in long-running streamed transfers.
    # On Restart, uvicorn gets SIGTERM and enters "waiting for connections to
    # close" — large in-flight downloads need real time to drain. The default
    # stop_grace_period of 10s gets SIGKILL'd through mid-transfer, leaving
    # ports/state half-cleaned and sometimes wedging the new container's
    # startup. 60s is comfortably more than the longest /full transfer.
    stop_grace_period: 60s
    # The N100 has 4 cores and 8 GB RAM. Indexing is memory-intensive
    # (CLIP + InsightFace + LLaVA all load models). Serving is lightweight
    # for browsing, but worker batches that pull /api/photos/<id>/full hold
    # several MB per concurrent photo in memory — a 16-photo batch + model
    # state can push past 6G and trigger the OOM killer (exit 137). With
    # describe routed to Windows-native Ollama, the ollama container's 6G
    # limit is mostly slack, so giving photosearch more headroom is safe.
    deploy:
      resources:
        limits:
          memory: 7G

  photosearch-mcp:
    # MCP server (M24a) — exposes the LLM tool layer over streamable HTTP so
    # any MCP client on the LAN can drive photo search. Reuses the photosearch
    # service's built image (search_photos needs the CLIP text encoder); no
    # build block of its own, so it never triggers a redundant rebuild — it
    # just runs the same image with the `mcp` entrypoint command. Shares the
    # DB + thumbnail cache (photosearch-data) and the photo library (ro).
    image: photosearch-photosearch
    container_name: photosearch-mcp
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-8848}:8848"
    volumes:
      # ro — the MCP server only reads photos. Thumbnails it generates land
      # under /data (rw), shared with the web container's cache.
      - ${PHOTO_DIR:?Set PHOTO_DIR in .env}:/photos:ro
      - photosearch-data:/data
    environment:
      - PHOTOSEARCH_DB=/data/photo_index.db
      - PHOTO_ROOT=/photos
      - PYTHONUNBUFFERED=1
      - PHOTOSEARCH_CACHE=/data/.cache/photosearch
      - PHOTOSEARCH_MCP_HOST=0.0.0.0
      - PHOTOSEARCH_MCP_PORT=8848
      # Image returns are OFF by default — text metadata only. Set to 1 to let
      # connected MCP clients pull thumbnails (pixels then leave the NAS).
      - PHOTOSEARCH_MCP_ALLOW_IMAGES=${PHOTOSEARCH_MCP_ALLOW_IMAGES:-0}
    command: ["mcp"]
    depends_on:
      photosearch:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 3G

  ollama:
    image: ollama/ollama:latest
    container_name: photosearch-ollama
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    # Use llava (7B) on the N100 — 13B needs more RAM than available.
    # 7B runs fine on CPU, just slower (~60-90s per photo for descriptions).
    deploy:
      resources:
        limits:
          memory: 6G

  syncthing:
    # Receives phone camera-roll uploads into /photos/_incoming/<source>/.
    # The daily `ingest-incoming` cron evacuates those files into the
    # year/date library tree — see CLAUDE.md "Phone-photo daily ingest".
    # PUID/PGID = cantimatt (1000) / admin (10) — must match the host
    # owner of ${PHOTO_DIR}/_incoming so ingest-incoming can move files.
    image: lscr.io/linuxserver/syncthing:latest
    container_name: photosearch-syncthing
    hostname: photosearch-nas
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=10
      - TZ=America/Los_Angeles
    volumes:
      - ./syncthing-config:/config
      # Absolute ${PHOTO_DIR}/_incoming (NOT a relative ./ path) so phone rolls
      # land in the SAME staging dir the photosearch container reads as
      # /photos/_incoming and the SD-card importer writes to. Was
      # ./photos/_incoming (the repo dir), which diverged from PHOTO_DIR and
      # left phone uploads invisible to ingest for the same reason.
      - ${PHOTO_DIR}/_incoming:/incoming
    ports:
      - "8384:8384"          # web GUI
      - "22000:22000/tcp"    # sync protocol
      - "22000:22000/udp"    # sync protocol (QUIC)
      - "21027:21027/udp"    # LAN discovery

  # NOTE: the photosearch-tailscale sidecar was removed 2026-07-03. It ran in
  # this compose's network namespace (network_mode: service:photosearch), so it
  # could only expose the app's :8000 over Tailscale — never the host's ssh/smb.
  # The NAS host now runs Tailscale natively (node DXP4800-F976), which serves
  # the published :8000 plus host ssh/smb, so the sidecar was redundant and its
  # netns coupling made restarts fragile (a --force-recreate cut off all remote
  # ssh/smb). Re-add ONLY as a properly-scoped subnet router if ever needed.

volumes:
  photosearch-data:
    driver: local
  ollama-models:
    driver: local
