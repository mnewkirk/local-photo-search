<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collections — Photo Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #333;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #4a9eff;
      --accent-hover: #6bb3ff;
      --green: #4ade80;
      --red: #f87171;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1600px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 42px;
    }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .nav-link {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      margin-left: 4px;
    }
    .nav-link:hover { text-decoration: underline; }
    .nav-link.active { color: var(--text); font-weight: 600; }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Page title row */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 16px;
    }
    .page-header h2 {
      font-size: 22px;
      font-weight: 600;
    }
    .page-header .subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin-left: 12px;
      font-weight: 400;
    }

    /* Buttons */
    .btn {
      padding: 8px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover { background: var(--border); }
    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .btn-danger { color: var(--red); }
    .btn-danger:hover { background: rgba(248,113,113,0.15); border-color: var(--red); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* Collection grid */
    .collections-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .collection-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }
    .collection-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .collection-card .cover {
      width: 100%;
      aspect-ratio: 3/2;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .collection-card .cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .collection-card .cover .empty-cover {
      color: var(--text-muted);
      font-size: 36px;
    }
    .collection-card .info {
      padding: 12px 16px;
    }
    .collection-card .info .name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
    }
    .collection-card .info .meta {
      color: var(--text-muted);
      font-size: 12px;
    }

    /* New collection card */
    .new-collection-card {
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .new-collection-card:hover { border-color: var(--accent); }
    .new-collection-card span {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Photo grid (collection detail) */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
    }
    .photo-grid .thumb-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s;
    }
    .photo-grid .thumb-wrap:hover { border-color: var(--accent); }
    .photo-grid .thumb-wrap.selected { border-color: var(--red); }
    .photo-grid .thumb-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }
    .photo-grid .thumb-wrap .stack-badge {
      position: absolute;
      top: 4px;
      right: 28px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      z-index: 2;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.15s;
      opacity: 1;
    }
    .photo-grid .thumb-wrap .stack-badge:hover { background: rgba(74,158,255,0.7); }
    .photo-grid .thumb-wrap.stack-member {
      outline: 3px solid #fff;
      outline-offset: -3px;
    }
    .photo-grid .thumb-wrap .remove-badge {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(248,113,113,0.9);
      color: #fff;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .photo-grid .thumb-wrap.selected .remove-badge,
    .photo-grid .thumb-wrap:hover .remove-badge { opacity: 1; }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      width: 400px;
      max-width: 90vw;
    }
    .modal-content h3 { margin-bottom: 16px; }
    .modal-content input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
    }
    .modal-content input[type="text"]:focus { border-color: var(--accent); }
    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* Color dots */
    .color-dots {
      display: flex;
      gap: 3px;
      margin-top: 4px;
    }
    .color-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* Photo modal — full-featured (matches search page) */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal {
      background: var(--surface);
      border-radius: 12px;
      max-width: 1200px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: row;
    }
    .modal-image {
      flex: 1;
      min-width: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px 0 0 12px;
      max-height: 90vh;
      position: relative;
    }
    .modal-image img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
    }
    .modal-sidebar {
      width: 340px;
      flex-shrink: 0;
      padding: 24px;
      border-left: 1px solid var(--border);
      overflow-y: auto;
      max-height: 90vh;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.6);
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 310;
    }
    .modal-close:hover { background: rgba(0,0,0,0.8); }
    .modal-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      border: none;
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 310;
      transition: background 0.15s;
    }
    .modal-nav:hover { background: rgba(0,0,0,0.8); }
    .modal-nav.prev { left: 16px; }
    .modal-nav.next { right: 56px; }

    .detail-section {
      margin-bottom: 20px;
    }
    .detail-section h3 {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .detail-section p {
      font-size: 14px;
      line-height: 1.6;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }
    .detail-row .label { color: var(--text-muted); }

    .face-tag {
      display: inline-block;
      padding: 4px 10px;
      background: var(--surface2);
      border-radius: 12px;
      font-size: 13px;
      margin: 2px 4px 2px 0;
      cursor: pointer;
      transition: background 0.15s, outline 0.15s;
    }
    .face-tag:hover, .face-tag.active {
      background: var(--accent);
      color: #fff;
    }
    .face-tag .match-badge {
      font-size: 10px;
      margin-left: 4px;
      opacity: 0.7;
    }
    .face-edit-panel {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin: 4px 0;
      padding: 8px 10px;
      background: var(--surface2);
      border-radius: 8px;
      font-size: 13px;
    }
    .face-edit-panel select,
    .face-edit-panel input {
      font-size: 13px;
      padding: 4px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      outline: none;
      width: 100%;
    }
    .face-edit-panel select:focus,
    .face-edit-panel input:focus { border-color: var(--accent); }
    .face-edit-buttons {
      display: flex;
      gap: 6px;
      margin-top: 2px;
    }
    .face-edit-buttons button {
      flex: 1;
      padding: 4px 0;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
    }
    .face-edit-buttons button:hover { border-color: var(--accent); }
    .face-edit-buttons button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .face-edit-buttons button.danger {
      border-color: #f87171;
      color: #f87171;
    }
    .face-edit-buttons button.danger:hover { background: #f87171; color: #fff; }
    .face-bbox-overlay {
      position: absolute;
      border: 2px solid var(--accent);
      border-radius: 4px;
      pointer-events: none;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.4);
      transition: opacity 0.15s;
    }
    .face-bbox-label {
      position: absolute;
      bottom: 100%;
      left: -2px;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 4px 4px 0 0;
      white-space: nowrap;
    }

    /* ---- Responsive ---- */

    /* Tablet (≤ 768 px) */
    @media (max-width: 768px) {
      .collections-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
      .photo-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 5px; }
      .modal { flex-direction: column; }
      .modal-image { border-radius: 12px 12px 0 0; max-height: 50vh; }
      .modal-sidebar {
        width: 100%;
        border-left: none;
        border-top: 1px solid var(--border);
        max-height: 44vh;
        overflow-y: auto;
      }
    }

    /* Phone (≤ 480 px) */
    @media (max-width: 480px) {
      .collections-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
      .photo-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 3px; }
      .modal-overlay { padding: 0; }
      .modal { border-radius: 0; max-height: 100vh; height: 100vh; }
      .modal-image { border-radius: 0; max-height: 56vh; }
      .modal-sidebar { max-height: 44vh; }
      .modal-nav.prev { left: 8px; }
      .modal-nav.next { right: 8px; }
      .modal-close { top: 8px; right: 8px; }
    }

    /* Back link */
    .back-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 16px;
    }
    .back-link:hover { text-decoration: underline; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { margin-bottom: 16px; }

    /* Edit inline */
    .editable { cursor: pointer; }
    .editable:hover { color: var(--accent); }

    /* Confirm dialog */
    .confirm-bar {
      background: rgba(248,113,113,0.1);
      border: 1px solid var(--red);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="/shared.js"></script>

  <script>
    const e = React.createElement;
    const { useState, useEffect, useCallback, useRef, useMemo } = React;

    // -----------------------------------------------------------------------
    // Create Collection Modal
    // -----------------------------------------------------------------------
    function CreateModal({ onClose, onCreate }) {
      const [name, setName] = useState('');
      const inputRef = useRef(null);
      useEffect(() => { inputRef.current && inputRef.current.focus(); }, []);

      const submit = () => {
        const trimmed = name.trim();
        if (!trimmed) return;
        onCreate(trimmed);
      };

      return e('div', { className: 'modal-overlay', onClick: onClose },
        e('div', { className: 'modal-content', onClick: ev => ev.stopPropagation() },
          e('h3', null, 'New Collection'),
          e('input', {
            ref: inputRef, type: 'text', placeholder: 'Collection name',
            value: name, onChange: ev => setName(ev.target.value),
            onKeyDown: ev => ev.key === 'Enter' && submit(),
          }),
          e('div', { className: 'modal-actions' },
            e('button', { className: 'btn', onClick: onClose }, 'Cancel'),
            e('button', { className: 'btn btn-primary', onClick: submit, disabled: !name.trim() }, 'Create'),
          ),
        ),
      );
    }

    // -----------------------------------------------------------------------
    // Rename Modal
    // -----------------------------------------------------------------------
    function RenameModal({ currentName, onClose, onRename }) {
      const [name, setName] = useState(currentName);
      const inputRef = useRef(null);
      useEffect(() => { inputRef.current && inputRef.current.focus(); }, []);

      const submit = () => {
        const trimmed = name.trim();
        if (!trimmed || trimmed === currentName) return;
        onRename(trimmed);
      };

      return e('div', { className: 'modal-overlay', onClick: onClose },
        e('div', { className: 'modal-content', onClick: ev => ev.stopPropagation() },
          e('h3', null, 'Rename Collection'),
          e('input', {
            ref: inputRef, type: 'text', value: name,
            onChange: ev => setName(ev.target.value),
            onKeyDown: ev => ev.key === 'Enter' && submit(),
          }),
          e('div', { className: 'modal-actions' },
            e('button', { className: 'btn', onClick: onClose }, 'Cancel'),
            e('button', { className: 'btn btn-primary', onClick: submit, disabled: !name.trim() || name.trim() === currentName }, 'Rename'),
          ),
        ),
      );
    }

    // -----------------------------------------------------------------------
    // Photo Modal (simplified — shows image + basic info)
    // -----------------------------------------------------------------------
    // -----------------------------------------------------------------------
    // Photo Modal (delegates to shared component)
    // -----------------------------------------------------------------------
    function PhotoDetailModal({ photo, onClose, onPrev, onNext, index, total, onFaceAssigned, persons, onStackNavigate }) {
      return e(PS.PhotoModal, {
        photo, onClose, onPrev, onNext, index, total, persons, onFaceAssigned, onStackNavigate,
        fetchDetail: true,
        showFaces: true,
        showCollections: true,
        showLocation: true,
        showAesthetics: true,
      });
    }

    // -----------------------------------------------------------------------
    // Collections List View
    // -----------------------------------------------------------------------
    function CollectionsList() {
      const [collections, setCollections] = useState([]);
      const [showCreate, setShowCreate] = useState(false);
      const [error, setError] = useState(null);

      const load = useCallback(() => {
        fetch('/api/collections').then(r => r.json()).then(data => {
          setCollections(data.collections || []);
        });
      }, []);

      useEffect(() => { load(); }, [load]);

      const doCreate = async (name) => {
        setError(null);
        const res = await fetch('/api/collections', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name }),
        });
        const data = await res.json();
        if (!res.ok) { setError(data.error); return; }
        setShowCreate(false);
        // Navigate to the new collection
        window.location.href = `/collections/${data.collection.id}`;
      };

      return e('div', null,
        e('div', { className: 'page-header' },
          e('h2', null,
            'Collections',
            e('span', { className: 'subtitle' }, `${collections.length} collection${collections.length !== 1 ? 's' : ''}`),
          ),
          e('button', { className: 'btn btn-primary', onClick: () => setShowCreate(true) }, '+ New Collection'),
        ),

        error && e('div', { style: { color: 'var(--red)', marginBottom: 16, fontSize: 13 } }, error),

        collections.length === 0 && !showCreate && e('div', { className: 'empty-state' },
          e('div', { className: 'icon' }, '\ud83d\udcf7'),
          e('p', null, 'No collections yet. Create one to start organizing your photos.'),
          e('button', { className: 'btn btn-primary', onClick: () => setShowCreate(true) }, '+ New Collection'),
        ),

        collections.length > 0 && e('div', { className: 'collections-grid' },
          collections.map(c => e('div', {
            key: c.id,
            className: 'collection-card',
            onClick: () => { window.location.href = `/collections/${c.id}`; },
          },
            e('div', { className: 'cover' },
              c.cover_thumbnail
                ? e('img', { src: c.cover_thumbnail, alt: c.name, loading: 'lazy' })
                : e('span', { className: 'empty-cover' }, '\ud83d\uddbc'),
            ),
            e('div', { className: 'info' },
              e('div', { className: 'name' }, c.name),
              e('div', { className: 'meta' },
                `${c.photo_count} photo${c.photo_count !== 1 ? 's' : ''}`,
                c.description ? ` \u2022 ${c.description}` : '',
              ),
            ),
          )),
        ),

        showCreate && e(CreateModal, {
          onClose: () => { setShowCreate(false); setError(null); },
          onCreate: doCreate,
        }),
      );
    }

    // -----------------------------------------------------------------------
    // Collection Detail View
    // -----------------------------------------------------------------------
    function CollectionDetail({ collectionId }) {
      const [collection, setCollection] = useState(null);
      const [photos, setPhotos] = useState([]);
      const [selectedForRemoval, setSelectedForRemoval] = useState(new Set());
      const [showRename, setShowRename] = useState(false);
      const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
      const [modalIdx, setModalIdx] = useState(null);
      const [error, setError] = useState(null);
      const [persons, setPersons] = useState([]);

      // ---- Stack expansion state ----
      const [expandedStacks, setExpandedStacks] = useState(new Set());
      const [stackMembers, setStackMembers] = useState({});

      const toggleStack = useCallback((stackId) => {
        setExpandedStacks(prev => {
          const next = new Set(prev);
          if (next.has(stackId)) {
            next.delete(stackId);
          } else {
            next.add(stackId);
            if (!stackMembers[stackId]) {
              fetch('/api/stacks/' + stackId)
                .then(r => r.json())
                .then(data => {
                  if (data && data.members) {
                    setStackMembers(prev => ({ ...prev, [stackId]: data.members }));
                  }
                });
            }
          }
          return next;
        });
      }, [stackMembers]);

      const expandAllStacks = useCallback(() => {
        const stackIds = new Set();
        photos.forEach(r => { if (r.stack_id && r.stack_count > 1) stackIds.add(r.stack_id); });
        stackIds.forEach(sid => {
          if (!stackMembers[sid]) {
            fetch('/api/stacks/' + sid)
              .then(r => r.json())
              .then(data => {
                if (data && data.members) {
                  setStackMembers(prev => ({ ...prev, [sid]: data.members }));
                }
              });
          }
        });
        setExpandedStacks(stackIds);
      }, [photos, stackMembers]);

      const collapseAllStacks = useCallback(() => { setExpandedStacks(new Set()); }, []);

      const displayItems = useMemo(() => {
        const added = new Set();
        const items = [];
        photos.forEach(photo => {
          const isNonTopMember = photo.stack_id && photo.stack_count > 1 && !photo.stack_is_top;
          const stackIsExpanded = photo.stack_id && expandedStacks.has(photo.stack_id);
          if (isNonTopMember) {
            if (stackIsExpanded) return; // will appear in expanded group below top photo
            if (!selectedForRemoval.has(photo.id)) return; // collapsed + unselected → hide
            // collapsed but selected → show individually
          }
          if (added.has(photo.id)) return;
          added.add(photo.id);
          items.push({ photo, isStackMember: false });
          if (photo.stack_is_top && stackIsExpanded && stackMembers[photo.stack_id]) {
            stackMembers[photo.stack_id].forEach(m => {
              if (m.id !== photo.id && !added.has(m.id)) {
                added.add(m.id);
                items.push({ photo: m, isStackMember: true, stackId: photo.stack_id });
              }
            });
          }
        });
        return items;
      }, [photos, selectedForRemoval, expandedStacks, stackMembers]);

      const hasStacks = photos.some(p => p.stack_id && p.stack_count > 1);

      const load = useCallback(() => {
        fetch(`/api/collections/${collectionId}`).then(r => r.json()).then(data => {
          if (data.error) { setError(data.error); return; }
          setCollection(data.collection);
          setPhotos(data.photos || []);
        });
      }, [collectionId]);

      useEffect(() => {
        load();
        fetch('/api/persons').then(r => r.json()).then(d => setPersons(d.persons || [])).catch(() => {});
      }, [load]);

      const doRename = async (name) => {
        const res = await fetch(`/api/collections/${collectionId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name }),
        });
        if (res.ok) {
          setShowRename(false);
          load();
        }
      };

      const doDelete = async () => {
        await fetch(`/api/collections/${collectionId}`, { method: 'DELETE' });
        window.location.href = '/collections';
      };

      const toggleRemoval = (photoId) => {
        setSelectedForRemoval(prev => {
          const next = new Set(prev);
          if (next.has(photoId)) next.delete(photoId);
          else next.add(photoId);
          return next;
        });
      };

      const doRemoveSelected = async () => {
        const ids = Array.from(selectedForRemoval);
        if (!ids.length) return;
        await fetch(`/api/collections/${collectionId}/photos/remove`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ photo_ids: ids }),
        });
        setSelectedForRemoval(new Set());
        load();
      };

      if (error) {
        return e('div', null,
          e('a', { href: '/collections', className: 'back-link' }, '\u2190 Collections'),
          e('div', { className: 'empty-state' }, e('p', null, error)),
        );
      }
      if (!collection) return e('div', { style: { padding: 40, textAlign: 'center', color: 'var(--text-muted)' } }, 'Loading...');

      const modalPhoto = modalIdx !== null ? photos[modalIdx] : null;

      return e('div', null,
        e('a', { href: '/collections', className: 'back-link' }, '\u2190 All Collections'),

        e('div', { className: 'page-header' },
          e('div', { style: { display: 'flex', alignItems: 'baseline', gap: 12 } },
            e('h2', {
              className: 'editable',
              onClick: () => setShowRename(true),
              title: 'Click to rename',
            }, collection.name),
            e('span', { className: 'subtitle' }, `${photos.length} photo${photos.length !== 1 ? 's' : ''}`),
          ),
          e('div', { style: { display: 'flex', gap: 8 } },
            e('button', { className: 'btn btn-sm', onClick: () => setShowRename(true) }, 'Rename'),
            e('button', { className: 'btn btn-sm btn-danger', onClick: () => setShowDeleteConfirm(true) }, 'Delete'),
          ),
        ),

        showDeleteConfirm && e('div', { className: 'confirm-bar' },
          e('span', null, `Delete "${collection.name}"? This cannot be undone. Photos are not affected.`),
          e('div', { style: { display: 'flex', gap: 8 } },
            e('button', { className: 'btn btn-sm', onClick: () => setShowDeleteConfirm(false) }, 'Cancel'),
            e('button', { className: 'btn btn-sm btn-danger', onClick: doDelete }, 'Delete'),
          ),
        ),

        selectedForRemoval.size > 0 && e('div', { className: 'confirm-bar', style: { borderColor: 'var(--accent)', background: 'rgba(74,158,255,0.1)' } },
          e('span', null, `${selectedForRemoval.size} photo${selectedForRemoval.size !== 1 ? 's' : ''} selected`),
          e('div', { style: { display: 'flex', gap: 8 } },
            e('button', { className: 'btn btn-sm', onClick: () => setSelectedForRemoval(new Set()) }, 'Cancel'),
            e('button', { className: 'btn btn-sm btn-danger', onClick: doRemoveSelected }, 'Remove from Collection'),
          ),
        ),

        photos.length === 0 && e('div', { className: 'empty-state' },
          e('div', { className: 'icon' }, '\ud83d\uddbc'),
          e('p', null, 'This collection is empty. Add photos from Search or Review.'),
        ),

        photos.length > 0 && hasStacks && e('div', { style: { display: 'flex', justifyContent: 'flex-end', marginBottom: 8 } },
          e('button', {
            className: 'btn btn-sm',
            onClick: () => { expandedStacks.size > 0 ? collapseAllStacks() : expandAllStacks(); },
          }, expandedStacks.size > 0 ? 'Close Stacks' : 'Expand Stacks'),
        ),

        photos.length > 0 && e('div', { className: 'photo-grid' },
          displayItems.map((item, i) => {
            const p = item.photo;
            const isExpanded = p.stack_id && expandedStacks.has(p.stack_id);
            const showBadge = p.stack_count > 1 && p.stack_is_top;
            return e('div', {
              key: (item.isStackMember ? 'sm-' : '') + p.id,
              className: `thumb-wrap ${selectedForRemoval.has(p.id) ? 'selected' : ''} ${item.isStackMember ? 'stack-member' : ''}`,
              onClick: (ev) => {
                if (ev.shiftKey) { toggleRemoval(p.id); return; }
                // Find index in original photos array for modal nav
                const origIdx = photos.findIndex(pp => pp.id === p.id);
                setModalIdx(origIdx >= 0 ? origIdx : 0);
              },
              onContextMenu: (ev) => { ev.preventDefault(); toggleRemoval(p.id); },
            },
              e('img', { src: `/api/photos/${p.id}/thumbnail`, alt: p.filename, loading: 'lazy' }),
              showBadge && e('span', {
                className: 'stack-badge',
                onClick: (ev) => { ev.stopPropagation(); toggleStack(p.stack_id); },
              }, isExpanded ? '\u2715' : '\u00d7' + p.stack_count),
              e('span', { className: 'remove-badge' }, '\u00d7'),
            );
          }),
        ),

        // Photo modal
        modalPhoto && e(PhotoDetailModal, {
          photo: modalPhoto,
          index: modalIdx,
          total: photos.length,
          onClose: () => setModalIdx(null),
          onPrev: modalIdx > 0 ? () => setModalIdx(modalIdx - 1) : null,
          onNext: modalIdx < photos.length - 1 ? () => setModalIdx(modalIdx + 1) : null,
          persons: persons,
          onFaceAssigned: (faceId, personName) => {
            fetch('/api/persons').then(r => r.json()).then(d => setPersons(d.persons || [])).catch(() => {});
          },
          onStackNavigate: (member) => {
            const origIdx = photos.findIndex(pp => pp.id === member.id);
            if (origIdx >= 0) setModalIdx(origIdx);
          },
        }),

        showRename && e(RenameModal, {
          currentName: collection.name,
          onClose: () => setShowRename(false),
          onRename: doRename,
        }),
      );
    }

    // -----------------------------------------------------------------------
    // App — routes based on URL
    // -----------------------------------------------------------------------
    function App() {
      // Parse URL: /collections or /collections/:id
      const path = window.location.pathname;
      const match = path.match(/^\/collections\/(\d+)/);
      const collectionId = match ? parseInt(match[1]) : null;

      return e('div', null,
        // Header
        e(PS.SharedHeader, { activePage: 'collections' }),
        // Content
        e('div', { className: 'container' },
          collectionId
            ? e(CollectionDetail, { collectionId })
            : e(CollectionsList),
        ),
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(e(App));
  </script>
</body>
</html>
