<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collections — Photo Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #333;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #4a9eff;
      --accent-hover: #6bb3ff;
      --green: #4ade80;
      --red: #f87171;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1600px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 42px;
    }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .nav-link {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      margin-left: 4px;
    }
    .nav-link:hover { text-decoration: underline; }
    .nav-link.active { color: var(--text); font-weight: 600; }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Page title row */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 16px;
    }
    .page-header h2 {
      font-size: 22px;
      font-weight: 600;
    }
    .page-header .subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin-left: 12px;
      font-weight: 400;
    }

    /* Buttons */
    .btn {
      padding: 8px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover { background: var(--border); }
    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .btn-danger { color: var(--red); }
    .btn-danger:hover { background: rgba(248,113,113,0.15); border-color: var(--red); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* Collection grid */
    .collections-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .collection-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }
    .collection-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .collection-card .cover {
      width: 100%;
      aspect-ratio: 3/2;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .collection-card .cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .collection-card .cover .empty-cover {
      color: var(--text-muted);
      font-size: 36px;
    }
    .collection-card .info {
      padding: 12px 16px;
    }
    .collection-card .info .name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
    }
    .collection-card .info .meta {
      color: var(--text-muted);
      font-size: 12px;
    }

    /* New collection card */
    .new-collection-card {
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .new-collection-card:hover { border-color: var(--accent); }
    .new-collection-card span {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Photo grid (collection detail) */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
    }
    .photo-grid .thumb-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s;
    }
    .photo-grid .thumb-wrap:hover { border-color: var(--accent); }
    .photo-grid .thumb-wrap.selected { border-color: var(--red); }
    .photo-grid .thumb-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }
    .photo-grid .thumb-wrap .stack-badge {
      position: absolute;
      top: 4px;
      right: 28px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      z-index: 2;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.15s;
      opacity: 1;
    }
    .photo-grid .thumb-wrap .stack-badge:hover { background: rgba(74,158,255,0.7); }
    .photo-grid .thumb-wrap.stack-member {
      outline: 3px solid #fff;
      outline-offset: -3px;
    }
    .photo-grid .thumb-wrap .remove-badge {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(248,113,113,0.9);
      color: #fff;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .photo-grid .thumb-wrap.selected .remove-badge,
    .photo-grid .thumb-wrap:hover .remove-badge { opacity: 1; }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      width: 400px;
      max-width: 90vw;
    }
    .modal-content h3 { margin-bottom: 16px; }
    .modal-content input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
    }
    .modal-content input[type="text"]:focus { border-color: var(--accent); }
    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* Color dots */
    .color-dots {
      display: flex;
      gap: 3px;
      margin-top: 4px;
    }
    .color-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* Photo modal — full-featured (matches search page) */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal {
      background: var(--surface);
      border-radius: 12px;
      max-width: 1200px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: row;
    }
    .modal-image {
      flex: 1;
      min-width: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px 0 0 12px;
      max-height: 90vh;
      position: relative;
    }
    .modal-image img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
    }
    .modal-sidebar {
      width: 340px;
      flex-shrink: 0;
      padding: 24px;
      border-left: 1px solid var(--border);
      overflow-y: auto;
      max-height: 90vh;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.6);
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 310;
    }
    .modal-close:hover { background: rgba(0,0,0,0.8); }
    .modal-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      border: none;
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 310;
      transition: background 0.15s;
    }
    .modal-nav:hover { background: rgba(0,0,0,0.8); }
    .modal-nav.prev { left: 16px; }
    .modal-nav.next { right: 56px; }

    .detail-section {
      margin-bottom: 20px;
    }
    .detail-section h3 {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .detail-section p {
      font-size: 14px;
      line-height: 1.6;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }
    .detail-row .label { color: var(--text-muted); }

    .face-tag {
      display: inline-block;
      padding: 4px 10px;
      background: var(--surface2);
      border-radius: 12px;
      font-size: 13px;
      margin: 2px 4px 2px 0;
      cursor: pointer;
      transition: background 0.15s, outline 0.15s;
    }
    .face-tag:hover, .face-tag.active {
      background: var(--accent);
      color: #fff;
    }
    .face-tag .match-badge {
      font-size: 10px;
      margin-left: 4px;
      opacity: 0.7;
    }
    .face-edit-panel {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin: 4px 0;
      padding: 8px 10px;
      background: var(--surface2);
      border-radius: 8px;
      font-size: 13px;
    }
    .face-edit-panel select,
    .face-edit-panel input {
      font-size: 13px;
      padding: 4px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      outline: none;
      width: 100%;
    }
    .face-edit-panel select:focus,
    .face-edit-panel input:focus { border-color: var(--accent); }
    .face-edit-buttons {
      display: flex;
      gap: 6px;
      margin-top: 2px;
    }
    .face-edit-buttons button {
      flex: 1;
      padding: 4px 0;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
    }
    .face-edit-buttons button:hover { border-color: var(--accent); }
    .face-edit-buttons button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .face-edit-buttons button.danger {
      border-color: #f87171;
      color: #f87171;
    }
    .face-edit-buttons button.danger:hover { background: #f87171; color: #fff; }
    .face-bbox-overlay {
      position: absolute;
      border: 2px solid var(--accent);
      border-radius: 4px;
      pointer-events: none;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.4);
      transition: opacity 0.15s;
    }
    .face-bbox-label {
      position: absolute;
      bottom: 100%;
      left: -2px;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 4px 4px 0 0;
      white-space: nowrap;
    }

    /* ---- Responsive ---- */

    /* Tablet (≤ 768 px) */
    @media (max-width: 768px) {
      .collections-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
      .photo-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 5px; }
      .modal { flex-direction: column; }
      .modal-image { border-radius: 12px 12px 0 0; max-height: 50vh; }
      .modal-sidebar {
        width: 100%;
        border-left: none;
        border-top: 1px solid var(--border);
        max-height: 44vh;
        overflow-y: auto;
      }
    }

    /* Phone (≤ 480 px) */
    @media (max-width: 480px) {
      .collections-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
      .photo-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 3px; }
      .modal-overlay { padding: 0; }
      .modal { border-radius: 0; max-height: 100vh; height: 100vh; }
      .modal-image { border-radius: 0; max-height: 56vh; }
      .modal-sidebar { max-height: 44vh; }
      .modal-nav.prev { left: 8px; }
      .modal-nav.next { right: 8px; }
      .modal-close { top: 8px; right: 8px; }
    }

    /* Back link */
    .back-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 16px;
    }
    .back-link:hover { text-decoration: underline; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { margin-bottom: 16px; }

    /* Edit inline */
    .editable { cursor: pointer; }
    .editable:hover { color: var(--accent); }

    /* Confirm dialog */
    .confirm-bar {
      background: rgba(248,113,113,0.1);
      border: 1px solid var(--red);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="/shared.js"></script>

  <script>
    const e = React.createElement;
    const { useState, useEffect, useCallback, useRef, useMemo } = React;

    // -----------------------------------------------------------------------
    // Create Collection Modal
    // -----------------------------------------------------------------------
    function CreateModal({ onClose, onCreate }) {
      const [name, setName] = useState('');
      const inputRef = useRef(null);
      useEffect(() => { inputRef.current && inputRef.current.focus(); }, []);

      const submit = () => {
        const trimmed = name.trim();
        if (!trimmed) return;
        onCreate(trimmed);
      };

      return e('div', { className: 'modal-overlay', onClick: onClose },
        e('div', { className: 'modal-content', onClick: ev => ev.stopPropagation() },
          e('h3', null, 'New Collection'),
          e('input', {
            ref: inputRef, type: 'text', placeholder: 'Collection name',
            value: name, onChange: ev => setName(ev.target.value),
            onKeyDown: ev => ev.key === 'Enter' && submit(),
          }),
          e('div', { className: 'modal-actions' },
            e('button', { className: 'btn', onClick: onClose }, 'Cancel'),
            e('button', { className: 'btn btn-primary', onClick: submit, disabled: !name.trim() }, 'Create'),
          ),
        ),
      );
    }

    // -----------------------------------------------------------------------
    // Rename Modal
    // -----------------------------------------------------------------------
    function RenameModal({ currentName, onClose, onRename }) {
      const [name, setName] = useState(currentName);
      const inputRef = useRef(null);
      useEffect(() => { inputRef.current && inputRef.current.focus(); }, []);

      const submit = () => {
        const trimmed = name.trim();
        if (!trimmed || trimmed === currentName) return;
        onRename(trimmed);
      };

      return e('div', { className: 'modal-overlay', onClick: onClose },
        e('div', { className: 'modal-content', onClick: ev => ev.stopPropagation() },
          e('h3', null, 'Rename Collection'),
          e('input', {
            ref: inputRef, type: 'text', value: name,
            onChange: ev => setName(ev.target.value),
            onKeyDown: ev => ev.key === 'Enter' && submit(),
          }),
          e('div', { className: 'modal-actions' },
            e('button', { className: 'btn', onClick: onClose }, 'Cancel'),
            e('button', { className: 'btn btn-primary', onClick: submit, disabled: !name.trim() || name.trim() === currentName }, 'Rename'),
          ),
        ),
      );
    }

    // -----------------------------------------------------------------------
    // Photo Modal (simplified — shows image + basic info)
    // -----------------------------------------------------------------------
    // -----------------------------------------------------------------------
    // Photo Modal (delegates to shared component)
    // -----------------------------------------------------------------------
    function PhotoDetailModal({ photo, onClose, onPrev, onNext, index, total, onFaceAssigned, persons, onStackNavigate }) {
      return e(PS.PhotoModal, {
        photo, onClose, onPrev, onNext, index, total, persons, onFaceAssigned, onStackNavigate,
        fetchDetail: true,
        showFaces: true,
        showCollections: true,
        showLocation: true,
        showAesthetics: true,
      });
    }

    // -----------------------------------------------------------------------
    // Collections List View
    // -----------------------------------------------------------------------
    function CollectionsList() {
      const [collections, setCollections] = useState([]);
      const [showCreate, setShowCreate] = useState(false);
      const [error, setError] = useState(null);

      const load = useCallback(() => {
        fetch('/api/collections').then(r => r.json()).then(data => {
          setCollections(data.collections || []);
        });
      }, []);

      useEffect(() => { load(); }, [load]);

      const doCreate = async (name) => {
        setError(null);
        const res = await fetch('/api/collections', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name }),
        });
        const data = await res.json();
        if (!res.ok) { setError(data.error); return; }
        setShowCreate(false);
        // Navigate to the new collection
        window.location.href = `/collections/${data.collection.id}`;
      };

      return e('div', null,
        e('div', { className: 'page-header' },
          e('h2', null,
            'Collections',
            e('span', { className: 'subtitle' }, `${collections.length} collection${collections.length !== 1 ? 's' : ''}`),
          ),
          e('button', { className: 'btn btn-primary', onClick: () => setShowCreate(true) }, '+ New Collection'),
        ),

        error && e('div', { style: { color: 'var(--red)', marginBottom: 16, fontSize: 13 } }, error),

        collections.length === 0 && !showCreate && e('div', { className: 'empty-state' },
          e('div', { className: 'icon' }, '\ud83d\udcf7'),
          e('p', null, 'No collections yet. Create one to start organizing your photos.'),
          e('button', { className: 'btn btn-primary', onClick: () => setShowCreate(true) }, '+ New Collection'),
        ),

        collections.length > 0 && e('div', { className: 'collections-grid' },
          collections.map(c => e('div', {
            key: c.id,
            className: 'collection-card',
            onClick: () => { window.location.href = `/collections/${c.id}`; },
          },
            e('div', { className: 'cover' },
              c.cover_thumbnail
                ? e('img', { src: c.cover_thumbnail, alt: c.name, loading: 'lazy' })
                : e('span', { className: 'empty-cover' }, '\ud83d\uddbc'),
            ),
            e('div', { className: 'info' },
              e('div', { className: 'name' }, c.name),
              e('div', { className: 'meta' },
                `${c.photo_count} photo${c.photo_count !== 1 ? 's' : ''}`,
                c.description ? ` \u2022 ${c.description}` : '',
              ),
            ),
          )),
        ),

        showCreate && e(CreateModal, {
          onClose: () => { setShowCreate(false); setError(null); },
          onCreate: doCreate,
        }),
      );
    }

    // -----------------------------------------------------------------------
    // Google Photos Upload Modal
    // -----------------------------------------------------------------------
    // -----------------------------------------------------------------------
    // Inline setup instructions (shown when client_secret.json is missing)
    // -----------------------------------------------------------------------
    function GoogleSetupInstructions() {
      const [open, setOpen] = useState(false);
      const step = (n, text) => e('div', { style: { display: 'flex', gap: 10, marginBottom: 10 } },
        e('div', { style: {
          width: 22, height: 22, borderRadius: '50%', background: 'var(--accent)',
          color: '#fff', fontSize: 11, fontWeight: 700, display: 'flex',
          alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: 1,
        } }, n),
        e('div', { style: { fontSize: 12, lineHeight: 1.5, color: 'var(--text)' } }, text),
      );

      return e('div', null,
        e('button', {
          style: { fontSize: 12, color: 'var(--accent)', background: 'none', border: 'none', cursor: 'pointer', padding: '2px 0', marginTop: 6 },
          onClick: () => setOpen(!open),
        }, open ? '\u25B2 Hide setup instructions' : '\u25BC Show setup instructions'),

        open && e('div', { style: {
          marginTop: 10, padding: '14px 14px', background: 'var(--surface2)',
          borderRadius: 6, border: '1px solid var(--border)',
        } },
          step(1, e('span', null,
            'Go to ', e('a', { href: 'https://console.cloud.google.com', target: '_blank', style: { color: 'var(--accent)' } }, 'console.cloud.google.com'),
            ', create a project, then enable the ', e('strong', null, 'Photos Library API'), '.',
          )),
          step(2, e('span', null,
            'Open ', e('strong', null, 'APIs & Services → OAuth consent screen'),
            '. Choose External. Add your Google email as a Test User.',
          )),
          step(3, e('span', null,
            'Open ', e('strong', null, 'APIs & Services → Credentials → Create OAuth client ID'),
            '. Type: ', e('strong', null, 'Web application'), '.',
          )),
          step(4, e('span', null,
            'Under ', e('strong', null, 'Authorized redirect URIs'), ' add:',
            e('br', null),
            e('code', { style: { fontSize: 11, background: 'var(--surface)', padding: '2px 6px', borderRadius: 3 } },
              window.location.origin + '/api/google/callback',
            ),
          )),
          step(5, e('span', null,
            'Download the JSON, rename it to ',
            e('code', { style: { fontSize: 11, background: 'var(--surface)', padding: '2px 6px', borderRadius: 3 } }, 'google_client_secret.json'),
            ', and place it in the same folder as ', e('code', { style: { fontSize: 11 } }, 'photo_index.db'), '.',
          )),
          step(6, 'Restart the server, then come back here and click Connect.'),
        ),
      );
    }

    function GoogleUploadModal({ collectionName, photos: allPhotos, existingAlbumId, existingAlbumTitle, onClose, onUpload }) {
      const photoCount = allPhotos.length;
      const [useExisting, setUseExisting] = useState(!!existingAlbumId);
      const [forceReupload, setForceReupload] = useState(false);
      const [albumTitle, setAlbumTitle] = useState(collectionName || '');
      const [includeDesc, setIncludeDesc] = useState(true);
      const [uploading, setUploading] = useState(false);
      const [result, setResult] = useState(null);
      const [googleStatus, setGoogleStatus] = useState(null);
      // Per-file progress: { filename: { status: 'pending'|'uploaded'|'readded'|'error', error: str|null } }
      const [fileStatuses, setFileStatuses] = useState({});
      const [fileOrder, setFileOrder] = useState([]); // ordered list of filenames seen
      const [progressCount, setProgressCount] = useState({ done: 0, total: 0 });
      const abortCtrlRef = useRef(null);
      const inputRef = useRef(null);

      const [showManualCode, setShowManualCode] = useState(false);
      const [manualCode, setManualCode] = useState('');
      const [manualRedirectUri, setManualRedirectUri] = useState('');
      const [manualError, setManualError] = useState('');
      const [manualBusy, setManualBusy] = useState(false);

      // Upload status: which photos are already uploaded to this album
      // uploadedMap: { photoId: filename }, notUploadedMap: { photoId: filename }
      const [uploadedMap, setUploadedMap] = useState(null);
      const [notUploadedMap, setNotUploadedMap] = useState(null);
      // Set of photo IDs the user has selected to force re-upload
      const [selectedReupload, setSelectedReupload] = useState(new Set());

      useEffect(() => {
        fetch('/api/google/status').then(r => r.json()).then(setGoogleStatus).catch(() => {});
        if (inputRef.current) inputRef.current.focus();
      }, []);

      // Fetch upload status when existing album is selected
      useEffect(() => {
        if (!existingAlbumId || !useExisting) {
          setUploadedMap(null);
          setNotUploadedMap(null);
          return;
        }
        const photoIds = allPhotos.map(p => p.id);
        fetch('/api/google/upload-status', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ photo_ids: photoIds, album_id: existingAlbumId }),
        })
          .then(r => r.json())
          .then(data => {
            setUploadedMap(data.uploaded || {});
            setNotUploadedMap(data.not_uploaded || {});
          })
          .catch(() => {});
      }, [existingAlbumId, useExisting]);

      const doConnect = () => {
        const port = window.location.port || '8000';
        const redirectUri = `http://localhost:${port}/api/google/callback`;
        setManualRedirectUri(redirectUri);
        setShowManualCode(false);
        setManualCode('');
        setManualError('');
        fetch('/api/google/authorize?port=' + encodeURIComponent(port))
          .then(r => r.json())
          .then(data => {
            if (data.auth_url) {
              const win = window.open(data.auth_url, '_blank', 'width=600,height=700');
              setShowManualCode(true);  // show fallback immediately
              // Also listen for postMessage from auto-redirect success
              const listener = (ev) => {
                if (ev.data === 'google_photos_connected') {
                  window.removeEventListener('message', listener);
                  fetch('/api/google/status').then(r => r.json()).then(setGoogleStatus).catch(() => {});
                  setShowManualCode(false);
                }
              };
              window.addEventListener('message', listener);
            }
          })
          .catch(() => {});
      };

      const doManualCode = async () => {
        const code = manualCode.trim();
        if (!code) return;
        setManualBusy(true);
        setManualError('');
        try {
          const res = await fetch('/api/google/exchange-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code, redirect_uri: manualRedirectUri }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || 'Exchange failed');
          fetch('/api/google/status').then(r => r.json()).then(setGoogleStatus).catch(() => {});
          setShowManualCode(false);
          setManualCode('');
        } catch (err) {
          setManualError(err.message);
        }
        setManualBusy(false);
      };

      const doCancel = () => {
        if (abortCtrlRef.current) {
          abortCtrlRef.current.abort();
          abortCtrlRef.current = null;
        }
        setUploading(false);
        setResult({ cancelled: true });
      };

      const doUpload = async () => {
        const ctrl = new AbortController();
        abortCtrlRef.current = ctrl;
        setUploading(true);
        setFileStatuses({});
        setFileOrder([]);
        setProgressCount({ done: 0, total: 0 });

        const onProgress = (evt) => {
          if (evt.type === 'start') {
            // Pre-populate every file as 'pending' so the list appears immediately
            const order = evt.filenames || [];
            const statuses = {};
            order.forEach(fn => { statuses[fn] = { status: 'pending' }; });
            setFileOrder(order);
            setFileStatuses(statuses);
            setProgressCount({ done: 0, total: evt.total || order.length });
          } else if (evt.type === 'begin') {
            // File is actively uploading bytes
            const { filename, queued, total } = evt;
            setFileStatuses(prev => ({ ...prev, [filename]: { status: 'uploading' } }));
            setProgressCount(prev => ({ ...prev, total }));
          } else if (evt.type === 'bytes_sent') {
            // Raw bytes received by Google, awaiting batchCreate confirmation
            const { filename, queued, total } = evt;
            setFileStatuses(prev => ({ ...prev, [filename]: { status: 'bytes_sent' } }));
            setProgressCount({ done: queued, total });
          } else if (evt.type === 'progress') {
            const { filename, status, done, total, error } = evt;
            setFileStatuses(prev => ({ ...prev, [filename]: { status, error: error || null } }));
            setProgressCount({ done, total });
          }
        };

        try {
          const reuploadIds = selectedReupload.size > 0 ? [...selectedReupload] : undefined;
          const res = await onUpload(
            useExisting ? existingAlbumTitle : albumTitle.trim(),
            includeDesc,
            useExisting ? existingAlbumId : null,
            forceReupload,
            onProgress,
            ctrl.signal,
            reuploadIds,
          );
          // res may be a done summary OR { cancelled: true } from server-side cancel
          setResult(res || { cancelled: true });
        } catch (err) {
          if (err.name === 'AbortError') {
            setResult({ cancelled: true });
          } else {
            setResult({ error: err.message });
          }
        }
        abortCtrlRef.current = null;
        setUploading(false);
      };

      const notConfigured = googleStatus && !googleStatus.configured;
      const notAuthenticated = googleStatus && googleStatus.configured && !googleStatus.authenticated;
      const ready = googleStatus && googleStatus.configured && googleStatus.authenticated;

      return e('div', { className: 'modal-overlay', onClick: onClose },
        e('div', { className: 'modal-content', style: { width: 480, maxHeight: '90vh', overflowY: 'auto' }, onClick: ev => ev.stopPropagation() },
          e('h3', { style: { marginBottom: 16 } }, '\uD83D\uDDBC Upload to Google Photos'),

          // ---- File list (shown while uploading OR after done) ----
          (uploading || (result && !result.error && !result.cancelled && fileOrder.length > 0)) && e('div', {
            style: {
              margin: '0 0 16px 0',
              border: '1px solid var(--border)',
              borderRadius: 6,
              overflow: 'hidden',
            },
          },
            // Header bar
            e('div', {
              style: {
                background: 'var(--surface-2, rgba(255,255,255,0.05))',
                padding: '6px 12px',
                fontSize: 12,
                color: 'var(--text-muted)',
                borderBottom: '1px solid var(--border)',
                display: 'flex',
                justifyContent: 'space-between',
              },
            },
              e('span', null, uploading ? 'Uploading…' : 'Upload complete'),
              progressCount.total > 0 && e('span', null, progressCount.done + ' / ' + progressCount.total),
            ),
            // Scrollable file list
            e('div', {
              style: {
                maxHeight: 220,
                overflowY: 'auto',
                fontSize: 12,
                fontFamily: 'monospace',
              },
            },
              fileOrder.map(filename => {
                const s = fileStatuses[filename] || { status: 'pending' };
                const icon = s.status === 'uploaded'   ? '✓'
                           : s.status === 'readded'    ? '♻'
                           : s.status === 'error'      ? '✗'
                           : s.status === 'bytes_sent' ? '☁'
                           : s.status === 'uploading'  ? '↑'
                           : '·';
                const color = s.status === 'uploaded'   ? 'var(--green)'
                            : s.status === 'readded'    ? '#888'
                            : s.status === 'error'      ? 'var(--red)'
                            : s.status === 'bytes_sent' ? '#6bc46d'
                            : s.status === 'uploading'  ? 'var(--accent, #4a9eff)'
                            : 'var(--text-muted)';
                return e('div', {
                  key: filename,
                  style: {
                    display: 'flex',
                    alignItems: 'center',
                    gap: 8,
                    padding: '3px 12px',
                    borderBottom: '1px solid var(--border)',
                    opacity: s.status === 'pending' ? 0.5 : 1,
                  },
                },
                  e('span', { style: { color, width: 14, flexShrink: 0, textAlign: 'center' } }, icon),
                  e('span', { style: { flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, filename),
                  s.error && e('span', { style: { color: 'var(--red)', fontSize: 11, marginLeft: 4, flexShrink: 0 } }, s.error),
                );
              }),
            ),
          ),

          result ? (
            result.cancelled
              ? e('div', null,
                  e('p', { style: { color: 'var(--text-muted)', marginBottom: 12 } }, 'Upload cancelled.'),
                  e('div', { className: 'modal-actions' },
                    e('button', { className: 'btn btn-primary', onClick: onClose }, 'Close'),
                  ),
                )
              : result.error
              ? e('div', null,
                  e('p', { style: { color: 'var(--red)', marginBottom: 12 } }, 'Upload failed: ' + result.error),
                  e('div', { className: 'modal-actions' },
                    e('button', { className: 'btn btn-primary', onClick: onClose }, 'Close'),
                  ),
                )
              : e('div', null,
                  e('p', { style: { color: 'var(--green)', marginBottom: 8 } },
                    '\u2713 ' + result.uploaded + ' of ' + result.total + ' photos uploaded successfully.',
                  ),
                  result.readded > 0 && e('p', { style: { color: 'var(--text-muted)', fontSize: 13, marginBottom: 8 } },
                    result.readded + ' photo(s) re-synced to album (no re-upload needed).',
                  ),
                  result.errors > 0 && e('p', { style: { color: 'var(--red)', marginBottom: 8, fontSize: 13 } },
                    result.errors + ' photo(s) failed.',
                  ),
                  result.album_id && e('p', { style: { color: 'var(--text-muted)', fontSize: 13, marginBottom: 12 } },
                    result.uploaded > 0 ? 'Album updated in your Google Photos library.' : 'All photos were already in the album.',
                  ),
                  e('div', { className: 'modal-actions' },
                    e('button', { className: 'btn btn-primary', onClick: onClose }, 'Done'),
                  ),
                )
          ) : (
            e('div', null,
              // ---- Not configured ----
              notConfigured && e('div', { style: { background: 'rgba(248,113,113,0.1)', border: '1px solid var(--red)', borderRadius: 6, padding: '12px 14px', marginBottom: 16 } },
                e('p', { style: { fontWeight: 600, marginBottom: 6, color: 'var(--red)', fontSize: 13 } }, 'Setup required'),
                e('p', { style: { fontSize: 13 } },
                  'Place ', e('code', null, 'google_client_secret.json'), ' alongside ', e('code', null, 'photo_index.db'), ', then restart the server.',
                ),
                e(GoogleSetupInstructions, null),
              ),

              // ---- Not authenticated ----
              notAuthenticated && e('div', { style: { background: 'rgba(74,158,255,0.08)', border: '1px solid var(--accent)', borderRadius: 6, padding: '12px 14px', marginBottom: 16, fontSize: 13 } },
                e('p', { style: { fontWeight: 600, marginBottom: 6 } }, 'Connect your Google account'),
                e('p', { style: { color: 'var(--text-muted)', marginBottom: 10 } },
                  'A sign-in window will open. After authorizing, you\'ll be connected automatically.',
                ),
                !showManualCode && e('button', { className: 'btn btn-primary', onClick: doConnect }, 'Connect Google Photos'),

                // Manual code fallback (shown after Connect is clicked)
                showManualCode && e('div', { style: { marginTop: 10 } },
                  e('p', { style: { marginBottom: 8 } },
                    'Sign in window opened. If it connected, close the window and click ',
                    e('strong', null, 'Check status'),
                    ' below.',
                  ),
                  e('details', { style: { marginTop: 10 } },
                    e('summary', { style: { cursor: 'pointer', color: 'var(--text-muted)', fontSize: 12, marginBottom: 8 } },
                      'Accessing from a NAS or got an error page? Click here',
                    ),
                    e('div', { style: { marginTop: 8 } },
                      e('p', { style: { fontSize: 12, color: 'var(--text-muted)', marginBottom: 6 } },
                        'Google redirected to ', e('code', null, 'localhost'), ' which may not reach your NAS. ',
                        'Look at the URL in the error page — it contains ', e('code', null, 'code=XXXX'), '. ',
                        'Copy that code and paste it here:',
                      ),
                      e('input', {
                        type: 'text',
                        placeholder: 'Paste authorization code here',
                        value: manualCode,
                        onChange: ev => setManualCode(ev.target.value),
                        onKeyDown: ev => ev.key === 'Enter' && doManualCode(),
                        style: { marginBottom: 6 },
                      }),
                      manualError && e('p', { style: { color: 'var(--red)', fontSize: 12, marginBottom: 6 } }, manualError),
                      e('button', {
                        className: 'btn btn-primary',
                        onClick: doManualCode,
                        disabled: manualBusy || !manualCode.trim(),
                        style: { fontSize: 12 },
                      }, manualBusy ? 'Connecting\u2026' : 'Submit code'),
                    ),
                  ),
                  e('div', { style: { marginTop: 10, display: 'flex', gap: 8 } },
                    e('button', {
                      className: 'btn btn-sm',
                      onClick: () => fetch('/api/google/status').then(r => r.json()).then(d => { setGoogleStatus(d); if (d.authenticated) setShowManualCode(false); }),
                    }, 'Check status'),
                    e('button', { className: 'btn btn-sm', onClick: doConnect }, 'Re-open sign-in'),
                  ),
                ),
              ),

              googleStatus === null && e('p', { style: { color: 'var(--text-muted)', fontSize: 13, marginBottom: 12 } }, 'Checking Google Photos status\u2026'),

              // ---- Ready ----
              ready && e('p', { style: { color: 'var(--green)', fontSize: 13, marginBottom: 14 } },
                '\u2713 Connected to Google Photos',
              ),

              e('p', { style: { color: 'var(--text-muted)', fontSize: 13, marginBottom: 14 } },
                photoCount + ' photo' + (photoCount !== 1 ? 's' : '') + ' in this collection.',
              ),

              // Existing album toggle
              existingAlbumId && e('div', { style: { marginBottom: 14 } },
                e('label', { style: { display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, cursor: 'pointer', marginBottom: 6 } },
                  e('input', { type: 'radio', checked: useExisting, onChange: () => setUseExisting(true), disabled: uploading }),
                  e('span', null, 'Add to existing album: ', e('strong', null, existingAlbumTitle || existingAlbumId)),
                ),

                // Upload status breakdown when using existing album
                useExisting && uploadedMap && notUploadedMap && e('div', { style: { marginLeft: 26, marginBottom: 8, fontSize: 12 } },
                  e('p', { style: { color: 'var(--text-muted)', marginBottom: 4 } },
                    Object.keys(notUploadedMap).length + ' new, ' +
                    Object.keys(uploadedMap).length + ' already uploaded',
                  ),

                  // Show previously uploaded photos with checkboxes for re-upload
                  Object.keys(uploadedMap).length > 0 && e('div', { style: { marginTop: 6 } },
                    e('div', { style: {
                      display: 'flex', alignItems: 'center', gap: 6,
                      marginBottom: 4, color: 'var(--text-muted)', fontSize: 11,
                    } },
                      'Select any to force re-upload',
                      e('span', { style: { fontSize: 10, opacity: 0.7 } }, ' (needed if removed from album in Google Photos)'),

                    e('div', {
                      style: {
                        maxHeight: 120,
                        overflowY: 'auto',
                        border: '1px solid var(--border)',
                        borderRadius: 4,
                        padding: '2px 0',
                      },
                    },
                      // Select all / none toggle
                      e('label', {
                        style: {
                          display: 'flex', alignItems: 'center', gap: 6,
                          padding: '3px 8px', cursor: 'pointer',
                          borderBottom: '1px solid var(--border)',
                          fontWeight: 500, fontSize: 11, color: 'var(--text-muted)',

                      },

                          type: 'checkbox',

    // -----------------------------------------------------------------------
    // Collection Detail View
    // -----------------------------------------------------------------------
    function CollectionDetail({ collectionId }) {
      const [collection, setCollection] = useState(null);
      const [photos, setPhotos] = useState([]);
      const [sortBy, setSortBy] = useState('relevance');  // 'relevance' = manual/original order
      const [selectedForRemoval, setSelectedForRemoval] = useState(new Set());
      const [showRename, setShowRename] = useState(false);
      const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
      const [showGoogleUpload, setShowGoogleUpload] = useState(false);
      const [modalIdx, setModalIdx] = useState(null);
      const [error, setError] = useState(null);
      const [persons, setPersons] = useState([]);

      // ---- Stack expansion state ----
      const [expandedStacks, setExpandedStacks] = useState(new Set());
      const [stackMembers, setStackMembers] = useState({});

      const toggleStack = useCallback((stackId) => {
        setExpandedStacks(prev => {
          const next = new Set(prev);
          if (next.has(stackId)) {
            next.delete(stackId);
          } else {
            next.add(stackId);
            if (!stackMembers[stackId]) {
              fetch('/api/stacks/' + stackId)
                .then(r => r.json())
                .then(data => {
                  if (data && data.members) {
                    setStackMembers(prev => ({ ...prev, [stackId]: data.members }));
                  }
                });
            }
          }
          return next;
        });
      }, [stackMembers]);

      const expandAllStacks = useCallback(() => {
        const stackIds = new Set();
        photos.forEach(r => { if (r.stack_id && r.stack_count > 1) stackIds.add(r.stack_id); });
        stackIds.forEach(sid => {
          if (!stackMembers[sid]) {
            fetch('/api/stacks/' + sid)
              .then(r => r.json())
              .then(data => {
                if (data && data.members) {
                  setStackMembers(prev => ({ ...prev, [sid]: data.members }));
                }
              });
          }
        });
        setExpandedStacks(stackIds);
      }, [photos, stackMembers]);

      const collapseAllStacks = useCallback(() => { setExpandedStacks(new Set()); }, []);

      const sortedPhotos = useMemo(() => PS.applySortOrder(photos, sortBy), [photos, sortBy]);

      const displayItems = useMemo(() => {
        // Every photo in the collection was explicitly added — always show it.
        // Stack expand/collapse only affects extra members fetched from the stack API.
        const added = new Set();
        const items = [];
        sortedPhotos.forEach(photo => {
          if (added.has(photo.id)) return;
          added.add(photo.id);
          items.push({ photo, isStackMember: false });
          // When this is the top photo and the stack is expanded, insert extra stack members
          const stackIsExpanded = photo.stack_id && expandedStacks.has(photo.stack_id);
          if (photo.stack_is_top && stackIsExpanded && stackMembers[photo.stack_id]) {
            stackMembers[photo.stack_id].forEach(m => {
              if (m.id !== photo.id && !added.has(m.id)) {
                added.add(m.id);
                items.push({ photo: m, isStackMember: true, stackId: photo.stack_id });
              }
            });
          }
        });
        return items;
      }, [sortedPhotos, expandedStacks, stackMembers]);

      const hasStacks = photos.some(p => p.stack_id && p.stack_count > 1);
      const visibleCount = displayItems.length;
      // Total photos including all stack members (replace each top photo's 1 count with its stack_count)
      const stackedTotal = useMemo(() => {
        let total = sortedPhotos.length;
        sortedPhotos.forEach(p => {
          if (p.stack_id && p.stack_count > 1 && p.stack_is_top) total += p.stack_count - 1;
        });
        return total;
      }, [sortedPhotos]);

      const load = useCallback(() => {
        fetch(`/api/collections/${collectionId}`).then(r => r.json()).then(data => {
          if (data.error) { setError(data.error); return; }
          setCollection(data.collection);
          setPhotos(data.photos || []);
        });
      }, [collectionId]);

      useEffect(() => {
        load();
        fetch('/api/persons').then(r => r.json()).then(d => setPersons(d.persons || [])).catch(() => {});
      }, [load]);

      const doRename = async (name) => {
        const res = await fetch(`/api/collections/${collectionId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name }),
        });
        if (res.ok) {
          setShowRename(false);
          load();
        }
      };

      const doDelete = async () => {
        await fetch(`/api/collections/${collectionId}`, { method: 'DELETE' });
        window.location.href = '/collections';
      };

      const toggleRemoval = (photoId) => {
        setSelectedForRemoval(prev => {
          const next = new Set(prev);
          if (next.has(photoId)) next.delete(photoId);
          else next.add(photoId);
          return next;
        });
      };

      const doRemoveSelected = async () => {
        const ids = Array.from(selectedForRemoval);
        if (!ids.length) return;
        await fetch(`/api/collections/${collectionId}/photos/remove`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ photo_ids: ids }),
        });
        setSelectedForRemoval(new Set());
        load();
      };

      const doGoogleUpload = async (albumTitle, includeDesc, existingAlbumId, forceReupload, onProgress, signal, forceReuploadIds) => {
        const photoIds = photos.map(p => p.id);
        const payload = {
            photo_ids: photoIds,
            album_title: albumTitle,
            album_id: existingAlbumId || undefined,
            collection_id: collectionId,
            include_description: includeDesc,
            force_reupload: forceReupload || false,
        };
        if (forceReuploadIds && forceReuploadIds.length > 0) {
            payload.force_reupload_ids = forceReuploadIds;
        }
        const res = await fetch('/api/google/upload', {
          method: 'POST',
          signal,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `Upload failed (${res.status})`);
        }
        // Stream SSE response
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop(); // keep incomplete last line
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            let evt;
            try { evt = JSON.parse(line.slice(6)); } catch { continue; }
            if (onProgress) onProgress(evt);
            if (evt.type === 'done') {
              load(); // refresh collection so google_photos_album_id is up to date
              return evt;
            }
            if (evt.type === 'cancelled') {
              return { cancelled: true };
            }
            if (evt.type === 'fatal') {
              throw new Error(evt.message || 'Upload failed');
            }
          }
        }
        throw new Error('Stream ended without a done event');
      };

      if (error) {
        return e('div', null,
          e('a', { href: '/collections', className: 'back-link' }, '\u2190 Collections'),
          e('div', { className: 'empty-state' }, e('p', null, error)),
        );
      }
      if (!collection) return e('div', { style: { padding: 40, textAlign: 'center', color: 'var(--text-muted)' } }, 'Loading...');

      const modalPhoto = modalIdx !== null ? photos[modalIdx] : null;

      return e('div', null,
        e('a', { href: '/collections', className: 'back-link' }, '\u2190 All Collections'),

        e('div', { className: 'page-header' },
          e('div', { style: { display: 'flex', alignItems: 'baseline', gap: 12 } },
            e('h2', {
              className: 'editable',
              onClick: () => setShowRename(true),
              title: 'Click to rename',
            }, collection.name),
            e('span', { className: 'subtitle' },
              `${visibleCount} photo${visibleCount !== 1 ? 's' : ''}` +
              (hasStacks ? ` (${stackedTotal} with stacks)` : '')),
          ),
          e('div', { style: { display: 'flex', gap: 8, flexWrap: 'wrap' } },
            photos.length > 0 && e('button', {
              className: 'btn btn-sm',
              onClick: () => setShowGoogleUpload(true),
              title: 'Upload collection to Google Photos',
              style: { color: '#4a9eff' },
            }, '\uD83D\uDDBC\uFE0F Upload to Google Photos'),
            e('button', { className: 'btn btn-sm', onClick: () => setShowRename(true) }, 'Rename'),
            e('button', { className: 'btn btn-sm btn-danger', onClick: () => setShowDeleteConfirm(true) }, 'Delete'),
          ),
        ),

        showDeleteConfirm && e('div', { className: 'confirm-bar' },
          e('span', null, `Delete "${collection.name}"? This cannot be undone. Photos are not affected.`),
          e('div', { style: { display: 'flex', gap: 8 } },
            e('button', { className: 'btn btn-sm', onClick: () => setShowDeleteConfirm(false) }, 'Cancel'),
            e('button', { className: 'btn btn-sm btn-danger', onClick: doDelete }, 'Delete'),
          ),
        ),

        selectedForRemoval.size > 0 && e('div', { className: 'confirm-bar', style: { borderColor: 'var(--accent)', background: 'rgba(74,158,255,0.1)' } },
          e('span', null, `${selectedForRemoval.size} photo${selectedForRemoval.size !== 1 ? 's' : ''} selected`),
          e('div', { style: { display: 'flex', gap: 8 } },
            e('button', { className: 'btn btn-sm', onClick: () => setSelectedForRemoval(new Set()) }, 'Cancel'),
            e('button', { className: 'btn btn-sm btn-danger', onClick: doRemoveSelected }, 'Remove from Collection'),
          ),
        ),

        photos.length === 0 && e('div', { className: 'empty-state' },
          e('div', { className: 'icon' }, '\ud83d\uddbc'),
          e('p', null, 'This collection is empty. Add photos from Search or Review.'),
        ),

        photos.length > 0 && e('div', { style: { display: 'flex', justifyContent: 'flex-end', alignItems: 'center', gap: 8, marginBottom: 8 } },
          e(PS.SortControl, { value: sortBy, onChange: setSortBy, options: ['relevance', 'date_desc', 'date_asc', 'quality_desc'] }),
          hasStacks && e('button', {
            className: 'btn btn-sm',
            onClick: () => { expandedStacks.size > 0 ? collapseAllStacks() : expandAllStacks(); },
          }, expandedStacks.size > 0 ? 'Close Stacks' : 'Expand Stacks'),
        ),

        photos.length > 0 && e('div', { className: 'photo-grid' },
          displayItems.map((item, i) => {
            const p = item.photo;
            const isExpanded = p.stack_id && expandedStacks.has(p.stack_id);
            const showBadge = p.stack_count > 1 && p.stack_is_top;
            return e('div', {
              key: (item.isStackMember ? 'sm-' : '') + p.id,
              className: `thumb-wrap ${selectedForRemoval.has(p.id) ? 'selected' : ''} ${item.isStackMember ? 'stack-member' : ''}`,
              onClick: (ev) => {
                if (ev.shiftKey) { toggleRemoval(p.id); return; }
                // Find index in original photos array for modal nav
                const origIdx = photos.findIndex(pp => pp.id === p.id);
                setModalIdx(origIdx >= 0 ? origIdx : 0);
              },
              onContextMenu: (ev) => { ev.preventDefault(); toggleRemoval(p.id); },
            },
              e('img', { src: `/api/photos/${p.id}/thumbnail`, alt: p.filename, loading: 'lazy' }),
              showBadge && e('span', {
                className: 'stack-badge',
                onClick: (ev) => { ev.stopPropagation(); toggleStack(p.stack_id); },
              }, isExpanded ? '\u2715' : '\u00d7' + p.stack_count),
              e('span', { className: 'remove-badge' }, '\u00d7'),
            );
          }),
        ),

        // Photo modal
        modalPhoto && e(PhotoDetailModal, {
          photo: modalPhoto,
          index: modalIdx,
          total: photos.length,
          onClose: () => setModalIdx(null),
          onPrev: modalIdx > 0 ? () => setModalIdx(modalIdx - 1) : null,
          onNext: modalIdx < photos.length - 1 ? () => setModalIdx(modalIdx + 1) : null,
          persons: persons,
          onFaceAssigned: (faceId, personName) => {
            fetch('/api/persons').then(r => r.json()).then(d => setPersons(d.persons || [])).catch(() => {});
          },
          onStackNavigate: (member) => {
            const origIdx = photos.findIndex(pp => pp.id === member.id);
            if (origIdx >= 0) setModalIdx(origIdx);
          },
        }),

        showRename && e(RenameModal, {
          currentName: collection.name,
          onClose: () => setShowRename(false),
          onRename: doRename,
        }),

        showGoogleUpload && e(GoogleUploadModal, {
          collectionName: collection.name,
          photos: photos,
          existingAlbumId: collection.google_photos_album_id || null,
          existingAlbumTitle: collection.google_photos_album_title || null,
          onClose: () => setShowGoogleUpload(false),
          onUpload: doGoogleUpload,
        }),
      );
    }

    // -----------------------------------------------------------------------
    // App — routes based on URL
    // -----------------------------------------------------------------------
    function App() {
      // Parse URL: /collections or /collections/:id
      const path = window.location.pathname;
      const match = path.match(/^\/collections\/(\d+)/);
      const collectionId = match ? parseInt(match[1]) : null;

      return e('div', null,
        // Header
        e(PS.SharedHeader, { activePage: 'collections' }),
        // Content
        e('div', { className: 'container' },
          collectionId
            ? e(CollectionDetail, { collectionId })
            : e(CollectionsList),
        ),
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(e(App));
  </script>
</body>
</html>
