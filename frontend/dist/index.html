<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #333;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #4a9eff;
      --accent-hover: #6bb3ff;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo {
      font-size: 18px;
      font-weight: 600;
      white-space: nowrap;
      color: var(--text);
    }
    .logo span { color: var(--accent); }

    /* Search form */
    .search-form {
      display: flex;
      gap: 8px;
      flex: 1;
      max-width: 800px;
    }
    .search-input {
      flex: 1;
      padding: 10px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }

    .search-btn {
      padding: 10px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .search-btn:hover { background: var(--accent-hover); }
    .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Filter bar */
    .filters {
      max-width: 1400px;
      margin: 0 auto;
      padding: 12px 24px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .filter-label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .filter-input {
      padding: 6px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      outline: none;
      width: 140px;
    }
    .filter-input:focus { border-color: var(--accent); }

    .stats-bar {
      font-size: 13px;
      color: var(--text-muted);
      margin-left: auto;
    }

    /* Photo grid */
    .content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 8px 24px 40px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 8px;
    }
    .grid-item {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: var(--radius);
      cursor: pointer;
      background: var(--surface);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .grid-item:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .grid-item .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .grid-item:hover .overlay { opacity: 1; }
    .overlay .filename { font-weight: 500; }
    .overlay .score { color: var(--accent); float: right; }

    /* Color dots */
    .color-dots {
      display: flex;
      gap: 3px;
      margin-top: 4px;
    }
    .color-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* Nav arrows */
    .modal-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      border: none;
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 210;
      transition: background 0.15s;
    }
    .modal-nav:hover { background: rgba(0,0,0,0.8); }
    .modal-nav.prev { left: 16px; }
    .modal-nav.next { right: 56px; }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal {
      background: var(--surface);
      border-radius: 12px;
      max-width: 1200px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: row;
    }
    .modal-image {
      flex: 1;
      min-width: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px 0 0 12px;
      max-height: 90vh;
    }
    .modal-image img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
    }
    .modal-sidebar {
      width: 340px;
      flex-shrink: 0;
      padding: 24px;
      border-left: 1px solid var(--border);
      overflow-y: auto;
      max-height: 90vh;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.6);
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 210;
    }
    .modal-close:hover { background: rgba(0,0,0,0.8); }

    .detail-section {
      margin-bottom: 20px;
    }
    .detail-section h3 {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .detail-section p {
      font-size: 14px;
      line-height: 1.6;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }
    .detail-row .label { color: var(--text-muted); }
    .face-tag {
      display: inline-block;
      padding: 4px 10px;
      background: var(--surface2);
      border-radius: 12px;
      font-size: 13px;
      margin: 2px 4px 2px 0;
      cursor: pointer;
      transition: background 0.15s, outline 0.15s;
    }
    .face-tag:hover, .face-tag.active {
      background: var(--accent);
      color: #fff;
    }
    .face-tag .match-badge {
      font-size: 10px;
      margin-left: 4px;
      opacity: 0.7;
    }
    .face-edit-panel {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin: 4px 0;
      padding: 8px 10px;
      background: var(--surface2);
      border-radius: 8px;
      font-size: 13px;
    }
    .face-edit-panel select,
    .face-edit-panel input {
      font-size: 13px;
      padding: 4px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      outline: none;
      width: 100%;
    }
    .face-edit-panel select:focus,
    .face-edit-panel input:focus { border-color: var(--accent); }
    .face-edit-buttons {
      display: flex;
      gap: 6px;
      margin-top: 2px;
    }
    .face-edit-buttons button {
      flex: 1;
      padding: 4px 0;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
    }
    .face-edit-buttons button:hover { border-color: var(--accent); }
    .face-edit-buttons button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .face-edit-buttons button.danger {
      border-color: #f87171;
      color: #f87171;
    }
    .face-edit-buttons button.danger:hover { background: #f87171; color: #fff; }
    .face-bbox-overlay {
      position: absolute;
      border: 2px solid var(--accent);
      border-radius: 4px;
      pointer-events: none;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.4);
      transition: opacity 0.15s;
    }
    .face-bbox-label {
      position: absolute;
      bottom: 100%;
      left: -2px;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 4px 4px 0 0;
      white-space: nowrap;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    .empty-state h2 {
      font-size: 24px;
      color: var(--text);
      margin-bottom: 12px;
      font-weight: 500;
    }
    .empty-state p { font-size: 15px; max-width: 500px; margin: 0 auto 8px; }

    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-muted);
      font-size: 15px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header-inner { flex-wrap: wrap; }
      .search-form { width: 100%; }
      .modal { flex-direction: column; }
      .modal-image { border-radius: 12px 12px 0 0; max-height: 50vh; }
      .modal-sidebar { width: 100%; border-left: none; border-top: 1px solid var(--border); }
      .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>

  <script>
    const { useState, useEffect, useCallback, useRef, useMemo } = React;
    const e = React.createElement;

    const API = '';  // Same origin

    // Read URL search params
    function getUrlParams() {
      const p = new URLSearchParams(window.location.search);
      return {
        q: p.get('q') || '',
        person: p.get('person') || '',
        color: p.get('color') || '',
        location: p.get('location') || '',
        date_from: p.get('date_from') || '',
        date_to: p.get('date_to') || '',
        min_quality: p.get('min_quality') || '',
        sort_quality: p.get('sort_quality') === 'true',
        match_source: p.get('match_source') || '',
      };
    }

    // -----------------------------------------------------------------------
    // App
    // -----------------------------------------------------------------------
    function App() {
      const initParams = getUrlParams();
      const [query, setQuery] = useState(initParams.q);
      const [personFilter, setPersonFilter] = useState(initParams.person);
      const [matchSource, setMatchSource] = useState(initParams.match_source);
      const [colorFilter, setColorFilter] = useState(initParams.color);
      const [minQuality, setMinQuality] = useState(initParams.min_quality);
      const [sortQuality, setSortQuality] = useState(initParams.sort_quality);
      const [locationFilter, setLocationFilter] = useState(initParams.location);
      const [dateFrom, setDateFrom] = useState(initParams.date_from);
      const [dateTo, setDateTo] = useState(initParams.date_to);
      const [results, setResults] = useState(null);
      const [loading, setLoading] = useState(false);
      const [selectedPhoto, setSelectedPhoto] = useState(null);
      const [photoDetail, setPhotoDetail] = useState(null);
      const [stats, setStats] = useState(null);
      const [persons, setPersons] = useState([]);
      const inputRef = useRef(null);
      const hasAutoSearched = useRef(false);

      // Load stats and persons on mount
      useEffect(() => {
        fetch(API + '/api/stats').then(r => r.json()).then(setStats).catch(() => {});
        fetch(API + '/api/persons').then(r => r.json()).then(d => setPersons(d.persons || [])).catch(() => {});
        if (inputRef.current) inputRef.current.focus();
      }, []);

      const doSearch = useCallback((ev) => {
        if (ev) ev.preventDefault();
        const mqVal = minQuality ? parseFloat(minQuality) : null;
        if (!query && !personFilter && !colorFilter && !locationFilter && !dateFrom && !dateTo && mqVal == null && !matchSource) return;
        setLoading(true);
        setResults(null);

        const params = new URLSearchParams();
        if (query) params.set('q', query);
        if (personFilter) params.set('person', personFilter);
        if (colorFilter) params.set('color', colorFilter);
        if (locationFilter) params.set('location', locationFilter);
        if (dateFrom) params.set('date_from', dateFrom);
        if (dateTo) params.set('date_to', dateTo);
        if (mqVal != null && !isNaN(mqVal)) params.set('min_quality', mqVal);
        if (sortQuality) params.set('sort_quality', 'true');
        if (matchSource) params.set('match_source', matchSource);

        // Update browser URL without reload
        const urlParams = new URLSearchParams(params);
        const newUrl = window.location.pathname + (urlParams.toString() ? '?' + urlParams.toString() : '');
        window.history.pushState(null, '', newUrl);

        params.set('limit', '100');

        fetch(API + '/api/search?' + params.toString())
          .then(r => r.json())
          .then(data => {
            setResults(data.results || []);
            setLoading(false);
          })
          .catch(() => {
            setResults([]);
            setLoading(false);
          });
      }, [query, personFilter, colorFilter, minQuality, sortQuality, locationFilter, dateFrom, dateTo, matchSource]);

      // Auto-search on mount if URL has params
      useEffect(() => {
        if (hasAutoSearched.current) return;
        const p = getUrlParams();
        if (p.q || p.person || p.color || p.location || p.date_from || p.date_to || p.min_quality || p.match_source) {
          hasAutoSearched.current = true;
          doSearch();
        }
      }, [doSearch]);

      const [selectedIndex, setSelectedIndex] = useState(-1);

      const openPhotoAt = useCallback((index) => {
        if (!results || results.length === 0) return;
        // Wrap around for looping
        const i = ((index % results.length) + results.length) % results.length;
        const photo = results[i];
        setSelectedIndex(i);
        setSelectedPhoto(photo);
        setPhotoDetail(null);
        fetch(API + '/api/photos/' + photo.id)
          .then(r => r.json())
          .then(setPhotoDetail)
          .catch(() => {});
      }, [results]);

      const openPhoto = useCallback((photo) => {
        const idx = results ? results.findIndex(r => r.id === photo.id) : -1;
        openPhotoAt(idx >= 0 ? idx : 0);
      }, [results, openPhotoAt]);

      const closeModal = useCallback(() => {
        setSelectedPhoto(null);
        setSelectedIndex(-1);
        setPhotoDetail(null);
      }, []);

      const goPrev = useCallback(() => { openPhotoAt(selectedIndex - 1); }, [selectedIndex, openPhotoAt]);
      const goNext = useCallback(() => { openPhotoAt(selectedIndex + 1); }, [selectedIndex, openPhotoAt]);

      // When a face is assigned/unset in the modal, update the detail in place
      const handleFaceAssigned = useCallback((faceId, personName) => {
        setPhotoDetail(prev => {
          if (!prev || !prev.faces) return prev;
          return {
            ...prev,
            faces: prev.faces.map(f =>
              f.id === faceId
                ? { ...f, person_name: personName, match_source: personName ? 'manual' : null }
                : f
            ),
          };
        });
        // Refresh persons list for the sidebar filter
        fetch(API + '/api/persons').then(r => r.json()).then(d => setPersons(d.persons || [])).catch(() => {});
      }, []);

      // Keyboard: Escape closes modal, arrows navigate
      useEffect(() => {
        const handler = (ev) => {
          if (!selectedPhoto) return;
          if (ev.key === 'Escape') closeModal();
          else if (ev.key === 'ArrowLeft') { ev.preventDefault(); goPrev(); }
          else if (ev.key === 'ArrowRight') { ev.preventDefault(); goNext(); }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [selectedPhoto, closeModal, goPrev, goNext]);

      return e('div', null,
        // Header
        e('div', { className: 'header' },
          e('div', { className: 'header-inner' },
            e('div', { className: 'logo' }, e('span', null, 'photo'), 'search'),
            e('a', { href: '/review', style: { fontSize: 13, color: 'var(--accent)', textDecoration: 'none', marginLeft: 4 } }, 'Review'),
            e('a', { href: '/faces', style: { fontSize: 13, color: 'var(--accent)', textDecoration: 'none', marginLeft: 4 } }, 'Faces'),
            e('form', { className: 'search-form', onSubmit: doSearch },
              e('input', {
                ref: inputRef,
                className: 'search-input',
                type: 'text',
                placeholder: 'Search photos... (e.g. "kids playing on the beach")',
                value: query,
                onChange: (ev) => setQuery(ev.target.value),
              }),
              e('button', {
                className: 'search-btn',
                type: 'submit',
                disabled: loading,
              }, loading ? 'Searching...' : 'Search'),
            ),
          ),
        ),

        // Filters bar
        e('div', { className: 'filters' },
          e('div', { className: 'filter-group' },
            e('span', { className: 'filter-label' }, 'Person:'),
            e('select', {
              className: 'filter-input',
              value: personFilter,
              onChange: (ev) => setPersonFilter(ev.target.value),
              style: { width: 160 },
            },
              e('option', { value: '' }, 'Any'),
              ...persons.map(p =>
                e('option', { key: p.id, value: p.name },
                  p.name + ' (' + p.photo_count + ')')
              ),
            ),
          ),
          e('div', { className: 'filter-group' },
            e('span', { className: 'filter-label' }, 'Match:'),
            e('select', {
              className: 'filter-input',
              value: matchSource,
              onChange: (ev) => setMatchSource(ev.target.value),
              style: { width: 130 },
            },
              e('option', { value: '' }, 'Any'),
              e('option', { value: 'strict' }, 'Strict only'),
              e('option', { value: 'temporal' }, 'Temporal only'),
            ),
          ),
          e('div', { className: 'filter-group' },
            e('span', { className: 'filter-label' }, 'Color:'),
            e('input', {
              className: 'filter-input',
              type: 'text',
              placeholder: 'blue, #ff0000',
              value: colorFilter,
              onChange: (ev) => setColorFilter(ev.target.value),
              style: { width: 120 },
            }),
          ),
          e('div', { className: 'filter-group' },
            e('span', { className: 'filter-label' }, 'Location:'),
            e('input', {
              className: 'filter-input',
              type: 'text',
              placeholder: 'Hawaii, Paris...',
              value: locationFilter,
              onChange: (ev) => setLocationFilter(ev.target.value),
              style: { width: 130 },
            }),
          ),
          e('div', { className: 'filter-group' },
            e('span', { className: 'filter-label' }, 'From:'),
            e('input', {
              className: 'filter-input',
              type: 'date',
              value: dateFrom,
              onChange: (ev) => setDateFrom(ev.target.value),
              style: { width: 130 },
            }),
          ),
          e('div', { className: 'filter-group' },
            e('span', { className: 'filter-label' }, 'To:'),
            e('input', {
              className: 'filter-input',
              type: 'date',
              value: dateTo,
              onChange: (ev) => setDateTo(ev.target.value),
              style: { width: 130 },
            }),
          ),
          e('div', { className: 'filter-group' },
            e('span', { className: 'filter-label' }, 'Min quality:'),
            e('input', {
              className: 'filter-input',
              type: 'number',
              placeholder: '1–10',
              value: minQuality,
              onChange: (ev) => setMinQuality(ev.target.value),
              min: 1, max: 10, step: 0.5,
              style: { width: 72 },
            }),
          ),
          e('div', { className: 'filter-group' },
            e('label', {
              style: { display: 'flex', alignItems: 'center', gap: 4, cursor: 'pointer',
                       fontSize: 13, color: 'var(--text-muted)' },
            },
              e('input', {
                type: 'checkbox',
                checked: sortQuality,
                onChange: (ev) => setSortQuality(ev.target.checked),
              }),
              'Sort by quality',
            ),
          ),
          stats && e('div', { className: 'stats-bar' },
            stats.photos + ' photos indexed · ' +
            stats.described + ' described · ' +
            (stats.quality_scored || 0) + ' scored' +
            (stats.quality_stats ? ' (' + stats.quality_stats.min + '–' + stats.quality_stats.max + ')' : '')
          ),
        ),

        // Content
        e('div', { className: 'content' },
          results === null && !loading && e(EmptyState),
          loading && e('div', { className: 'loading' }, 'Searching...'),
          results !== null && !loading && results.length === 0 &&
            e('div', { className: 'loading' }, 'No results found.'),
          results !== null && results.length > 0 &&
            e(PhotoGrid, { results, onSelect: openPhoto }),
        ),

        // Modal
        selectedPhoto && e(PhotoModal, {
          photo: selectedPhoto,
          detail: photoDetail,
          onClose: closeModal,
          onPrev: goPrev,
          onNext: goNext,
          index: selectedIndex,
          total: results ? results.length : 0,
          onFaceAssigned: handleFaceAssigned,
          persons: persons,
        }),
      );
    }


    // -----------------------------------------------------------------------
    // Empty state
    // -----------------------------------------------------------------------
    function EmptyState() {
      return e('div', { className: 'empty-state' },
        e('h2', null, 'Search your photo library'),
        e('p', null, 'Describe what you\'re looking for in natural language, filter by person or color, or combine them.'),
        e('p', { style: { color: 'var(--text-muted)', fontSize: 13 } },
          'Try: "people outdoors" · "kids playing" · "sunset" · "bird on a branch"'
        ),
      );
    }


    // -----------------------------------------------------------------------
    // Photo grid
    // -----------------------------------------------------------------------
    function PhotoGrid({ results, onSelect }) {
      return e('div', null,
        e('div', { style: { marginBottom: 12, fontSize: 13, color: 'var(--text-muted)' } },
          results.length + ' result' + (results.length !== 1 ? 's' : ''),
        ),
        e('div', { className: 'grid' },
          ...results.map(photo =>
            e(GridItem, { key: photo.id, photo, onClick: () => onSelect(photo) })
          ),
        ),
      );
    }

    function GridItem({ photo, onClick }) {
      const [loaded, setLoaded] = useState(false);
      const [error, setError] = useState(false);

      return e('div', { className: 'grid-item', onClick },
        !error && e('img', {
          src: API + '/api/photos/' + photo.id + '/thumbnail?v=' + encodeURIComponent(photo.filename),
          alt: photo.filename,
          loading: 'lazy',
          onLoad: () => setLoaded(true),
          onError: () => setError(true),
          style: loaded ? {} : { opacity: 0 },
        }),
        error && e('div', {
          style: {
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            height: '100%', color: 'var(--text-muted)', fontSize: 13,
          }
        }, photo.filename),
        e('div', { className: 'overlay' },
          e('span', { className: 'filename' }, photo.filename),
          e('span', { style: { float: 'right', display: 'flex', gap: 8 } },
            photo.aesthetic_score != null && e('span', {
              style: { color: photo.aesthetic_score >= 6 ? '#4ade80' : photo.aesthetic_score >= 4.5 ? '#facc15' : '#f87171' },
              title: 'Aesthetic quality',
            }, '\u2605' + photo.aesthetic_score.toFixed(1)),
            photo.score != null && e('span', { className: 'score' }, photo.score.toFixed(3)),
          ),
          photo.colors && photo.colors.length > 0 &&
            e('div', { className: 'color-dots' },
              ...photo.colors.slice(0, 5).map((c, i) =>
                e('span', { key: i, className: 'color-dot', style: { background: c } })
              ),
            ),
        ),
      );
    }


    // -----------------------------------------------------------------------
    // Photo modal
    // -----------------------------------------------------------------------
    function PhotoModal({ photo, detail, onClose, onPrev, onNext, index, total, onFaceAssigned, persons }) {
      const [hoveredFace, setHoveredFace] = useState(null);
      const [editingFace, setEditingFace] = useState(null);  // face id being edited
      const [editMode, setEditMode] = useState('pick');       // 'pick' (dropdown) or 'new' (text input)
      const [editName, setEditName] = useState('');
      const [editPick, setEditPick] = useState('');
      const [imgRect, setImgRect] = useState(null);
      const imgRef = useRef(null);
      const editInputRef = useRef(null);

      // Focus the text input when switching to new-name mode
      useEffect(() => {
        if (editingFace && editMode === 'new' && editInputRef.current) editInputRef.current.focus();
      }, [editingFace, editMode]);

      const cancelEdit = useCallback(() => {
        setEditingFace(null);
        setEditMode('pick');
        setEditName('');
        setEditPick('');
      }, []);

      const saveExistingName = useCallback((faceId) => {
        if (!editPick) return;
        fetch(API + '/api/faces/' + faceId + '/assign?name=' + encodeURIComponent(editPick), { method: 'POST' })
          .then(r => r.json())
          .then(data => {
            if (data.ok && onFaceAssigned) onFaceAssigned(faceId, data.person_name);
            cancelEdit();
          })
          .catch(() => cancelEdit());
      }, [editPick, onFaceAssigned, cancelEdit]);

      const saveNewName = useCallback((faceId) => {
        const name = editName.trim();
        if (!name) return;
        fetch(API + '/api/faces/' + faceId + '/assign?name=' + encodeURIComponent(name), { method: 'POST' })
          .then(r => r.json())
          .then(data => {
            if (data.ok && onFaceAssigned) onFaceAssigned(faceId, data.person_name);
            cancelEdit();
          })
          .catch(() => cancelEdit());
      }, [editName, onFaceAssigned, cancelEdit]);

      const clearFaceName = useCallback((faceId) => {
        fetch(API + '/api/faces/' + faceId + '/clear', { method: 'POST' })
          .then(r => r.json())
          .then(data => {
            if (data.ok && onFaceAssigned) onFaceAssigned(faceId, null);
            cancelEdit();
          })
          .catch(() => cancelEdit());
      }, [onFaceAssigned, cancelEdit]);

      // Compute the displayed image rect relative to the modal-image container.
      // Two offsets: (a) img element within flex container, (b) object-fit:contain
      // letterboxing within the img element itself.
      const updateImgRect = useCallback(() => {
        const img = imgRef.current;
        if (!img || !img.naturalWidth) return;
        const container = img.parentElement;
        const contRect = container.getBoundingClientRect();
        const imgElRect = img.getBoundingClientRect();

        // Offset of img element within the container (flex centering)
        const elOx = imgElRect.left - contRect.left;
        const elOy = imgElRect.top - contRect.top;

        // object-fit:contain letterboxing within the img element
        const cw = img.clientWidth, ch = img.clientHeight;
        const nw = img.naturalWidth, nh = img.naturalHeight;
        const scale = Math.min(cw / nw, ch / nh);
        const dw = nw * scale, dh = nh * scale;
        const fitOx = (cw - dw) / 2, fitOy = (ch - dh) / 2;

        setImgRect({ ox: elOx + fitOx, oy: elOy + fitOy, dw, dh, nw, nh });
      }, []);

      // Recalc on image load or window resize
      useEffect(() => {
        window.addEventListener('resize', updateImgRect);
        return () => window.removeEventListener('resize', updateImgRect);
      }, [updateImgRect]);

      // Build face bounding box overlays
      const faceOverlays = useMemo(() => {
        if (!detail || !detail.faces || !imgRect) return [];
        return detail.faces.filter(f => f.bbox).map(f => {
          const { top, right, bottom, left } = f.bbox;
          const sx = imgRect.dw / imgRect.nw;
          const sy = imgRect.dh / imgRect.nh;
          return {
            id: f.id,
            label: f.person_name || ('Unknown #' + (f.cluster_id || '?')),
            style: {
              left: imgRect.ox + left * sx,
              top: imgRect.oy + top * sy,
              width: (right - left) * sx,
              height: (bottom - top) * sy,
            },
          };
        });
      }, [detail, imgRect]);

      return e('div', { className: 'modal-overlay', onClick: (ev) => {
        if (ev.target === ev.currentTarget) onClose();
      }},
        e('button', { className: 'modal-close', onClick: onClose }, '\u00D7'),
        total > 1 && e('button', { className: 'modal-nav prev', onClick: (ev) => { ev.stopPropagation(); onPrev(); }, title: 'Previous (\u2190)' }, '\u2039'),
        total > 1 && e('button', { className: 'modal-nav next', onClick: (ev) => { ev.stopPropagation(); onNext(); }, title: 'Next (\u2192)' }, '\u203A'),
        e('div', { className: 'modal' },
          e('div', { className: 'modal-image', style: { position: 'relative' } },
            e('img', {
              ref: imgRef,
              src: API + '/api/photos/' + photo.id + '/full',
              alt: photo.filename,
              onLoad: updateImgRect,
            }),
            // Render face bounding box overlays (only when hovering a name)
            ...faceOverlays.filter(ov => hoveredFace === ov.id).map(ov =>
              e('div', {
                key: 'bbox-' + ov.id,
                className: 'face-bbox-overlay',
                style: {
                  ...ov.style,
                  borderColor: '#4ade80',
                },
              },
                e('span', {
                  className: 'face-bbox-label',
                  style: { background: '#4ade80', color: '#000' },
                }, ov.label),
              )
            ),
          ),
          e('div', { className: 'modal-sidebar' },
            // Filename
            e('div', { className: 'detail-section' },
              e('h3', null, 'Photo'),
              e('p', { style: { fontWeight: 600, fontSize: 16 } }, photo.filename),
              e('div', { style: { display: 'flex', gap: 12, alignItems: 'center' } },
                photo.date_taken && e('span', { style: { color: 'var(--text-muted)', fontSize: 13 } },
                  photo.date_taken),
                total > 1 && e('span', { style: { color: 'var(--text-muted)', fontSize: 13 } },
                  (index + 1) + ' / ' + total),
              ),
            ),

            // Description
            (detail || photo).description && e('div', { className: 'detail-section' },
              e('h3', null, 'Description'),
              e('p', null, (detail || photo).description),
            ),

            // Faces
            detail && detail.faces && detail.faces.length > 0 && e('div', { className: 'detail-section' },
              e('h3', null, 'People'),
              ...detail.faces.map(f =>
                editingFace === f.id
                  ? e('div', { key: f.id, className: 'face-edit-panel' },
                      e('div', { style: { fontWeight: 600, marginBottom: 2 } },
                        f.person_name || ('Unknown #' + (f.cluster_id || '?'))),

                      // Pick existing person
                      editMode === 'pick' && e('select', {
                        value: editPick,
                        onChange: (ev) => setEditPick(ev.target.value),
                        autoFocus: true,
                      },
                        e('option', { value: '' }, 'Choose existing person\u2026'),
                        ...(persons || []).map(p =>
                          e('option', { key: p.id, value: p.name }, p.name)
                        ),
                      ),
                      editMode === 'pick' && e('div', { className: 'face-edit-buttons' },
                        e('button', {
                          className: 'primary',
                          onClick: () => saveExistingName(f.id),
                          disabled: !editPick,
                          style: !editPick ? { opacity: 0.5, cursor: 'default' } : {},
                        }, 'Apply'),
                        e('button', { onClick: () => { setEditMode('new'); setEditName(''); } }, 'New Name'),
                        f.person_name && e('button', {
                          className: 'danger',
                          onClick: () => clearFaceName(f.id),
                        }, 'Unset'),
                        e('button', { onClick: cancelEdit }, 'Cancel'),
                      ),

                      // New name text input
                      editMode === 'new' && e('input', {
                        ref: editInputRef,
                        type: 'text',
                        value: editName,
                        placeholder: 'Enter new name\u2026',
                        onChange: (ev) => setEditName(ev.target.value),
                        onKeyDown: (ev) => {
                          if (ev.key === 'Enter') saveNewName(f.id);
                          if (ev.key === 'Escape') cancelEdit();
                        },
                      }),
                      editMode === 'new' && e('div', { className: 'face-edit-buttons' },
                        e('button', {
                          className: 'primary',
                          onClick: () => saveNewName(f.id),
                          disabled: !editName.trim(),
                          style: !editName.trim() ? { opacity: 0.5, cursor: 'default' } : {},
                        }, 'Save'),
                        e('button', { onClick: () => setEditMode('pick') }, 'Back'),
                        e('button', { onClick: cancelEdit }, 'Cancel'),
                      ),
                    )
                  : e('span', {
                      key: f.id,
                      className: 'face-tag' + (hoveredFace === f.id ? ' active' : ''),
                      onMouseEnter: () => setHoveredFace(f.id),
                      onMouseLeave: () => setHoveredFace(null),
                      onClick: () => { setEditingFace(f.id); setEditMode('pick'); setEditPick(''); setEditName(''); },
                      title: 'Click to change',
                    },
                      f.person_name || ('Unknown #' + (f.cluster_id || '?')),
                      f.match_source && e('span', { className: 'match-badge' },
                        f.match_source === 'temporal' ? '\u23F1' : f.match_source === 'strict' ? '\u2713'
                        : f.match_source === 'manual' ? '\u270E' : ''),
                    )
              ),
            ),

            // Aesthetic quality
            (detail && detail.aesthetic_score != null || photo.aesthetic_score != null) &&
              e('div', { className: 'detail-section' },
                e('h3', null, 'Aesthetic Quality'),
                (() => {
                  const s = (detail && detail.aesthetic_score) || photo.aesthetic_score;
                  const color = s >= 6 ? '#4ade80' : s >= 4.5 ? '#facc15' : '#f87171';
                  const label = s >= 7 ? 'Excellent' : s >= 6 ? 'Good' : s >= 4.5 ? 'Average' : 'Below average';
                  const concepts = detail && detail.aesthetic_concepts;
                  const critique = detail && detail.aesthetic_critique;
                  return e('div', null,
                    e('div', { style: { display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: 6 } },
                      e('span', { style: { fontSize: 24, fontWeight: 600, color } }, s.toFixed(1)),
                      e('span', { style: { fontSize: 13, color: 'var(--text-muted)' } }, '/ 10 · ' + label),
                    ),
                    e('div', { style: {
                      height: 6, background: 'var(--surface2)', borderRadius: 3, overflow: 'hidden',
                      marginBottom: concepts || critique ? 10 : 0,
                    }},
                      e('div', { style: {
                        width: (s * 10) + '%', height: '100%', background: color, borderRadius: 3,
                      }}),
                    ),
                    // Concept strengths and weaknesses
                    concepts && concepts.strengths && concepts.strengths.length > 0 &&
                      e('div', { style: { fontSize: 13, marginBottom: 4 } },
                        e('span', { style: { color: '#4ade80' } }, '\u25B2 '),
                        e('span', { style: { color: 'var(--text-muted)' } }, 'Strengths: '),
                        concepts.strengths.join(', '),
                      ),
                    concepts && concepts.weaknesses && concepts.weaknesses.length > 0 &&
                      e('div', { style: { fontSize: 13, marginBottom: 4 } },
                        e('span', { style: { color: '#f87171' } }, '\u25BC '),
                        e('span', { style: { color: 'var(--text-muted)' } }, 'Weaknesses: '),
                        concepts.weaknesses.join(', '),
                      ),
                    // LLM critique
                    critique &&
                      e('p', { style: { fontSize: 13, color: 'var(--text-muted)', lineHeight: 1.5, marginTop: 6,
                                         fontStyle: 'italic' } },
                        critique,
                      ),
                  );
                })(),
              ),

            // Tags
            detail && detail.tags && detail.tags.length > 0 && e('div', { className: 'detail-section' },
              e('h3', null, 'Tags'),
              e('div', { style: { display: 'flex', flexWrap: 'wrap', gap: 4 } },
                ...detail.tags.map(function(tag) {
                  return e('span', { key: tag, style: {
                    fontSize: 12, padding: '2px 8px', borderRadius: 12,
                    background: 'var(--hover)', color: 'var(--text)',
                    border: '1px solid var(--border)',
                  } }, tag);
                }),
              ),
            ),

            // Score
            photo.score != null && e('div', { className: 'detail-section' },
              e('h3', null, 'Search Score'),
              e('div', { className: 'detail-row' },
                e('span', { className: 'label' }, 'Combined'),
                e('span', null, photo.score.toFixed(4)),
              ),
              photo.clip_score != null && e('div', { className: 'detail-row' },
                e('span', { className: 'label' }, 'CLIP'),
                e('span', null, photo.clip_score.toFixed(4)),
              ),
            ),

            // Location
            detail && detail.place_name && e('div', { className: 'detail-section' },
              e('h3', null, 'Location'),
              e('div', { className: 'detail-row' },
                e('span', { className: 'label' }, 'Place'),
                e('span', null, detail.place_name),
              ),
            ),

            // Camera info
            detail && e('div', { className: 'detail-section' },
              e('h3', null, 'Camera'),
              detail.camera_model && e('div', { className: 'detail-row' },
                e('span', { className: 'label' }, 'Model'),
                e('span', null, detail.camera_model),
              ),
              detail.focal_length && e('div', { className: 'detail-row' },
                e('span', { className: 'label' }, 'Focal Length'),
                e('span', null, formatFocalLength(detail.focal_length)),
              ),
              detail.exposure_time && e('div', { className: 'detail-row' },
                e('span', { className: 'label' }, 'Exposure'),
                e('span', null, detail.exposure_time),
              ),
              detail.f_number && e('div', { className: 'detail-row' },
                e('span', { className: 'label' }, 'Aperture'),
                e('span', null, 'f/' + formatFNumber(detail.f_number)),
              ),
              detail.iso && e('div', { className: 'detail-row' },
                e('span', { className: 'label' }, 'ISO'),
                e('span', null, detail.iso),
              ),
              detail.image_width && e('div', { className: 'detail-row' },
                e('span', { className: 'label' }, 'Resolution'),
                e('span', null, detail.image_width + ' \u00D7 ' + detail.image_height),
              ),
            ),

            // Colors
            (detail || photo).colors && (detail || photo).colors.length > 0 &&
              e('div', { className: 'detail-section' },
                e('h3', null, 'Dominant Colors'),
                e('div', { className: 'color-dots', style: { gap: 6 } },
                  ...(detail || photo).colors.map((c, i) =>
                    e('span', {
                      key: i, className: 'color-dot',
                      style: { background: c, width: 20, height: 20 },
                      title: c,
                    })
                  ),
                ),
              ),
          ),
        ),
      );
    }


    // -----------------------------------------------------------------------
    // Helpers
    // -----------------------------------------------------------------------
    function formatFocalLength(fl) {
      if (fl.includes('/')) {
        const parts = fl.split('/');
        return (parseInt(parts[0]) / parseInt(parts[1])).toFixed(0) + 'mm';
      }
      return fl + 'mm';
    }

    function formatFNumber(fn) {
      if (fn.includes('/')) {
        const parts = fn.split('/');
        return (parseInt(parts[0]) / parseInt(parts[1])).toFixed(1);
      }
      return fn;
    }


    // -----------------------------------------------------------------------
    // Mount
    // -----------------------------------------------------------------------
    ReactDOM.createRoot(document.getElementById('root')).render(e(App));
  </script>
</body>
</html>
