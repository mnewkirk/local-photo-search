<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #333;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #4a9eff;
      --accent-hover: #6bb3ff;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1600px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 42px;
    }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .nav-link {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      margin-left: 4px;
    }
    .nav-link:hover { text-decoration: underline; }
    .nav-link.active { color: var(--text); font-weight: 600; }

    /* Search form */
    .search-form {
      display: flex;
      gap: 8px;
      flex: 1;
      max-width: 800px;
    }
    .search-input {
      flex: 1;
      padding: 10px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }

    .search-btn {
      padding: 10px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .search-btn:hover { background: var(--accent-hover); }
    .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Filter bar */
    .filters {
      max-width: 1400px;
      margin: 0 auto;
      padding: 12px 24px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .filter-label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .filter-input {
      padding: 6px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      outline: none;
      width: 140px;
    }
    .filter-input:focus { border-color: var(--accent); }

    .stats-bar {
      font-size: 13px;
      color: var(--text-muted);
      margin-left: auto;
    }

    /* Photo grid */
    .content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 8px 24px 40px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 8px;
    }
    .grid-item {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      cursor: pointer;
      background: var(--surface);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .grid-item:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    /* Multi-select mode */
    .grid-item.selectable { cursor: pointer; }
    .grid-item.selectable.selected {
      outline: 3px solid var(--accent);
      outline-offset: -3px;
    }
    .stack-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      z-index: 2;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.15s;
    }
    .stack-badge:hover { background: rgba(74,158,255,0.7); }
    .grid-item.stack-member {
      outline: 3px solid #fff;
      outline-offset: -3px;
    }
    .grid-item .select-check {
      position: absolute;
      top: 8px;
      left: 8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.6);
      background: rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: transparent;
      z-index: 5;
      transition: all 0.15s;
    }
    .grid-item.selected .select-check {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .multi-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      position: sticky;
      top: 75px; /* below .header */
      z-index: 90;
    }
    .multi-bar .count {
      font-size: 14px;
      font-weight: 600;
      min-width: 120px;
    }
    .multi-bar button {
      padding: 6px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
    }
    .multi-bar button:hover { border-color: var(--accent); }
    .multi-bar button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .multi-bar button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .multi-bar .inline-input {
      font-size: 14px;
      padding: 4px 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      outline: none;
      width: 200px;
    }
    .multi-bar .inline-input:focus { border-color: var(--accent); }
    .multi-bar select {
      font-size: 14px;
      padding: 4px 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      outline: none;
    }
    .grid-item img {
      width: 100%;
      height: auto;
      display: block;
    }
    .grid-item .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .grid-item:hover .overlay { opacity: 1; }
    .overlay .filename { font-weight: 500; }
    .overlay .score { color: var(--accent); float: right; }

    /* Color dots */
    .color-dots {
      display: flex;
      gap: 3px;
      margin-top: 4px;
    }
    .color-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* Nav arrows */
    .modal-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      border: none;
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 210;
      transition: background 0.15s;
    }
    .modal-nav:hover { background: rgba(0,0,0,0.8); }
    .modal-nav.prev { left: 16px; }
    .modal-nav.next { right: 56px; }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal {
      background: var(--surface);
      border-radius: 12px;
      max-width: 1200px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: row;
    }
    .modal-image {
      flex: 1;
      min-width: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px 0 0 12px;
      max-height: 90vh;
    }
    .modal-image img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
    }
    .modal-sidebar {
      width: 340px;
      flex-shrink: 0;
      padding: 24px;
      border-left: 1px solid var(--border);
      overflow-y: auto;
      max-height: 90vh;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.6);
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 210;
    }
    .modal-close:hover { background: rgba(0,0,0,0.8); }

    .detail-section {
      margin-bottom: 20px;
    }
    .detail-section h3 {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .detail-section p {
      font-size: 14px;
      line-height: 1.6;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }
    .detail-row .label { color: var(--text-muted); }
    .face-tag {
      display: inline-block;
      padding: 4px 10px;
      background: var(--surface2);
      border-radius: 12px;
      font-size: 13px;
      margin: 2px 4px 2px 0;
      cursor: pointer;
      transition: background 0.15s, outline 0.15s;
    }
    .face-tag:hover, .face-tag.active {
      background: var(--accent);
      color: #fff;
    }
    .face-tag .match-badge {
      font-size: 10px;
      margin-left: 4px;
      opacity: 0.7;
    }
    .face-edit-panel {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin: 4px 0;
      padding: 8px 10px;
      background: var(--surface2);
      border-radius: 8px;
      font-size: 13px;
    }
    .face-edit-panel select,
    .face-edit-panel input {
      font-size: 13px;
      padding: 4px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      outline: none;
      width: 100%;
    }
    .face-edit-panel select:focus,
    .face-edit-panel input:focus { border-color: var(--accent); }
    .face-edit-buttons {
      display: flex;
      gap: 6px;
      margin-top: 2px;
    }
    .face-edit-buttons button {
      flex: 1;
      padding: 4px 0;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
    }
    .face-edit-buttons button:hover { border-color: var(--accent); }
    .face-edit-buttons button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .face-edit-buttons button.danger {
      border-color: #f87171;
      color: #f87171;
    }
    .face-edit-buttons button.danger:hover { background: #f87171; color: #fff; }
    .face-bbox-overlay {
      position: absolute;
      border: 2px solid var(--accent);
      border-radius: 4px;
      pointer-events: none;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.4);
      transition: opacity 0.15s;
    }
    .face-bbox-label {
      position: absolute;
      bottom: 100%;
      left: -2px;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 4px 4px 0 0;
      white-space: nowrap;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    .empty-state h2 {
      font-size: 24px;
      color: var(--text);
      margin-bottom: 12px;
      font-weight: 500;
    }
    .empty-state p { font-size: 15px; max-width: 500px; margin: 0 auto 8px; }

    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-muted);
      font-size: 15px;
    }

    /* ---- Responsive ---- */

    /* Tablet (≤ 768 px) */
    @media (max-width: 768px) {
      .header-inner { flex-wrap: wrap; gap: 8px; }
      /* Push search form to its own row, full width */
      .search-form { order: 3; width: 100%; max-width: 100%; }
      /* Filter bar scrolls horizontally — no line-wrapping */
      .filters {
        overflow-x: auto;
        flex-wrap: nowrap;
        padding: 8px 16px;
        scrollbar-width: none;
        -webkit-overflow-scrolling: touch;
      }
      .filters::-webkit-scrollbar { display: none; }
      .content { padding: 8px 16px 40px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 6px; }
      /* Modal stacks vertically */
      .modal { flex-direction: column; }
      .modal-image { border-radius: 12px 12px 0 0; max-height: 50vh; }
      .modal-sidebar {
        width: 100%;
        border-left: none;
        border-top: 1px solid var(--border);
        max-height: 44vh;
        overflow-y: auto;
      }
    }

    /* Phone (≤ 480 px) */
    @media (max-width: 480px) {
      .header { padding: 10px 14px; }
      .content { padding: 4px 8px 32px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 4px; }
      /* Full-screen modal on phones */
      .modal-overlay { padding: 0; }
      .modal {
        border-radius: 0;
        max-height: 100vh;
        height: 100vh;
      }
      .modal-image {
        border-radius: 0;
        max-height: 56vh;
      }
      .modal-sidebar {
        max-height: 44vh;
      }
      /* Bring nav arrows in from the edges so they don't overlap close btn */
      .modal-nav.prev { left: 8px; }
      .modal-nav.next { right: 8px; }
      .modal-close { top: 8px; right: 8px; }
      /* Sticky multi-select bar closer to top */
      .multi-bar { top: 60px; padding: 8px 12px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="/shared.js"></script>

  <script>
    const { useState, useEffect, useCallback, useRef, useMemo } = React;
    const e = React.createElement;

    const API = '';  // Same origin

    // Read URL search params
    function getUrlParams() {
      const p = new URLSearchParams(window.location.search);
      return {
        q: p.get('q') || '',
        person: p.get('person') || '',
        color: p.get('color') || '',
        location: p.get('location') || '',
        date_from: p.get('date_from') || '',
        date_to: p.get('date_to') || '',
        min_quality: p.get('min_quality') || '',
        sort_quality: p.get('sort_quality') === 'true',
        match_source: p.get('match_source') || '',
      };
    }

    // -----------------------------------------------------------------------
    // App
    // -----------------------------------------------------------------------
    function App() {
      const initParams = getUrlParams();
      const [query, setQuery] = useState(initParams.q);
      const [personFilter, setPersonFilter] = useState(initParams.person);
      const [matchSource, setMatchSource] = useState(initParams.match_source);
      const [colorFilter, setColorFilter] = useState(initParams.color);
      const [minQuality, setMinQuality] = useState(initParams.min_quality);
      const [sortQuality, setSortQuality] = useState(initParams.sort_quality);
      const [locationFilter, setLocationFilter] = useState(initParams.location);
      const [dateFrom, setDateFrom] = useState(initParams.date_from);
      const [dateTo, setDateTo] = useState(initParams.date_to);
      const [results, setResults] = useState(null);
      const [sortBy, setSortBy] = useState('relevance');
      const [loading, setLoading] = useState(false);
      const [selectedPhoto, setSelectedPhoto] = useState(null);
      const [photoDetail, setPhotoDetail] = useState(null);
      const [stats, setStats] = useState(null);
      const [persons, setPersons] = useState([]);
      const inputRef = useRef(null);
      const hasAutoSearched = useRef(false);

      // ---- Multi-select state ----
      const [multiSelect, setMultiSelect] = useState(false);
      const [selected, setSelected] = useState(new Set()); // set of photo IDs
      const [multiAction, setMultiAction] = useState(null); // 'add-to-coll' | null
      const [allColls, setAllColls] = useState([]);
      const [newCollName, setNewCollName] = useState('');
      const [collBusy, setCollBusy] = useState(false);
      const lastSelectedIdx = useRef(null);

      // ---- Stack expansion state ----
      const [expandedStacks, setExpandedStacks] = useState(new Set());
      const [stackMembers, setStackMembers] = useState({}); // { stack_id: [photo, ...] }

      const toggleStack = useCallback((stackId) => {
        setExpandedStacks(prev => {
          const next = new Set(prev);
          if (next.has(stackId)) {
            next.delete(stackId);
          } else {
            next.add(stackId);
            // Fetch members if not already loaded
            if (!stackMembers[stackId]) {
              fetch(API + '/api/stacks/' + stackId)
                .then(r => r.json())
                .then(data => {
                  if (data && data.members) {
                    setStackMembers(prev => ({ ...prev, [stackId]: data.members }));
                  }
                });
            }
          }
          return next;
        });
      }, [stackMembers]);

      const expandAllStacks = useCallback(() => {
        if (!results) return;
        const stackIds = new Set();
        results.forEach(r => { if (r.stack_id && r.stack_count > 1) stackIds.add(r.stack_id); });
        // Fetch all stack members
        stackIds.forEach(sid => {
          if (!stackMembers[sid]) {
            fetch(API + '/api/stacks/' + sid)
              .then(r => r.json())
              .then(data => {
                if (data && data.members) {
                  setStackMembers(prev => ({ ...prev, [sid]: data.members }));
                }
              });
          }
        });
        setExpandedStacks(stackIds);
      }, [results, stackMembers]);

      const collapseAllStacks = useCallback(() => {
        setExpandedStacks(new Set());
      }, []);

      const toggleSelect = useCallback((photoId, ev) => {
        if (!results) return;
        setSelected(prev => {
          const next = new Set(prev);
          const clickedIdx = results.findIndex(p => p.id === photoId);

          if (ev && ev.shiftKey && lastSelectedIdx.current != null && clickedIdx >= 0) {
            const lo = Math.min(lastSelectedIdx.current, clickedIdx);
            const hi = Math.max(lastSelectedIdx.current, clickedIdx);
            for (let i = lo; i <= hi; i++) {
              next.add(results[i].id);
            }
          } else {
            if (next.has(photoId)) next.delete(photoId); else next.add(photoId);
          }

          if (clickedIdx >= 0) lastSelectedIdx.current = clickedIdx;
          return next;
        });
      }, [results]);

      const exitMultiSelect = useCallback(() => {
        setMultiSelect(false);
        setSelected(new Set());
        setMultiAction(null);
        setNewCollName('');
        lastSelectedIdx.current = null;
      }, []);

      const startAddToColl = useCallback(() => {
        fetch(API + '/api/collections').then(r => r.json()).then(d => setAllColls(d.collections || [])).catch(() => {});
        setMultiAction('add-to-coll');
        setNewCollName('');
      }, []);

      const addSelectedToCollection = useCallback((collId) => {
        setCollBusy(true);
        fetch(API + '/api/collections/' + collId + '/photos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ photo_ids: Array.from(selected) }),
        }).then(r => r.json()).then(() => {
          setCollBusy(false);
          exitMultiSelect();
        }).catch(() => setCollBusy(false));
      }, [selected, exitMultiSelect]);

      const createCollAndAdd = useCallback(() => {
        const name = newCollName.trim();
        if (!name || selected.size === 0) return;
        setCollBusy(true);
        fetch(API + '/api/collections', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, photo_ids: Array.from(selected) }),
        }).then(r => r.json()).then(() => {
          setCollBusy(false);
          exitMultiSelect();
        }).catch(() => setCollBusy(false));
      }, [selected, newCollName, exitMultiSelect]);

      // Escape exits multi-select
      useEffect(() => {
        if (!multiSelect) return;
        const handler = (ev) => { if (ev.key === 'Escape') exitMultiSelect(); };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [multiSelect, exitMultiSelect]);

      // 'm' key enters multi-select (when not in modal or typing)
      useEffect(() => {
        if (multiSelect || selectedPhoto) return;
        const handler = (ev) => {
          if (ev.target.tagName === 'INPUT' || ev.target.tagName === 'SELECT' || ev.target.tagName === 'TEXTAREA') return;
          if (ev.key === 'm' && results && results.length > 0) {
            setMultiSelect(true);
            setSelected(new Set());
            setMultiAction(null);
          }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [multiSelect, selectedPhoto, results]);

      // Load stats and persons on mount
      useEffect(() => {
        fetch(API + '/api/stats').then(r => r.json()).then(setStats).catch(() => {});
        fetch(API + '/api/persons').then(r => r.json()).then(d => setPersons(d.persons || [])).catch(() => {});
        if (inputRef.current) inputRef.current.focus();
      }, []);

      const doSearch = useCallback((ev) => {
        if (ev) ev.preventDefault();
        const mqVal = minQuality ? parseFloat(minQuality) : null;
        if (!query && !personFilter && !colorFilter && !locationFilter && !dateFrom && !dateTo && mqVal == null && !matchSource) return;
        setLoading(true);
        setResults(null);
        setExpandedStacks(new Set());
        setStackMembers({});

        const params = new URLSearchParams();
        if (query) params.set('q', query);
        if (personFilter) params.set('person', personFilter);
        if (colorFilter) params.set('color', colorFilter);
        if (locationFilter) params.set('location', locationFilter);
        if (dateFrom) params.set('date_from', dateFrom);
        if (dateTo) params.set('date_to', dateTo);
        if (mqVal != null && !isNaN(mqVal)) params.set('min_quality', mqVal);
        if (sortQuality) params.set('sort_quality', 'true');
        if (matchSource) params.set('match_source', matchSource);

        // Update browser URL without reload
        const urlParams = new URLSearchParams(params);
        const newUrl = window.location.pathname + (urlParams.toString() ? '?' + urlParams.toString() : '');
        window.history.pushState(null, '', newUrl);

        params.set('limit', '100');

        fetch(API + '/api/search?' + params.toString())
          .then(r => r.json())
          .then(data => {
            setResults(data.results || []);
            setLoading(false);
          })
          .catch(() => {
            setResults([]);
            setLoading(false);
          });
      }, [query, personFilter, colorFilter, minQuality, sortQuality, locationFilter, dateFrom, dateTo, matchSource]);

      // Auto-search on mount if URL has params
      useEffect(() => {
        if (hasAutoSearched.current) return;
        const p = getUrlParams();
        if (p.q || p.person || p.color || p.location || p.date_from || p.date_to || p.min_quality || p.match_source) {
          hasAutoSearched.current = true;
          doSearch();
        }
      }, [doSearch]);

      const [selectedIndex, setSelectedIndex] = useState(-1);

      const openPhotoAt = useCallback((index) => {
        if (!results || results.length === 0) return;
        // Wrap around for looping
        const i = ((index % results.length) + results.length) % results.length;
        const photo = results[i];
        setSelectedIndex(i);
        setSelectedPhoto(photo);
        setPhotoDetail(null);
        fetch(API + '/api/photos/' + photo.id)
          .then(r => r.json())
          .then(setPhotoDetail)
          .catch(() => {});
      }, [results]);

      const openPhoto = useCallback((photo) => {
        const idx = results ? results.findIndex(r => r.id === photo.id) : -1;
        openPhotoAt(idx >= 0 ? idx : 0);
      }, [results, openPhotoAt]);

      const closeModal = useCallback(() => {
        setSelectedPhoto(null);
        setSelectedIndex(-1);
        setPhotoDetail(null);
      }, []);

      const goPrev = useCallback(() => { openPhotoAt(selectedIndex - 1); }, [selectedIndex, openPhotoAt]);
      const goNext = useCallback(() => { openPhotoAt(selectedIndex + 1); }, [selectedIndex, openPhotoAt]);

      // When a face is assigned/unset in the modal, update the detail in place
      const handleFaceAssigned = useCallback((faceId, personName) => {
        setPhotoDetail(prev => {
          if (!prev || !prev.faces) return prev;
          return {
            ...prev,
            faces: prev.faces.map(f =>
              f.id === faceId
                ? { ...f, person_name: personName, match_source: personName ? 'manual' : null }
                : f
            ),
          };
        });
        // Refresh persons list for the sidebar filter
        fetch(API + '/api/persons').then(r => r.json()).then(d => setPersons(d.persons || [])).catch(() => {});
      }, []);

      // Keyboard: Escape closes modal, arrows navigate
      useEffect(() => {
        const handler = (ev) => {
          if (!selectedPhoto) return;
          if (ev.key === 'Escape') closeModal();
          else if (ev.key === 'ArrowLeft') { ev.preventDefault(); goPrev(); }
          else if (ev.key === 'ArrowRight') { ev.preventDefault(); goNext(); }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [selectedPhoto, closeModal, goPrev, goNext]);

      return e('div', null,
        // Header
        e(PS.SharedHeader, { activePage: 'search' },
          e('form', { className: 'search-form', onSubmit: doSearch },
            e('input', {
              ref: inputRef,
              className: 'search-input',
              type: 'text',
              placeholder: 'Search photos... (e.g. "kids playing on the beach")',
              value: query,
              onChange: (ev) => setQuery(ev.target.value),
            }),
            e('button', {
              className: 'search-btn',
              type: 'submit',
              disabled: loading,
            }, loading ? 'Searching...' : 'Search'),
          ),
        ),

        // Filters bar
        e('div', { className: 'filters' },
          e('div', { className: 'filter-group' },
            e('span', { className: 'filter-label' }, 'Person:'),
            e('select', {
              className: 'filter-input',
              value: personFilter,
              onChange: (ev) => setPersonFilter(ev.target.value),
              style: { width: 160 },
            },
              e('option', { value: '' }, 'Any'),
              ...persons.map(p =>
                e('option', { key: p.id, value: p.name },
                  p.name + ' (' + p.photo_count + ')')
              ),
            ),
          ),
          e('div', { className: 'filter-group' },
            e('span', { className: 'filter-label' }, 'Match:'),
            e('select', {
              className: 'filter-input',
              value: matchSource,
              onChange: (ev) => setMatchSource(ev.target.value),
              style: { width: 130 },
            },
              e('option', { value: '' }, 'Any'),
              e('option', { value: 'strict' }, 'Strict only'),
              e('option', { value: 'temporal' }, 'Temporal only'),
            ),
          ),
          e('div', { className: 'filter-group' },
            e('span', { className: 'filter-label' }, 'Color:'),
            e('input', {
              className: 'filter-input',
              type: 'text',
              placeholder: 'blue, #ff0000',
              value: colorFilter,
              onChange: (ev) => setColorFilter(ev.target.value),
              style: { width: 120 },
            }),
          ),
          e('div', { className: 'filter-group' },
            e('span', { className: 'filter-label' }, 'Location:'),
            e('input', {
              className: 'filter-input',
              type: 'text',
              placeholder: 'Hawaii, Paris...',
              value: locationFilter,
              onChange: (ev) => setLocationFilter(ev.target.value),
              style: { width: 130 },
            }),
          ),
          e('div', { className: 'filter-group' },
            e('span', { className: 'filter-label' }, 'From:'),
            e('input', {
              className: 'filter-input',
              type: 'date',
              value: dateFrom,
              onChange: (ev) => setDateFrom(ev.target.value),
              style: { width: 130 },
            }),
          ),
          e('div', { className: 'filter-group' },
            e('span', { className: 'filter-label' }, 'To:'),
            e('input', {
              className: 'filter-input',
              type: 'date',
              value: dateTo,
              onChange: (ev) => setDateTo(ev.target.value),
              style: { width: 130 },
            }),
          ),
          e('div', { className: 'filter-group' },
            e('span', { className: 'filter-label' }, 'Min quality:'),
            e('input', {
              className: 'filter-input',
              type: 'number',
              placeholder: '1–10',
              value: minQuality,
              onChange: (ev) => setMinQuality(ev.target.value),
              min: 1, max: 10, step: 0.5,
              style: { width: 72 },
            }),
          ),
          e('div', { className: 'filter-group' },
            e('label', {
              style: { display: 'flex', alignItems: 'center', gap: 4, cursor: 'pointer',
                       fontSize: 13, color: 'var(--text-muted)' },
            },
              e('input', {
                type: 'checkbox',
                checked: sortQuality,
                onChange: (ev) => setSortQuality(ev.target.checked),
              }),
              'Sort by quality',
            ),
          ),
          stats && e('div', { className: 'stats-bar' },
            stats.photos + ' photos indexed · ' +
            stats.described + ' described · ' +
            (stats.quality_scored || 0) + ' scored' +
            (stats.quality_stats ? ' (' + stats.quality_stats.min + '–' + stats.quality_stats.max + ')' : '')
          ),
        ),

        // Content
        e('div', { className: 'content' },
          results === null && !loading && e(EmptyState),
          loading && e('div', { className: 'loading' }, 'Searching...'),
          results !== null && !loading && results.length === 0 &&
            e('div', { className: 'loading' }, 'No results found.'),

          // "Select Multiple" + "Expand/Close Stacks" buttons
          results !== null && results.length > 0 && !multiSelect &&
            e('div', { style: { display: 'flex', justifyContent: 'flex-end', gap: 8, marginBottom: 8 } },
              // Show Expand/Close Stacks only if there are stacks in results
              results.some(r => r.stack_id && r.stack_count > 1) &&
                e('button', {
                  style: { padding: '6px 14px', borderRadius: 'var(--radius)', border: '1px solid var(--border)',
                           background: 'var(--surface2)', color: 'var(--text)', cursor: 'pointer', fontSize: 13 },
                  onClick: () => { expandedStacks.size > 0 ? collapseAllStacks() : expandAllStacks(); },
                }, expandedStacks.size > 0 ? 'Close Stacks' : 'Expand Stacks'),
              e('button', {
                style: { padding: '6px 14px', borderRadius: 'var(--radius)', border: '1px solid var(--border)',
                         background: 'var(--surface2)', color: 'var(--text)', cursor: 'pointer', fontSize: 13 },
                onClick: () => { setMultiSelect(true); setSelected(new Set()); setMultiAction(null); },
                title: 'Or press M',
              }, 'Select Multiple'),
            ),

          // Multi-select action bar
          multiSelect && e('div', { className: 'multi-bar' },
            e('span', { className: 'count' }, selected.size + ' selected'),

            // Default actions
            !multiAction && selected.size > 0 && e('button', {
              className: 'primary',
              onClick: startAddToColl,
            }, 'Add to Collection'),

            // Add-to-collection sub-action: pick existing
            multiAction === 'add-to-coll' && allColls.length > 0 && e('select', {
              value: '',
              disabled: collBusy,
              onChange: (ev) => { if (ev.target.value) addSelectedToCollection(parseInt(ev.target.value)); },
            },
              e('option', { value: '' }, 'Choose collection\u2026'),
              ...allColls.map(c =>
                e('option', { key: c.id, value: c.id }, c.name + ' (' + (c.photo_count || 0) + ')')
              ),
            ),

            // Add-to-collection sub-action: create new
            multiAction === 'add-to-coll' && e('input', {
              className: 'inline-input',
              value: newCollName,
              disabled: collBusy,
              onChange: (ev) => setNewCollName(ev.target.value),
              onKeyDown: (ev) => {
                if (ev.key === 'Enter') createCollAndAdd();
                if (ev.key === 'Escape') { ev.stopPropagation(); setMultiAction(null); }
              },
              placeholder: 'Or create new\u2026',
            }),
            multiAction === 'add-to-coll' && e('button', {
              className: 'primary',
              onClick: createCollAndAdd,
              disabled: !newCollName.trim() || collBusy,
            }, collBusy ? 'Adding\u2026' : 'Create & Add'),
            multiAction === 'add-to-coll' && e('button', { onClick: () => setMultiAction(null) }, 'Back'),

            // Cancel always visible at right
            e('button', { onClick: exitMultiSelect, style: { marginLeft: 'auto' } }, 'Cancel'),
          ),

          results !== null && results.length > 0 &&
            e(PhotoGrid, { results: PS.applySortOrder(results, sortBy), sortBy, setSortBy,
                           sortOptions: ['relevance', 'date_desc', 'date_asc', 'quality_desc'],
                           onSelect: openPhoto, multiSelect, selected, onToggleSelect: toggleSelect,
                           expandedStacks, stackMembers, toggleStack, query }),
        ),

        // Modal
        selectedPhoto && e(PhotoModal, {
          photo: selectedPhoto,
          detail: photoDetail,
          onClose: closeModal,
          onPrev: goPrev,
          onNext: goNext,
          index: selectedIndex,
          total: results ? results.length : 0,
          onFaceAssigned: handleFaceAssigned,
          persons: persons,
          onStackNavigate: (member) => {
            // Navigate to a stack member within the modal
            setSelectedPhoto(member);
            setPhotoDetail(null);
            // Update index so arrow-key navigation works from the correct position
            const idx = results ? results.findIndex(r => r.id === member.id) : -1;
            if (idx >= 0) setSelectedIndex(idx);
            fetch(API + '/api/photos/' + member.id)
              .then(r => r.json())
              .then(setPhotoDetail)
              .catch(() => {});
          },
        }),
      );
    }


    // -----------------------------------------------------------------------
    // Empty state
    // -----------------------------------------------------------------------
    function EmptyState() {
      return e('div', { className: 'empty-state' },
        e('h2', null, 'Search your photo library'),
        e('p', null, 'Describe what you\'re looking for in natural language, filter by person or color, or combine them.'),
        e('p', { style: { color: 'var(--text-muted)', fontSize: 13 } },
          'Try: "people outdoors" · "kids playing" · "sunset" · "bird on a branch"'
        ),
      );
    }


    // -----------------------------------------------------------------------
    // Photo grid
    // -----------------------------------------------------------------------
    // Matches camera filename patterns: DSC06241, IMG_1234, DSC06241.JPG, etc.
    const _FILENAME_RE = /^[A-Za-z]{0,5}[\d_]{2,}[A-Za-z\d_]*$/;
    const _PHOTO_EXTS = new Set(['.jpg','.jpeg','.png','.arw','.raw','.dng','.nef','.cr2','.cr3','.heic','.heif','.tif','.tiff','.mov','.mp4']);
    function looksLikeFilename(q) {
      if (!q || q.includes(' ')) return false;
      var stem = q.trim();
      var dot = stem.lastIndexOf('.');
      if (dot > 0 && _PHOTO_EXTS.has(stem.substring(dot).toLowerCase())) stem = stem.substring(0, dot);
      return _FILENAME_RE.test(stem);
    }

    function PhotoGrid({ results, sortBy, setSortBy, sortOptions, onSelect, multiSelect, selected, onToggleSelect, expandedStacks, stackMembers, toggleStack, query }) {
      // Build display list: filter out non-top stack members, insert expanded members after their top photo
      // Exception: filename searches always show the matched photo regardless of stack position
      const isFilenameSearch = useMemo(() => looksLikeFilename(query), [query]);
      const displayItems = useMemo(() => {
        const added = new Set();
        const items = [];
        results.forEach(photo => {
          const isNonTopMember = photo.stack_id && photo.stack_count > 1 && !photo.stack_is_top;
          const stackIsExpanded = photo.stack_id && expandedStacks.has(photo.stack_id);
          if (isNonTopMember && !isFilenameSearch) {
            if (stackIsExpanded) return; // will appear in expanded group below top photo
            if (!selected.has(photo.id)) return; // collapsed + unselected → hide
            // collapsed but selected → show individually
          }
          if (added.has(photo.id)) return;
          added.add(photo.id);
          items.push({ type: 'photo', photo, isStackMember: false });
          // When this is the top photo and the stack is expanded, insert all members
          if (photo.stack_is_top && stackIsExpanded && stackMembers[photo.stack_id]) {
            stackMembers[photo.stack_id].forEach(m => {
              if (m.id !== photo.id && !added.has(m.id)) {
                added.add(m.id);
                items.push({ type: 'photo', photo: m, isStackMember: true, stackId: photo.stack_id });
              }
            });
          }
        });
        return items;
      }, [results, selected, expandedStacks, stackMembers, isFilenameSearch]);

      const visibleCount = displayItems.filter(d => d.type === 'photo').length;
      const stackCount = results.filter(r => r.stack_id && r.stack_count > 1 && r.stack_is_top).length;

      return e('div', null,
        e('div', { style: { marginBottom: 12, fontSize: 13, color: 'var(--text-muted)', display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' } },
          e('span', null, visibleCount + ' result' + (visibleCount !== 1 ? 's' : '') +
            (visibleCount < results.length ? ' (of ' + results.length + ')' : '') +
            (stackCount > 0 ? ' (' + stackCount + ' stacked)' : '')),
          sortBy && setSortBy && e(PS.SortControl, { value: sortBy, onChange: setSortBy, options: sortOptions }),
          multiSelect && e('span', { style: { color: 'var(--accent)', fontSize: 12 } },
            'Click to select \u00B7 Shift-click for range'),
        ),
        e('div', { className: 'grid' },
          ...displayItems.map(item => {
            const photo = item.photo;
            return e(GridItem, {
              key: (item.isStackMember ? 'sm-' : '') + photo.id,
              photo,
              multiSelect,
              isSelected: selected && selected.has(photo.id),
              isStackMember: item.isStackMember,
              stackId: item.stackId || photo.stack_id,
              expandedStacks,
              toggleStack,
              onClick: (ev) => {
                if (multiSelect) { onToggleSelect(photo.id, ev); return; }
                onSelect(photo);
              },
            });
          }),
        ),
      );
    }

    function GridItem({ photo, onClick, multiSelect, isSelected, isStackMember, stackId, expandedStacks, toggleStack }) {
      const [loaded, setLoaded] = useState(false);
      const [error, setError] = useState(false);

      const isExpanded = photo.stack_id && expandedStacks && expandedStacks.has(photo.stack_id);
      const showBadge = photo.stack_count > 1 && photo.stack_is_top;

      return e('div', {
        className: 'grid-item' + (multiSelect ? ' selectable' : '') + (isSelected ? ' selected' : '') + (isStackMember ? ' stack-member' : ''),
        onClick,
      },
        multiSelect && e('div', { className: 'select-check' }, isSelected ? '\u2713' : ''),
        showBadge && e('div', {
          className: 'stack-badge',
          onClick: (ev) => {
            ev.stopPropagation();
            if (toggleStack) toggleStack(photo.stack_id);
          },
        }, isExpanded ? '\u2715' : '\u00d7' + photo.stack_count),
        !error && e('img', {
          src: API + '/api/photos/' + photo.id + '/thumbnail?v=' + encodeURIComponent(photo.filename),
          alt: photo.filename,
          loading: 'lazy',
          onLoad: () => setLoaded(true),
          onError: () => setError(true),
          style: loaded ? {} : { opacity: 0 },
        }),
        error && e('div', {
          style: {
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            height: '100%', color: 'var(--text-muted)', fontSize: 13,
          }
        }, photo.filename),
        e('div', { className: 'overlay' },
          e('span', { className: 'filename' }, photo.filename),
          e('span', { style: { float: 'right', display: 'flex', gap: 8 } },
            photo.aesthetic_score != null && e('span', {
              style: { color: photo.aesthetic_score >= 6 ? '#4ade80' : photo.aesthetic_score >= 4.5 ? '#facc15' : '#f87171' },
              title: 'Aesthetic quality',
            }, '\u2605' + photo.aesthetic_score.toFixed(1)),
            photo.score != null && e('span', { className: 'score' }, photo.score.toFixed(3)),
          ),
          photo.colors && photo.colors.length > 0 &&
            e('div', { className: 'color-dots' },
              ...photo.colors.slice(0, 5).map((c, i) =>
                e('span', { key: i, className: 'color-dot', style: { background: c } })
              ),
            ),
        ),
      );
    }


    // -----------------------------------------------------------------------
    // Photo modal
    // -----------------------------------------------------------------------
    function PhotoModal({ photo, detail, onClose, onPrev, onNext, index, total, onFaceAssigned, persons, onStackNavigate }) {
      return e(PS.PhotoModal, {
        photo, detail, onClose, onPrev, onNext, index, total, persons, onFaceAssigned,
        onStackNavigate,
        showFaces: true,
        showCollections: true,
        showLocation: true,
        showSearchScore: true,
        showAesthetics: true,
      });
    }


    // -----------------------------------------------------------------------
    // Mount
    // -----------------------------------------------------------------------
    ReactDOM.createRoot(document.getElementById('root')).render(e(App));
  </script>
</body>
</html>
