<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faces — Photo Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #333;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #4a9eff;
      --accent-hover: #6bb3ff;
      --green: #4ade80;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1600px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 42px;
    }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .nav-link {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      margin-left: 4px;
    }
    .nav-link:hover { text-decoration: underline; }
    .nav-link.active { color: var(--text); font-weight: 600; }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px;
    }

    .page-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .page-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .sticky-tools {
      position: sticky;
      /* Sits under the header (16+16 padding + 42 min-height ≈ 74px). */
      top: 74px;
      z-index: 90;
      background: var(--bg);
      padding: 12px 0;
      margin: 0 -4px 20px -4px;
      border-bottom: 1px solid var(--border);
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .toolbar button {
      padding: 6px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
    }
    .toolbar button:hover { border-color: var(--accent); }
    .toolbar button.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .kbd {
      display: inline-block;
      font-family: "SF Mono", Consolas, monospace;
      font-size: 11px;
      padding: 1px 5px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom-width: 2px;
      border-radius: 3px;
      color: var(--text-muted);
    }
    .shortcuts-row {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 10px;
    }
    .shortcuts-row .kbd { margin: 0 2px; }
    .shortcuts-row .group { display: flex; align-items: center; gap: 2px; }

    /* Face grid */
    .face-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
    }
    .face-card {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      border: 2px solid transparent;
      /* Let the browser skip layout/paint for off-screen cards — huge win
         when there are hundreds of unknown clusters. intrinsic-size reserves
         a placeholder so scrollbar length is still roughly correct. */
      content-visibility: auto;
      contain-intrinsic-size: 200px 200px;
    }
    .face-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      border-color: var(--accent);
    }
    .face-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      background: var(--surface2);
    }
    .face-card-info {
      padding: 8px 10px;
    }
    .face-card-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .face-card-count {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* Detail panel */
    .detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
      overflow-y: auto;
    }
    .detail-panel {
      background: var(--surface);
      border-radius: 12px;
      max-width: 1200px;
      width: 100%;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
    }
    .detail-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 10;
    }
    .detail-header img {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
    }
    .detail-name {
      font-size: 20px;
      font-weight: 600;
      flex: 1;
    }
    .detail-name-input {
      font-size: 20px;
      font-weight: 600;
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--accent);
      color: var(--text);
      outline: none;
      padding: 2px 4px;
      width: 200px;
    }
    .detail-stats {
      font-size: 13px;
      color: var(--text-muted);
    }
    .detail-close {
      background: var(--surface2);
      border: none;
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .detail-close:hover { background: var(--border); }

    .detail-photos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
      padding: 16px 24px 24px;
    }
    .detail-photo {
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }
    .detail-photo img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }
    .detail-photo .match-type {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .rename-btn {
      padding: 4px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      font-size: 13px;
    }
    .rename-btn:hover { background: var(--accent); color: #fff; }
    .save-btn {
      padding: 4px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--green);
      background: var(--green);
      color: #000;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }

    .loading { text-align: center; padding: 60px; color: var(--text-muted); }
    .loading-bar-container {
      max-width: 320px;
      margin: 16px auto 0;
      height: 4px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
    }
    .loading-bar {
      height: 100%;
      width: 40%;
      background: var(--accent);
      border-radius: 4px;
      animation: loading-slide 1.2s ease-in-out infinite;
    }
    @keyframes loading-slide {
      0%   { transform: translateX(-100%); }
      50%  { transform: translateX(250%); }
      100% { transform: translateX(-100%); }
    }
    .empty { text-align: center; padding: 60px; color: var(--text-muted); }

    /* Photo modal (reused from search) */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      z-index: 300; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal {
      background: var(--surface); border-radius: 12px; max-width: 1200px; width: 100%;
      max-height: 90vh; overflow-y: auto; display: flex; flex-direction: row;
    }
    .modal-image {
      flex: 1; min-width: 0; background: #000; display: flex; align-items: center;
      justify-content: center; border-radius: 12px 0 0 12px; max-height: 90vh; position: relative;
    }
    .modal-image img { max-width: 100%; max-height: 90vh; object-fit: contain; }
    .modal-sidebar {
      width: 340px; flex-shrink: 0; padding: 24px; border-left: 1px solid var(--border);
      overflow-y: auto; max-height: 90vh;
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,0.6);
      border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%;
      font-size: 20px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; z-index: 310;
    }
    .modal-close:hover { background: rgba(0,0,0,0.8); }
    .modal-nav {
      position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6);
      border: none; color: #fff; width: 40px; height: 60px; font-size: 28px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 310;
    }
    .modal-nav:hover { background: rgba(0,0,0,0.8); }
    .modal-nav.prev { left: 16px; }
    .modal-nav.next { right: 56px; }
    .detail-section { margin-bottom: 20px; }
    .detail-section h3 {
      font-size: 13px; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 8px;
    }
    .detail-section p { font-size: 14px; line-height: 1.6; }
    .detail-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }
    .detail-row .label { color: var(--text-muted); }
    .color-dots { display: flex; gap: 3px; margin-top: 4px; }
    .color-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); }
    .face-bbox-overlay {
      position: absolute; border: 2px solid var(--green); border-radius: 4px;
      pointer-events: none; box-shadow: 0 0 0 1px rgba(0,0,0,0.4);
    }
    .face-bbox-label {
      position: absolute; bottom: 100%; left: -2px; background: var(--green);
      color: #000; font-size: 11px; padding: 1px 6px; border-radius: 4px 4px 0 0; white-space: nowrap;
    }
    .face-edit-panel {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin: 4px 0;
      padding: 8px 10px;
      background: var(--surface2);
      border-radius: 8px;
      font-size: 13px;
    }
    .face-edit-panel select,
    .face-edit-panel input {
      font-size: 13px;
      padding: 4px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      outline: none;
      width: 100%;
    }
    .face-edit-panel select:focus,
    .face-edit-panel input:focus { border-color: var(--accent); }
    .face-edit-buttons {
      display: flex;
      gap: 6px;
      margin-top: 2px;
    }
    .face-edit-buttons button {
      flex: 1;
      padding: 4px 0;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
    }
    .face-edit-buttons button:hover { border-color: var(--accent); }
    .face-edit-buttons button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .face-edit-buttons button.fe-danger {
      border-color: #f87171;
      color: #f87171;
    }
    .face-edit-buttons button.fe-danger:hover { background: #f87171; color: #fff; }
    .name-error {
      color: #f87171;
      font-size: 12px;
      margin-top: 4px;
    }

    /* Multi-select mode */
    .face-card.selectable { cursor: pointer; }
    .face-card.selectable.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent);
    }
    .face-card .select-check {
      position: absolute;
      top: 8px;
      left: 8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.6);
      background: rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: transparent;
      z-index: 5;
      transition: all 0.15s;
    }
    .face-card.selected .select-check {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .multi-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
      /* Stickiness comes from the enclosing .sticky-tools so the multi-bar
         sits below the filter row instead of racing it for top: 74px. */
    }
    .multi-bar .count {
      font-size: 14px;
      font-weight: 600;
      min-width: 120px;
    }
    .multi-bar button {
      padding: 6px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
    }
    .multi-bar button:hover { border-color: var(--accent); }
    .multi-bar button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .multi-bar button.danger {
      border-color: #f87171;
      color: #f87171;
    }
    .multi-bar button.danger:hover {
      background: #f87171;
      color: #fff;
    }
    .multi-bar button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .multi-bar .inline-input {
      font-size: 14px;
      padding: 4px 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      outline: none;
      width: 180px;
    }
    .multi-bar .inline-input:focus { border-color: var(--accent); }
    .multi-bar select {
      font-size: 14px;
      padding: 4px 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      width: 200px;
    }

    /* ---- Responsive ---- */

    /* Tablet (≤ 768 px) */
    @media (max-width: 768px) {
      .face-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
      .photo-subgrid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
      .modal { flex-direction: column; }
      .modal-image {
        border-radius: 12px 12px 0 0;
        max-height: 50vh;
      }
      .modal-sidebar {
        width: 100%;
        border-left: none;
        border-top: 1px solid var(--border);
        max-height: 44vh;
        overflow-y: auto;
      }
    }

    /* Phone (≤ 480 px) */
    @media (max-width: 480px) {
      .face-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 4px; }
      .modal-overlay { padding: 0; }
      .modal { border-radius: 0; max-height: 100vh; height: 100vh; }
      .modal-image { border-radius: 0; max-height: 56vh; }
      .modal-sidebar { max-height: 44vh; }
      .modal-nav.prev { left: 8px; }
      .modal-nav.next { right: 8px; }
      .modal-close { top: 8px; right: 8px; }
    }

    /* ---- Person inspector ---- */
    .insp-overlay {
      position: fixed; inset: 0; z-index: 1200;
      background: rgba(0,0,0,0.78); display: flex; justify-content: center;
      align-items: stretch; padding: 24px;
    }
    .insp-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); width: 100%; max-width: 1280px;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .insp-header {
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
      padding: 14px 20px; border-bottom: 1px solid var(--border);
    }
    .insp-title { font-size: 18px; font-weight: 700; }
    .insp-sub { font-size: 12px; color: var(--text-muted); }
    .insp-toggle { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .insp-toggle button { background: var(--surface2); color: var(--text); border: 0; padding: 6px 12px; cursor: pointer; font-size: 13px; }
    .insp-toggle button.active { background: var(--accent); color: #fff; }
    .insp-body { flex: 1; overflow-y: auto; padding: 16px 20px 90px; }
    .insp-subgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .insp-card {
      position: relative;
      border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
      background: var(--surface2); cursor: pointer; transition: border-color .15s;
    }
    .insp-card:hover { border-color: var(--accent); }
    .insp-card.suspect { border-color: #f59e0b; }
    .insp-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent) inset; }
    .insp-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
    .insp-card-meta { padding: 6px 8px; font-size: 12px; }
    .insp-card-meta .d { color: var(--text-muted); }
    /* Selection checkbox corner — toggles the whole sub-cluster into the
       shared face selection without drilling into the card. */
    .insp-card-check {
      position: absolute; top: 6px; left: 6px; width: 24px; height: 24px;
      border-radius: 6px; border: 1px solid var(--border);
      background: rgba(0,0,0,.55); color: #fff; font-size: 15px; line-height: 22px;
      text-align: center; cursor: pointer; user-select: none; z-index: 2;
    }
    .insp-card.selected .insp-card-check { background: var(--accent); border-color: var(--accent); }
    .face-tile {
      position: relative; border: 2px solid transparent; border-radius: 6px;
      overflow: hidden; cursor: pointer; background: var(--surface2);
    }
    .face-tile img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
    .face-tile.sel { border-color: var(--accent); }
    .face-tile .dist-badge {
      position: absolute; top: 2px; left: 2px; font-size: 10px; padding: 1px 4px;
      border-radius: 3px; background: rgba(0,0,0,0.7); color: #fff;
    }
    .face-tile .dup-badge {
      position: absolute; top: 2px; right: 2px; font-size: 10px; padding: 1px 4px;
      border-radius: 3px; background: rgba(245,158,11,0.9); color: #000;
    }
    .face-tile.far .dist-badge { background: rgba(239,68,68,0.9); }
    .face-tile .checkmark {
      position: absolute; bottom: 2px; right: 2px; width: 18px; height: 18px;
      border-radius: 50%; background: var(--accent); color: #fff; font-size: 12px;
      display: none; align-items: center; justify-content: center;
    }
    .face-tile.sel .checkmark { display: flex; }
    .insp-facegrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 8px; }
    .insp-pager { display: flex; align-items: center; gap: 12px; margin: 14px 0; font-size: 13px; flex-wrap: wrap; }
    .insp-actionbar {
      position: absolute; left: 0; right: 0; bottom: 0; display: flex; gap: 10px;
      align-items: center; padding: 12px 20px; background: var(--surface);
      border-top: 1px solid var(--border); flex-wrap: wrap;
    }
    .insp-btn {
      background: var(--surface2); color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 13px;
    }
    .insp-btn:hover { border-color: var(--accent); }
    .insp-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .insp-btn.danger { color: #f87171; }
    .insp-btn:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="/shared.js"></script>
  <script>
    const { useState, useEffect, useCallback, useRef, useMemo } = React;
    const e = React.createElement;
    const API = '';

    // -----------------------------------------------------------------------
    // URL parameter helpers
    // -----------------------------------------------------------------------
    function getUrlParams() {
      const p = new URLSearchParams(window.location.search);
      return {
        name: p.get('name') || '',
        face_id: p.get('face_id') || '',
        cluster_id: p.get('cluster_id') || '',
        person_id: p.get('person_id') || '',
        filter: p.get('filter') || 'all',
      };
    }

    function updateUrl(params) {
      const p = new URLSearchParams();
      if (params.name) p.set('name', params.name);
      if (params.face_id) p.set('face_id', params.face_id);
      if (params.cluster_id) p.set('cluster_id', params.cluster_id);
      if (params.person_id) p.set('person_id', params.person_id);
      if (params.filter && params.filter !== 'all') p.set('filter', params.filter);
      const newUrl = window.location.pathname + (p.toString() ? '?' + p.toString() : '');
      window.history.pushState(null, '', newUrl);
    }

    // Build the content-filter query fragment (date / place / semantic search)
    // appended to /api/faces/groups so only clusters in matching photos show.
    function cfParams(c) {
      let s = '';
      if (c.date_from) s += '&date_from=' + encodeURIComponent(c.date_from);
      if (c.date_to) s += '&date_to=' + encodeURIComponent(c.date_to);
      if (c.location) s += '&location=' + encodeURIComponent(c.location);
      if (c.q) s += '&q=' + encodeURIComponent(c.q);
      return s;
    }

    // -----------------------------------------------------------------------
    // PersonInspector — sub-cluster / ranked view of one person's faces, so
    // wrong faces (over-matches, duplicate-import contamination, a different
    // kid) can be spotted and unassigned / re-mapped in bulk. Two views over
    // the same flat face list; crop rendering is paginated so even a 20k-face
    // person never draws all crops at once.
    // -----------------------------------------------------------------------
    const INSP_PAGE = 120;
    function FaceTile({ f, selected, onToggle }) {
      const far = f.dist > 1.0;
      return e('div', {
        className: 'face-tile' + (selected ? ' sel' : '') + (far ? ' far' : ''),
        onClick: () => onToggle(f.face_id),
      },
        e('img', { src: API + '/api/faces/crop/' + f.face_id + '?size=120', loading: 'lazy' }),
        e('span', { className: 'dist-badge' }, f.dist.toFixed(2)),
        f.dup_group != null && e('span', { className: 'dup-badge', title: 'duplicate of another face' }, 'dup'),
        e('span', { className: 'checkmark' }, '✓'),
      );
    }

    function PersonInspector({ person, persons, onClose, onChanged }) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [err, setErr] = useState('');
      const [view, setView] = useState('subs');     // 'subs' | 'ranked'
      const [activeSub, setActiveSub] = useState(null);  // sub_id when drilled in
      const [page, setPage] = useState(0);
      const [sel, setSel] = useState(() => new Set());
      const [reassignTo, setReassignTo] = useState('');
      const [working, setWorking] = useState(false);

      const load = useCallback(() => {
        setLoading(true); setErr('');
        fetch(API + '/api/faces/person/' + person.id + '/inspect')
          .then(r => r.json())
          .then(d => { if (d.detail) throw new Error(d.detail); setData(d); setLoading(false); })
          .catch(e2 => { setErr(e2.message || String(e2)); setLoading(false); });
      }, [person.id]);
      useEffect(() => { load(); }, [load]);

      const toggle = useCallback((fid) => {
        setSel(prev => { const n = new Set(prev); n.has(fid) ? n.delete(fid) : n.add(fid); return n; });
      }, []);

      // sub_id -> [face_id, ...], so a whole sub-cluster can be selected at once
      // from the card view (bulk unassign / reassign multiple clusters without
      // drilling into each). The shared `sel` set means the existing action bar
      // applies unchanged.
      const subFaceIds = useMemo(() => {
        const m = {};
        if (data) for (const f of data.faces) (m[f.sub_id] || (m[f.sub_id] = [])).push(f.face_id);
        return m;
      }, [data]);
      const subSelected = useCallback(
        (sid) => { const ids = subFaceIds[sid] || []; return ids.length > 0 && ids.every(id => sel.has(id)); },
        [subFaceIds, sel]);
      const toggleSub = useCallback((sid) => {
        const ids = subFaceIds[sid] || [];
        const allIn = ids.length > 0 && ids.every(id => sel.has(id));
        setSel(prev => { const n = new Set(prev); ids.forEach(id => allIn ? n.delete(id) : n.add(id)); return n; });
      }, [subFaceIds, sel]);

      // Faces for the current scope (a drilled-in sub-cluster, or ranked-all).
      const scopeFaces = useMemo(() => {
        if (!data) return [];
        if (view === 'ranked') {
          return data.faces.slice().sort((a, b) => b.dist - a.dist);
        }
        if (activeSub != null) {
          return data.faces.filter(f => f.sub_id === activeSub).sort((a, b) => b.dist - a.dist);
        }
        return [];
      }, [data, view, activeSub]);

      const pageFaces = useMemo(
        () => scopeFaces.slice(page * INSP_PAGE, (page + 1) * INSP_PAGE),
        [scopeFaces, page]);
      const nPages = Math.max(1, Math.ceil(scopeFaces.length / INSP_PAGE));

      const selectAllScope = useCallback(() => {
        setSel(prev => { const n = new Set(prev); scopeFaces.forEach(f => n.add(f.face_id)); return n; });
      }, [scopeFaces]);
      const clearSel = useCallback(() => setSel(new Set()), []);

      const apply = useCallback((personName) => {
        if (sel.size === 0) return;
        const ids = Array.from(sel);
        const verb = personName ? ('reassign ' + ids.length + ' face(s) to ' + personName) : ('unassign ' + ids.length + ' face(s)');
        if (!confirm('Confirm: ' + verb + '? This writes to the database.')) return;
        setWorking(true);
        fetch(API + '/api/faces/bulk-assign', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ face_ids: ids, person_name: personName || null }),
        }).then(r => r.json()).then(() => {
          setWorking(false); setSel(new Set()); setReassignTo('');
          load();                 // refresh inspector (faces moved out)
          if (onChanged) onChanged();
        }).catch(e2 => { setWorking(false); setErr(e2.message || String(e2)); });
      }, [sel, load, onChanged]);

      const reassignTargets = useMemo(
        () => (persons || []).filter(p => p.id !== person.id).map(p => p.name),
        [persons, person.id]);

      const drillSub = useCallback((sid) => { setActiveSub(sid); setPage(0); }, []);
      const backToSubs = useCallback(() => { setActiveSub(null); setPage(0); }, []);
      const switchView = useCallback((v) => { setView(v); setActiveSub(null); setPage(0); }, []);

      return e('div', { className: 'insp-overlay', onClick: (ev) => { if (ev.target === ev.currentTarget) onClose(); } },
        e('div', { className: 'insp-panel' },
          e('div', { className: 'insp-header' },
            e('div', { style: { flex: 1 } },
              e('div', { className: 'insp-title' }, 'Inspect: ' + person.name),
              data && e('div', { className: 'insp-sub' },
                data.person.face_count.toLocaleString() + ' faces · ' +
                data.sub_clusters.filter(s => s.sub_id !== -1).length + ' sub-clusters · ' +
                data.n_outliers.toLocaleString() + ' outliers · ' +
                data.n_dup_faces.toLocaleString() + ' duplicates · core=' + data.params.ref_source),
            ),
            e('div', { className: 'insp-toggle' },
              e('button', { className: view === 'subs' ? 'active' : '', onClick: () => switchView('subs') }, 'Sub-clusters'),
              e('button', { className: view === 'ranked' ? 'active' : '', onClick: () => switchView('ranked') }, 'Ranked by distance'),
            ),
            e('button', { className: 'insp-btn', onClick: onClose }, '× Close'),
          ),

          e('div', { className: 'insp-body' },
            loading && e('div', { className: 'loading' }, 'Running DBSCAN over this person’s faces…'),
            err && e('div', { style: { color: '#f87171' } }, err),

            // ---- Sub-cluster cards ----
            !loading && data && view === 'subs' && activeSub == null && e('div', null,
              e('div', { className: 'insp-sub', style: { marginBottom: 10 } },
                'Cards outlined amber have a high median distance to the core — likely a different person. ' +
                'Click a card to review; tick the ☐ corner to select whole sub-clusters, then unassign or reassign them all at once below.'),
              e('div', { className: 'insp-subgrid' },
                ...data.sub_clusters.map(s => e('div', {
                  key: s.sub_id,
                  className: 'insp-card' + (s.sub_id !== -1 && s.median_dist > 0.95 ? ' suspect' : '')
                    + (subSelected(s.sub_id) ? ' selected' : ''),
                  onClick: () => drillSub(s.sub_id),
                },
                  e('div', {
                    className: 'insp-card-check',
                    title: 'Select this whole sub-cluster (' + s.size + ' faces)',
                    onClick: (ev) => { ev.stopPropagation(); toggleSub(s.sub_id); },
                  }, subSelected(s.sub_id) ? '✓' : ''),
                  e('img', { src: API + '/api/faces/crop/' + s.rep_face_id + '?size=200', loading: 'lazy' }),
                  e('div', { className: 'insp-card-meta' },
                    e('div', null, s.sub_id === -1 ? ('Outliers · ' + s.size) : ('Sub #' + s.sub_id + ' · ' + s.size)),
                    e('div', { className: 'd' }, 'med ' + s.median_dist.toFixed(2) + ' · max ' + s.max_dist.toFixed(2)),
                  ),
                )),
              ),
            ),

            // ---- Drilled-in sub-cluster OR ranked view: paginated face grid ----
            !loading && data && (view === 'ranked' || activeSub != null) && e('div', null,
              e('div', { className: 'insp-pager' },
                view === 'subs' && e('button', { className: 'insp-btn', onClick: backToSubs }, '← Sub-clusters'),
                e('strong', null, view === 'ranked'
                  ? 'All faces, farthest-from-core first'
                  : (activeSub === -1 ? 'Outliers' : 'Sub #' + activeSub)),
                e('span', { className: 'insp-sub' }, scopeFaces.length.toLocaleString() + ' faces'),
                e('span', { style: { flex: 1 } }),
                e('button', { className: 'insp-btn', disabled: page <= 0, onClick: () => setPage(p => p - 1) }, '← Prev'),
                e('span', null, 'Page ' + (page + 1) + ' / ' + nPages),
                e('button', { className: 'insp-btn', disabled: page >= nPages - 1, onClick: () => setPage(p => p + 1) }, 'Next →'),
                e('button', { className: 'insp-btn', onClick: selectAllScope }, 'Select all ' + scopeFaces.length),
              ),
              e('div', { className: 'insp-facegrid' },
                ...pageFaces.map(f => e(FaceTile, { key: f.face_id, f, selected: sel.has(f.face_id), onToggle: toggle })),
              ),
            ),
          ),

          // ---- Action bar ----
          e('div', { className: 'insp-actionbar' },
            e('strong', null, sel.size + ' selected'),
            e('button', { className: 'insp-btn', onClick: clearSel, disabled: sel.size === 0 }, 'Clear'),
            e('button', { className: 'insp-btn danger', onClick: () => apply(null), disabled: sel.size === 0 || working },
              working ? 'Working…' : 'Unassign from ' + person.name),
            e('span', { style: { flex: 1 } }),
            e('select', {
              value: reassignTo, onChange: (ev) => setReassignTo(ev.target.value),
              style: { background: 'var(--surface2)', color: 'var(--text)', border: '1px solid var(--border)', borderRadius: 6, padding: '6px 8px' },
            },
              e('option', { value: '' }, 'Reassign to…'),
              ...reassignTargets.map(n => e('option', { key: n, value: n }, n)),
            ),
            e('button', {
              className: 'insp-btn primary', disabled: sel.size === 0 || !reassignTo || working,
              onClick: () => apply(reassignTo),
            }, 'Reassign ' + sel.size),
          ),
        ),
      );
    }

    // -----------------------------------------------------------------------
    // PhotoModal — full photo viewer with face bboxes (same as search page)
    // -----------------------------------------------------------------------
    function PhotoModal({ photo, onClose, onPrev, onNext, index, total, onFaceAssigned, persons }) {
      return e(PS.PhotoModal, {
        photo, onClose, onPrev, onNext, index, total, persons, onFaceAssigned,
        fetchDetail: true,
        showFaces: true,
        showCollections: false,
        showLocation: true,
        showAesthetics: true,
      });
    }

    // -----------------------------------------------------------------------
    // App
    // -----------------------------------------------------------------------
    function App() {
      const initParams = getUrlParams();
      const [groups, setGroups] = useState([]);
      const [total, setTotal] = useState(0);
      const [counts, setCounts] = useState({ named: 0, unknown: 0, ignored: 0 });
      const [loading, setLoading] = useState(true);
      const [loadingMore, setLoadingMore] = useState(false);
      const [filter, setFilter] = useState(initParams.filter);
      // Content filters (date / place / semantic q). Applied on submit, not per
      // keystroke; restrict clusters/persons to those in matching photos.
      const [cf, setCf] = useState({ date_from: '', date_to: '', location: '', q: '' });
      const PAGE_SIZE = 200;
      const [selectedGroup, setSelectedGroup] = useState(null);
      const [groupPhotos, setGroupPhotos] = useState([]);
      const [sortBy, setSortBy] = useState('date_asc');
      const [loadingPhotos, setLoadingPhotos] = useState(false);
      const [editing, setEditing] = useState(false);
      const [editName, setEditName] = useState('');
      const [nameError, setNameError] = useState('');
      const [merging, setMerging] = useState(false);
      const [mergeTarget, setMergeTarget] = useState('');
      // Split-cluster state: opened from the detail header on unknown
      // clusters. Preview runs dry_run=true; Apply runs dry_run=false, then
      // reloads groups.
      const [splitting, setSplitting] = useState(false);
      const [splitEps, setSplitEps] = useState('0.45');
      const [splitMinSamples, setSplitMinSamples] = useState('2');
      const [splitPreview, setSplitPreview] = useState(null);
      const [splitWorking, setSplitWorking] = useState(false);
      const [splitError, setSplitError] = useState('');
      const editRef = useRef(null);
      const autoOpened = useRef(false);

      // Photo modal state
      const [modalPhoto, setModalPhoto] = useState(null);
      const [modalIndex, setModalIndex] = useState(-1);
      const [persons, setPersons] = useState([]);
      const [inspectPerson, setInspectPerson] = useState(null);  // {id, name} or null

      // Load persons list for face editing dropdown
      const loadPersons = useCallback(() => {
        fetch(API + '/api/persons').then(r => r.json()).then(d => setPersons(d.persons || [])).catch(() => {});
      }, []);

      // Loads the first page for the current filter. `filterOverride` lets the
      // caller pass a fresh value synchronously (useState batching means the
      // `filter` captured in this callback can lag behind changeFilter).
      // Also refreshes `persons` so merge/rename dropdowns see newly-created
      // persons without a full page reload — loadGroups fires after every
      // mutation, so piggy-backing keeps both in sync.
      const loadGroups = useCallback((filterOverride, cfOverride) => {
        setLoading(true);
        loadPersons();
        const f = filterOverride || filter;
        const c = cfOverride || cf;
        const url = API + '/api/faces/groups?filter=' + encodeURIComponent(f) +
          '&limit=' + PAGE_SIZE + '&offset=0' + cfParams(c);
        return fetch(url)
          .then(r => r.json())
          .then(data => {
            setGroups(data.groups || []);
            setTotal(data.total || 0);
            setCounts(data.counts || { named: 0, unknown: 0, ignored: 0 });
            setLoading(false);
            return data.groups || [];
          })
          .catch(() => { setLoading(false); return []; });
      }, [filter, cf, loadPersons]);

      const loadMore = useCallback(() => {
        if (loadingMore || groups.length >= total) return;
        setLoadingMore(true);
        const url = API + '/api/faces/groups?filter=' + encodeURIComponent(filter) +
          '&limit=' + PAGE_SIZE + '&offset=' + groups.length + cfParams(cf);
        fetch(url)
          .then(r => r.json())
          .then(data => {
            setGroups(prev => prev.concat(data.groups || []));
            setTotal(data.total || 0);
            setCounts(data.counts || counts);
            setLoadingMore(false);
          })
          .catch(() => setLoadingMore(false));
      }, [filter, cf, groups.length, total, loadingMore, counts]);

      useEffect(() => {
        loadPersons();
        loadGroups().then(grps => {
          if (autoOpened.current) return;
          autoOpened.current = true;
          const params = getUrlParams();
          // Auto-open if the URL has name, face_id, cluster_id, or person_id.
          // cluster_id and person_id bypass the loaded-groups cache via
          // /api/faces/group-info so they work for hidden singletons and
          // groups not on the first paginated page (useful for linking
          // straight from suggest-face-merges output).
          if (params.name) {
            const g = grps.find(g => g.type === 'person' && g.label.toLowerCase() === params.name.toLowerCase());
            if (g) openGroupDirect(g);
          } else if (params.cluster_id) {
            const cid = parseInt(params.cluster_id);
            const g = grps.find(g => g.type === 'cluster' && g.cluster_id === cid);
            if (g) { openGroupDirect(g); return; }
            fetch(API + '/api/faces/group-info?cluster_id=' + cid)
              .then(r => r.ok ? r.json() : null)
              .then(info => { if (info) openGroupDirect(info); })
              .catch(() => {});
          } else if (params.person_id) {
            const pid = parseInt(params.person_id);
            const g = grps.find(g => g.type === 'person' && g.person_id === pid);
            if (g) { openGroupDirect(g); return; }
            fetch(API + '/api/faces/group-info?person_id=' + pid)
              .then(r => r.ok ? r.json() : null)
              .then(info => { if (info) openGroupDirect(info); })
              .catch(() => {});
          } else if (params.face_id) {
            const fid = parseInt(params.face_id);
            const g = grps.find(g => g.rep_face_id === fid);
            if (g) openGroupDirect(g);
          }
        });
      }, []);

      // Server applies `filter` and `include_singletons`, so `groups` is already
      // the correct paginated slice. Keep the name to minimise downstream churn.
      const filteredGroups = groups;

      const loadGroupPhotos = useCallback((group) => {
        setLoadingPhotos(true);
        const type = group.type === 'person' ? 'person' : 'cluster';
        const id = group.type === 'person' ? group.person_id : group.cluster_id;
        fetch(API + '/api/faces/group/' + type + '/' + id + '/photos')
          .then(r => r.json())
          .then(data => { setGroupPhotos(data.photos || []); setLoadingPhotos(false); })
          .catch(() => setLoadingPhotos(false));
      }, []);

      const openGroupDirect = useCallback((group) => {
        setSelectedGroup(group);
        setEditing(false);
        setMerging(false);
        setNameError('');
        setLoadingPhotos(true);
        const type = group.type === 'person' ? 'person' : 'cluster';
        const id = group.type === 'person' ? group.person_id : group.cluster_id;
        fetch(API + '/api/faces/group/' + type + '/' + id + '/photos')
          .then(r => r.json())
          .then(data => { setGroupPhotos(data.photos || []); setLoadingPhotos(false); })
          .catch(() => setLoadingPhotos(false));
      }, []);

      const openGroup = useCallback((group) => {
        openGroupDirect(group);
        // Update URL
        if (group.type === 'person') {
          updateUrl({ name: group.label, filter });
        } else {
          updateUrl({ face_id: String(group.rep_face_id || group.cluster_id), filter });
        }
      }, [filter]);

      const closeDetail = useCallback(() => {
        setSelectedGroup(null);
        setGroupPhotos([]);
        setEditing(false);
        setMerging(false);
        setNameError('');
        updateUrl({ filter });
      }, [filter]);

      const changeFilter = useCallback((f) => {
        setFilter(f);
        updateUrl({ filter: f, name: selectedGroup && selectedGroup.type === 'person' ? selectedGroup.label : '', face_id: '' });
        loadGroups(f);
      }, [selectedGroup, loadGroups]);

      // Named persons for the merge dropdown (exclude current group if it's a person).
      // Sourced from /api/persons (the full list) rather than `groups` because
      // pagination/filtering may have hidden some persons from the loaded page.
      const mergeTargets = useMemo(() => {
        return persons
          .filter(p =>
            !(selectedGroup && selectedGroup.type === 'person' && selectedGroup.person_id === p.id))
          .map(p => ({ person_id: p.id, label: p.name, photo_count: p.photo_count }));
      }, [persons, selectedGroup]);

      const startRename = useCallback(() => {
        setEditName(selectedGroup.label.startsWith('Unknown') ? '' : selectedGroup.label);
        setEditing(true);
        setMerging(false);
        setNameError('');
        setTimeout(() => { if (editRef.current) editRef.current.focus(); }, 50);
      }, [selectedGroup]);

      const startMerge = useCallback(() => {
        setMerging(true);
        setEditing(false);
        setMergeTarget('');
        setNameError('');
      }, []);

      const saveMerge = useCallback(() => {
        if (!mergeTarget || !selectedGroup) { setMerging(false); return; }

        const faceIds = groupPhotos.map(p => p.face_id).filter(Boolean);
        if (faceIds.length === 0) { setMerging(false); return; }

        Promise.all(faceIds.map(fid =>
          fetch(API + '/api/faces/' + fid + '/assign?name=' + encodeURIComponent(mergeTarget), { method: 'POST' })
        )).then(() => {
          setMerging(false);
          setSelectedGroup(null);
          setGroupPhotos([]);
          updateUrl({ filter });
          loadGroups();
        }).catch(() => setMerging(false));
      }, [mergeTarget, selectedGroup, groupPhotos, loadGroups, filter]);

      const startSplit = useCallback(() => {
        setSplitting(true);
        setEditing(false);
        setMerging(false);
        setSplitPreview(null);
        setSplitError('');
      }, []);

      const cancelSplit = useCallback(() => {
        setSplitting(false);
        setSplitPreview(null);
        setSplitError('');
      }, []);

      // Shared body for dry-run preview + apply — one call, the caller
      // chooses dry_run.
      const postSplit = useCallback((dryRun) => {
        if (!selectedGroup || selectedGroup.type !== 'cluster') return null;
        const eps = parseFloat(splitEps);
        const minSamples = parseInt(splitMinSamples, 10);
        if (!isFinite(eps) || eps <= 0) {
          setSplitError('eps must be a positive number (typical 0.35–0.55)');
          return null;
        }
        if (!isFinite(minSamples) || minSamples < 1) {
          setSplitError('min_samples must be ≥ 1');
          return null;
        }
        setSplitError('');
        setSplitWorking(true);
        return fetch(API + '/api/faces/clusters/' + selectedGroup.cluster_id + '/split', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ eps, min_samples: minSamples, dry_run: dryRun }),
        })
          .then(r => r.json().then(d => ({ ok: r.ok, data: d })))
          .then(({ ok, data }) => {
            setSplitWorking(false);
            if (!ok) {
              setSplitError(data && data.detail ? data.detail : 'Split failed');
              return null;
            }
            return data;
          })
          .catch(err => {
            setSplitWorking(false);
            setSplitError(err.message || String(err));
            return null;
          });
      }, [selectedGroup, splitEps, splitMinSamples]);

      const runSplitPreview = useCallback(() => {
        const p = postSplit(true);
        if (p) p.then(data => { if (data) setSplitPreview(data); });
      }, [postSplit]);

      const applySplit = useCallback(() => {
        const p = postSplit(false);
        if (p) p.then(data => {
          if (!data) return;
          setSplitting(false);
          setSplitPreview(null);
          closeDetail();
          loadGroups();
        });
      }, [postSplit, closeDetail, loadGroups]);

      const saveRename = useCallback(() => {
        const name = editName.trim();
        if (!name || !selectedGroup) { setEditing(false); return; }

        // Check for duplicate name (different person). Uses the full persons list
        // rather than the paginated `groups` so names on unloaded pages still collide.
        const existing = persons.find(p =>
          p.name.toLowerCase() === name.toLowerCase()
          && !(selectedGroup.type === 'person' && selectedGroup.person_id === p.id)
        );
        if (existing) {
          setNameError('A person named "' + existing.name + '" already exists. Use a more specific name.');
          return;
        }
        setNameError('');

        const faceIds = groupPhotos.map(p => p.face_id).filter(Boolean);
        if (faceIds.length === 0) { setEditing(false); return; }

        Promise.all(faceIds.map(fid =>
          fetch(API + '/api/faces/' + fid + '/assign?name=' + encodeURIComponent(name), { method: 'POST' })
        )).then(() => {
          setEditing(false);
          setSelectedGroup(prev => prev ? { ...prev, label: name, type: 'person' } : prev);
          updateUrl({ name, filter });
          loadGroups();
        }).catch(() => setEditing(false));
      }, [editName, selectedGroup, groupPhotos, groups, loadGroups, filter]);

      const handleExport = useCallback(() => {
        fetch(API + '/api/faces/manual-assignments')
          .then(r => r.json())
          .then(data => {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'face_assignments.json';
            a.click();
            URL.revokeObjectURL(url);
          });
      }, []);

      const sortedGroupPhotos = useMemo(() => PS.applySortOrder(groupPhotos, sortBy), [groupPhotos, sortBy]);

      // Photo modal handlers
      const openPhotoAt = useCallback((i) => {
        const idx = ((i % sortedGroupPhotos.length) + sortedGroupPhotos.length) % sortedGroupPhotos.length;
        setModalIndex(idx);
        setModalPhoto(sortedGroupPhotos[idx]);
      }, [sortedGroupPhotos]);

      const closeModal = useCallback(() => { setModalPhoto(null); setModalIndex(-1); }, []);

      // ---- Multi-select state ----
      const [multiSelect, setMultiSelect] = useState(false);
      const [selected, setSelected] = useState(new Set()); // set of group keys like "p3" or "c42"
      const [multiAction, setMultiAction] = useState(null); // 'merge' | 'setname' | 'clear' | null
      const [multiName, setMultiName] = useState('');
      const [multiMergeTarget, setMultiMergeTarget] = useState('');
      const [multiError, setMultiError] = useState('');
      const [multiWorking, setMultiWorking] = useState(false);
      const multiInputRef = useRef(null);

      const groupKey = (g) => (g.type === 'person' ? 'p' : 'c') + (g.person_id || g.cluster_id);
      const lastSelectedIdx = useRef(null); // index into filteredGroups

      const toggleSelect = useCallback((g, ev) => {
        const key = groupKey(g);
        setSelected(prev => {
          const next = new Set(prev);
          // Find index of clicked item in the visible grid
          const clickedIdx = filteredGroups.findIndex(fg => groupKey(fg) === key);

          if (ev && ev.shiftKey && lastSelectedIdx.current != null && clickedIdx >= 0) {
            // Shift-click: select entire range between last click and this one
            const lo = Math.min(lastSelectedIdx.current, clickedIdx);
            const hi = Math.max(lastSelectedIdx.current, clickedIdx);
            for (let i = lo; i <= hi; i++) {
              next.add(groupKey(filteredGroups[i]));
            }
          } else {
            // Normal click: toggle single item
            if (next.has(key)) next.delete(key); else next.add(key);
          }

          if (clickedIdx >= 0) lastSelectedIdx.current = clickedIdx;
          return next;
        });
      }, [filteredGroups]);

      const exitMultiSelect = useCallback(() => {
        setMultiSelect(false);
        setSelected(new Set());
        setMultiAction(null);
        setMultiName('');
        setMultiMergeTarget('');
        setMultiError('');
        lastSelectedIdx.current = null;
      }, []);

      // Escape key exits multi-select
      useEffect(() => {
        if (!multiSelect) return;
        const handler = (ev) => { if (ev.key === 'Escape') exitMultiSelect(); };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [multiSelect, exitMultiSelect]);

      // Global keyboard shortcuts: Escape closes detail, 'm' enters multi-select
      useEffect(() => {
        if (multiSelect || modalPhoto) return; // other handlers take priority
        const handler = (ev) => {
          // Don't trigger shortcuts when typing in inputs
          if (ev.target.tagName === 'INPUT' || ev.target.tagName === 'SELECT' || ev.target.tagName === 'TEXTAREA') return;
          if (ev.key === 'Escape' && selectedGroup) {
            closeDetail();
          }
          if (ev.key === 'm' && !selectedGroup) {
            setMultiSelect(true);
            setSelected(new Set());
            setMultiAction(null);
            setMultiError('');
          }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [multiSelect, modalPhoto, selectedGroup, closeDetail]);

      // Focus input when starting set-name action
      useEffect(() => {
        if (multiAction === 'setname' && multiInputRef.current) multiInputRef.current.focus();
      }, [multiAction]);

      // Resolve selected groups to their group objects
      const selectedGroups = useMemo(() => {
        return groups.filter(g => selected.has(groupKey(g)));
      }, [groups, selected]);

      // Named persons for multi-merge (exclude any selected named persons). Full
      // persons list, not paginated groups — unloaded pages still count.
      // Keep the exclusion in sync with groupKey() which uses 'p' + person_id.
      const multiMergeTargets = useMemo(() => {
        return persons
          .filter(p => !selected.has('p' + p.id))
          .map(p => ({ person_id: p.id, label: p.name, photo_count: p.photo_count, type: 'person' }));
      }, [persons, selected]);

      // Collect face IDs from selected groups and run an action on all of them
      const runMultiAction = useCallback((actionFn) => {
        if (selectedGroups.length === 0) return;
        setMultiWorking(true);

        const specs = selectedGroups.map(g => ({
          type: g.type === 'person' ? 'person' : 'cluster',
          id: g.type === 'person' ? g.person_id : g.cluster_id,
        }));

        fetch(API + '/api/faces/bulk-collect', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ groups: specs }),
        })
          .then(r => r.json())
          .then(data => actionFn(data.face_ids || []))
          .catch(() => setMultiWorking(false));
      }, [selectedGroups]);

      const doMultiMerge = useCallback(() => {
        if (!multiMergeTarget) return;
        runMultiAction((faceIds) => {
          Promise.all(faceIds.map(fid =>
            fetch(API + '/api/faces/' + fid + '/assign?name=' + encodeURIComponent(multiMergeTarget), { method: 'POST' })
          )).then(() => {
            setMultiWorking(false);
            exitMultiSelect();
            loadGroups();
          }).catch(() => setMultiWorking(false));
        });
      }, [multiMergeTarget, runMultiAction, exitMultiSelect, loadGroups]);

      const doMultiSetName = useCallback(() => {
        const name = multiName.trim();
        if (!name) return;

        // Validate unique across the full persons list (paginated `groups` may hide persons).
        const existing = persons.find(p =>
          p.name.toLowerCase() === name.toLowerCase()
          && !selected.has('p' + p.id)
        );
        if (existing) {
          setMultiError('A person named "' + existing.name + '" already exists. Use a more specific name.');
          return;
        }
        setMultiError('');

        runMultiAction((faceIds) => {
          Promise.all(faceIds.map(fid =>
            fetch(API + '/api/faces/' + fid + '/assign?name=' + encodeURIComponent(name), { method: 'POST' })
          )).then(() => {
            setMultiWorking(false);
            exitMultiSelect();
            loadGroups();
          }).catch(() => setMultiWorking(false));
        });
      }, [multiName, groups, selected, runMultiAction, exitMultiSelect, loadGroups]);

      const doMultiClear = useCallback(() => {
        runMultiAction((faceIds) => {
          Promise.all(faceIds.map(fid =>
            fetch(API + '/api/faces/' + fid + '/clear', { method: 'POST' })
          )).then(() => {
            setMultiWorking(false);
            exitMultiSelect();
            loadGroups();
          }).catch(() => setMultiWorking(false));
        });
      }, [runMultiAction, exitMultiSelect, loadGroups]);

      // Ignore/unignore clusters
      const doIgnore = useCallback((clusterIds) => {
        fetch(API + '/api/faces/ignore', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cluster_ids: clusterIds }),
        }).then(() => loadGroups()).catch(() => {});
      }, [loadGroups]);

      const doUnignore = useCallback((clusterIds) => {
        fetch(API + '/api/faces/unignore', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cluster_ids: clusterIds }),
        }).then(() => loadGroups()).catch(() => {});
      }, [loadGroups]);

      // Multi-select ignore: collect cluster_ids from selected groups
      const doMultiIgnore = useCallback(() => {
        const clusterIds = [];
        for (const g of groups) {
          if (selected.has(groupKey(g)) && g.type === 'cluster' && !g.ignored) {
            clusterIds.push(g.cluster_id);
          }
        }
        if (clusterIds.length === 0) return;
        doIgnore(clusterIds);
        exitMultiSelect();
      }, [groups, selected, doIgnore, exitMultiSelect]);

      const doMultiUnignore = useCallback(() => {
        const clusterIds = [];
        for (const g of groups) {
          if (selected.has(groupKey(g)) && g.type === 'cluster' && g.ignored) {
            clusterIds.push(g.cluster_id);
          }
        }
        if (clusterIds.length === 0) return;
        doUnignore(clusterIds);
        exitMultiSelect();
      }, [groups, selected, doUnignore, exitMultiSelect]);

      // Counts come from the server (pre-pagination, pre-filter). Using the local
      // `groups` array would under-report since it only holds the current page.
      const namedCount = counts.named;
      const unknownCount = counts.unknown;
      const ignoredCount = counts.ignored;
      const cfActive = !!(cf.date_from || cf.date_to || cf.location || cf.q);

      return e('div', null,
        // Header
        e(PS.SharedHeader, { activePage: 'faces' }),

        e('div', { className: 'container' },
          e('div', { className: 'page-title' }, 'Faces'),
          e('div', { className: 'page-subtitle' },
            namedCount + ' named \u00B7 ' + unknownCount + ' unknown'
            + (ignoredCount > 0 ? ' \u00B7 ' + ignoredCount + ' ignored' : '')),

          // Sticky toolbar + shortcut cheatsheet — stays visible while scrolling
          // through the (often thousands) of face cards so the user doesn't
          // have to jump back up to switch filters or remember hotkeys.
          e('div', { className: 'sticky-tools' },
            e('div', { className: 'toolbar' },
              e('button', {
                className: filter === 'all' ? 'active' : '',
                onClick: () => changeFilter('all'),
              }, 'All (' + (namedCount + unknownCount) + ')'),
              e('button', {
                className: filter === 'named' ? 'active' : '',
                onClick: () => changeFilter('named'),
              }, 'Named (' + namedCount + ')'),
              e('button', {
                className: filter === 'unknown' ? 'active' : '',
                onClick: () => changeFilter('unknown'),
              }, 'Unknown (' + unknownCount + ')'),
              ignoredCount > 0 && e('button', {
                className: filter === 'ignored' ? 'active' : '',
                onClick: () => changeFilter('ignored'),
              }, 'Ignored (' + ignoredCount + ')'),
              !multiSelect && e('button', {
                onClick: () => { setMultiSelect(true); setSelected(new Set()); setMultiAction(null); setMultiError(''); },
                style: { marginLeft: 'auto' },
              }, 'Select Multiple'),
              !multiSelect && e('button', { onClick: handleExport },
                '\u2B07 Export Assignments'),
            ),
            // Content-filter bar: restrict clusters to those appearing in photos
            // matching a date range / place / semantic search. Applied on submit.
            e('div', { className: 'toolbar', style: { marginTop: '6px', flexWrap: 'wrap', gap: '6px' } },
              e('span', { style: { fontSize: '12px', color: 'var(--muted, #888)', alignSelf: 'center' } }, 'Filter clusters:'),
              e('input', { type: 'date', value: cf.date_from, title: 'photos on/after',
                onChange: ev => setCf({ ...cf, date_from: ev.target.value }) }),
              e('span', { style: { alignSelf: 'center', color: 'var(--muted, #888)' } }, '\u2013'),
              e('input', { type: 'date', value: cf.date_to, title: 'photos on/before',
                onChange: ev => setCf({ ...cf, date_to: ev.target.value }) }),
              e('input', { type: 'text', placeholder: 'place', value: cf.location, style: { width: '110px' },
                onChange: ev => setCf({ ...cf, location: ev.target.value }),
                onKeyDown: ev => { if (ev.key === 'Enter') loadGroups(null, cf); } }),
              e('input', { type: 'text', placeholder: 'search\u2026', value: cf.q, style: { width: '150px' },
                onChange: ev => setCf({ ...cf, q: ev.target.value }),
                onKeyDown: ev => { if (ev.key === 'Enter') loadGroups(null, cf); } }),
              e('button', { onClick: () => loadGroups(null, cf) }, 'Apply'),
              cfActive && e('button', {
                onClick: () => { const empty = { date_from: '', date_to: '', location: '', q: '' }; setCf(empty); loadGroups(null, empty); },
              }, 'Clear'),
              cfActive && e('span', { style: { fontSize: '12px', color: 'var(--accent, #4a9)', alignSelf: 'center' } },
                total + ' matching group' + (total === 1 ? '' : 's')),
            ),
            e('div', { className: 'shortcuts-row' },
              !multiSelect && e('span', { className: 'group' },
                e('span', { className: 'kbd' }, 'M'), ' multi-select'),
              multiSelect && e('span', { className: 'group' },
                e('span', { className: 'kbd' }, 'Click'), ' toggle'),
              multiSelect && e('span', { className: 'group' },
                e('span', { className: 'kbd' }, 'Shift'), '+', e('span', { className: 'kbd' }, 'Click'), ' range'),
              e('span', { className: 'group' },
                e('span', { className: 'kbd' }, 'Esc'), multiSelect ? ' exit multi-select' : ' close detail'),
              e('span', { className: 'group' },
                'link to a cluster directly: ',
                e('code', { style: { fontSize: 11, color: 'var(--accent)' } },
                  '/faces?cluster_id=N')),
            ),
            // Multi-select action bar — stays sticky with the toolbar so the
            // user doesn't lose the action buttons when scrolling through a
            // long selection.
            multiSelect && e('div', { className: 'multi-bar' },
            e('span', { className: 'count' }, selected.size + ' selected'),

            // No sub-action active — show the action buttons
            !multiAction && selected.size > 0 && e('button', {
              className: 'primary',
              onClick: () => { setMultiAction('merge'); setMultiMergeTarget(''); },
              disabled: multiMergeTargets.length === 0,
              title: multiMergeTargets.length === 0 ? 'No named persons to merge into' : '',
            }, 'Merge Faces'),
            !multiAction && selected.size > 0 && e('button', {
              onClick: () => { setMultiAction('setname'); setMultiName(''); setMultiError(''); },
            }, 'Set Name'),
            !multiAction && selected.size > 0 && e('button', {
              className: 'danger',
              onClick: () => { setMultiAction('clear'); },
            }, 'Clear Name'),
            !multiAction && selected.size > 0 && filter !== 'ignored' && e('button', {
              onClick: doMultiIgnore,
              style: { color: 'var(--text-muted)' },
            }, 'Ignore'),
            !multiAction && selected.size > 0 && filter === 'ignored' && e('button', {
              onClick: doMultiUnignore,
            }, 'Unignore'),

            // Merge sub-action
            multiAction === 'merge' && e('select', {
              value: multiMergeTarget,
              onChange: (ev) => setMultiMergeTarget(ev.target.value),
            },
              e('option', { value: '' }, 'Select a person\u2026'),
              ...multiMergeTargets.map(g =>
                e('option', { key: g.person_id, value: g.label },
                  g.label + ' (' + g.photo_count + ')')
              ),
            ),
            multiAction === 'merge' && e('button', {
              className: 'primary',
              onClick: doMultiMerge,
              disabled: !multiMergeTarget || multiWorking,
            }, multiWorking ? 'Merging\u2026' : 'Merge'),
            multiAction === 'merge' && e('button', { onClick: () => setMultiAction(null) }, 'Back'),

            // Set Name sub-action
            multiAction === 'setname' && e('input', {
              ref: multiInputRef,
              className: 'inline-input',
              value: multiName,
              onChange: (ev) => { setMultiName(ev.target.value); setMultiError(''); },
              onKeyDown: (ev) => {
                if (ev.key === 'Enter') doMultiSetName();
                if (ev.key === 'Escape') { ev.stopPropagation(); setMultiAction(null); setMultiError(''); }
              },
              placeholder: 'Enter full name\u2026',
            }),
            multiAction === 'setname' && e('button', {
              className: 'primary',
              onClick: doMultiSetName,
              disabled: !multiName.trim() || multiWorking,
            }, multiWorking ? 'Saving\u2026' : 'Save'),
            multiAction === 'setname' && e('button', { onClick: () => { setMultiAction(null); setMultiError(''); } }, 'Back'),

            // Clear Name confirmation
            multiAction === 'clear' && e('span', { style: { fontSize: 13 } },
              'Clear names from ' + selected.size + ' group(s)?'),
            multiAction === 'clear' && e('button', {
              className: 'danger',
              onClick: doMultiClear,
              disabled: multiWorking,
            }, multiWorking ? 'Clearing\u2026' : 'Confirm Clear'),
            multiAction === 'clear' && e('button', { onClick: () => setMultiAction(null) }, 'Back'),

            // Cancel always visible
            e('button', { onClick: exitMultiSelect, style: { marginLeft: 'auto' } }, 'Cancel'),
            ),
            multiSelect && multiError && e('div', {
              className: 'name-error',
              style: { marginTop: 8 },
            }, multiError),
          ),

          loading && e('div', { className: 'loading' },
            'Loading faces\u2026 sorting by similarity',
            e('div', { className: 'loading-bar-container' },
              e('div', { className: 'loading-bar' }),
            ),
          ),

          !loading && filteredGroups.length === 0 &&
            e('div', { className: 'empty' }, 'No faces found. Run face detection first.'),

          // Face grid
          !loading && filteredGroups.length > 0 &&
            e('div', { className: 'face-grid' },
              ...filteredGroups.map(g => {
                const key = groupKey(g);
                const isSelected = selected.has(key);
                return e('div', {
                  key: key,
                  className: 'face-card' + (multiSelect ? ' selectable' : '') + (isSelected ? ' selected' : ''),
                  style: { position: 'relative' },
                  onClick: (ev) => multiSelect ? toggleSelect(g, ev) : openGroup(g),
                },
                  multiSelect && e('div', { className: 'select-check' }, isSelected ? '\u2713' : ''),
                  g.rep_face_id
                    ? e('img', {
                        src: API + '/api/faces/crop/' + g.rep_face_id + '?size=280',
                        alt: g.label,
                        loading: 'lazy',
                      })
                    : e('div', {
                        style: {
                          width: '100%', aspectRatio: '1', background: 'var(--surface2)',
                          display: 'flex', alignItems: 'center', justifyContent: 'center',
                          color: 'var(--text-muted)', fontSize: 28,
                        },
                      }, '?'),
                  e('div', { className: 'face-card-info' },
                    e('div', { className: 'face-card-name' }, g.label),
                    e('div', { className: 'face-card-count' },
                      g.photo_count + ' photo' + (g.photo_count !== 1 ? 's' : '')),
                  ),
                );
              }),
            ),

          // Load more — shown when the server has more groups than we've loaded
          !loading && filteredGroups.length > 0 && filteredGroups.length < total &&
            e('div', { style: { display: 'flex', justifyContent: 'center', margin: '24px 0' } },
              e('button', {
                onClick: loadMore,
                disabled: loadingMore,
                style: { padding: '10px 20px', fontSize: 14 },
              },
                loadingMore
                  ? 'Loading\u2026'
                  : 'Load more (' + (total - filteredGroups.length) + ' remaining)'),
            ),
        ),

        // Detail overlay (person/cluster view)
        selectedGroup && !modalPhoto && e('div', { className: 'detail-overlay', onClick: (ev) => {
          if (ev.target === ev.currentTarget) closeDetail();
        }},
          e('div', { className: 'detail-panel' },
            e('div', { className: 'detail-header' },
              selectedGroup.rep_face_id && e('img', {
                src: API + '/api/faces/crop/' + selectedGroup.rep_face_id + '?size=128',
                alt: selectedGroup.label,
              }),
              e('div', { style: { flex: 1 } },
                editing
                  ? e('div', null,
                      e('div', { style: { display: 'flex', gap: 8, alignItems: 'center' } },
                        e('input', {
                          ref: editRef,
                          className: 'detail-name-input',
                          value: editName,
                          onChange: (ev) => { setEditName(ev.target.value); setNameError(''); },
                          onKeyDown: (ev) => {
                            if (ev.key === 'Enter') saveRename();
                            if (ev.key === 'Escape') { setEditing(false); setNameError(''); }
                          },
                          placeholder: 'Enter full name...',
                        }),
                        e('button', { className: 'save-btn', onClick: saveRename }, 'Save'),
                        e('button', { className: 'rename-btn', onClick: () => { setEditing(false); setNameError(''); } }, 'Cancel'),
                      ),
                      nameError && e('div', { className: 'name-error' }, nameError),
                    )
                : merging
                  ? e('div', null,
                      e('div', { style: { display: 'flex', gap: 8, alignItems: 'center' } },
                        e('select', {
                          value: mergeTarget,
                          onChange: (ev) => setMergeTarget(ev.target.value),
                          style: {
                            fontSize: 16, padding: '4px 8px', background: 'var(--surface2)',
                            border: '1px solid var(--border)', borderRadius: 'var(--radius)',
                            color: 'var(--text)', width: 220,
                          },
                        },
                          e('option', { value: '' }, 'Select a person\u2026'),
                          ...mergeTargets.map(g =>
                            e('option', { key: g.person_id, value: g.label },
                              g.label + ' (' + g.photo_count + ' photos)')
                          ),
                        ),
                        e('button', {
                          className: 'save-btn',
                          onClick: saveMerge,
                          disabled: !mergeTarget,
                          style: !mergeTarget ? { opacity: 0.5, cursor: 'default' } : {},
                        }, 'Merge'),
                        e('button', { className: 'rename-btn', onClick: () => setMerging(false) }, 'Cancel'),
                      ),
                      e('div', { style: { fontSize: 12, color: 'var(--text-muted)', marginTop: 4 } },
                        'All ' + groupPhotos.length + ' photo(s) will be reassigned to the selected person.'),
                    )
                  : e('div', { className: 'detail-name' }, selectedGroup.label),
                !editing && !merging && e('div', { className: 'detail-stats' },
                  groupPhotos.length + ' photo' + (groupPhotos.length !== 1 ? 's' : '')),
              ),
              !editing && !merging && !splitting && e('div', { style: { display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' } },
                e('button', { className: 'rename-btn', onClick: startRename },
                  selectedGroup.label.startsWith('Unknown') ? 'Set Name' : 'Rename'),
                mergeTargets.length > 0 && e('button', { className: 'rename-btn', onClick: startMerge }, 'Merge'),
                selectedGroup.type === 'person' && e('button', {
                  className: 'rename-btn',
                  onClick: () => setInspectPerson({ id: selectedGroup.person_id, name: selectedGroup.label }),
                  title: 'Sub-cluster this person’s faces and surface the wrong ones (over-matches, duplicate-import contamination) to unassign or re-map',
                }, 'Inspect'),
                selectedGroup.type === 'cluster' && e('button', {
                  className: 'rename-btn',
                  onClick: startSplit,
                  title: 'Re-run DBSCAN with tighter eps on just this cluster to split lumped-together people into sub-clusters',
                }, 'Split'),
                selectedGroup.type === 'cluster' && !selectedGroup.ignored && e('button', {
                  className: 'rename-btn',
                  style: { color: 'var(--text-muted)' },
                  onClick: () => { doIgnore([selectedGroup.cluster_id]); closeDetail(); },
                }, 'Ignore'),
                selectedGroup.type === 'cluster' && selectedGroup.ignored && e('button', {
                  className: 'rename-btn',
                  onClick: () => { doUnignore([selectedGroup.cluster_id]); closeDetail(); },
                }, 'Unignore'),
              ),
              // Split form — shown in the header when user clicks "Split".
              splitting && e('div', {
                style: {
                  display: 'flex', gap: 10, alignItems: 'center',
                  flexWrap: 'wrap', flex: 1,
                },
              },
                e('span', { style: { fontSize: 13, fontWeight: 600 } }, 'Split into sub-clusters:'),
                e('label', { style: { fontSize: 12, color: 'var(--text-muted)' } }, 'eps'),
                e('input', {
                  type: 'number', step: '0.01', min: 0.1, max: 1.0,
                  value: splitEps,
                  onChange: (ev) => setSplitEps(ev.target.value),
                  style: { width: 70, padding: '4px 8px', background: 'var(--surface2)', color: 'var(--text)', border: '1px solid var(--border)', borderRadius: 4 },
                  disabled: splitWorking,
                }),
                e('label', { style: { fontSize: 12, color: 'var(--text-muted)' } }, 'min_samples'),
                e('input', {
                  type: 'number', step: '1', min: 1,
                  value: splitMinSamples,
                  onChange: (ev) => setSplitMinSamples(ev.target.value),
                  style: { width: 50, padding: '4px 8px', background: 'var(--surface2)', color: 'var(--text)', border: '1px solid var(--border)', borderRadius: 4 },
                  disabled: splitWorking,
                }),
                e('button', { className: 'rename-btn', onClick: runSplitPreview, disabled: splitWorking },
                  splitWorking && !splitPreview ? 'Previewing\u2026' : 'Preview'),
                splitPreview && e('button', {
                  className: 'rename-btn',
                  style: { background: 'var(--accent)', color: '#fff', borderColor: 'var(--accent)' },
                  onClick: applySplit,
                  disabled: splitWorking || splitPreview.sub_cluster_count === 0,
                }, splitWorking ? 'Applying\u2026' : ('Apply → ' + splitPreview.sub_cluster_count + ' new cluster' + (splitPreview.sub_cluster_count !== 1 ? 's' : ''))),
                e('button', { className: 'rename-btn', onClick: cancelSplit, disabled: splitWorking }, 'Cancel'),
              ),
              e('button', { className: 'detail-close', onClick: closeDetail }, '\u00D7'),
            ),
            splitting && (splitError || splitPreview) && e('div', {
              style: { padding: '12px 24px', borderBottom: '1px solid var(--border)' },
            },
              splitError && e('div', { style: { color: '#f87171', fontSize: 13 } }, splitError),
              splitPreview && e('div', { style: { fontSize: 13 } },
                e('div', { style: { marginBottom: 6 } },
                  e('strong', null, splitPreview.face_count),
                  ' faces would become ',
                  e('strong', null, splitPreview.sub_cluster_count),
                  ' sub-cluster' + (splitPreview.sub_cluster_count !== 1 ? 's' : ''),
                  ' (',
                  splitPreview.noise_count,
                  ' noise / unassigned)',
                ),
                splitPreview.histogram && Object.keys(splitPreview.histogram).length > 0 && e('div', {
                  style: { display: 'flex', flexWrap: 'wrap', gap: 6, color: 'var(--text-muted)' },
                },
                  ...Object.entries(splitPreview.histogram)
                    .sort((a, b) => b[1] - a[1])
                    .map(([cid, n]) => e('span', {
                      key: cid,
                      style: {
                        padding: '2px 8px',
                        background: 'var(--surface2)',
                        border: '1px solid var(--border)',
                        borderRadius: 4,
                        fontSize: 12,
                      },
                    }, '#' + cid + ': ' + n)),
                ),
              ),
            ),
            loadingPhotos && e('div', { className: 'loading' }, 'Loading photos...'),
            !loadingPhotos && e('div', { style: { display: 'flex', alignItems: 'center', gap: 8, margin: '0 0 8px 0' } },
              e('span', { style: { fontSize: 12, color: 'var(--text-muted)' } }, sortedGroupPhotos.length + ' photos'),
              e(PS.SortControl, { value: sortBy, onChange: setSortBy, options: ['date_asc', 'date_desc', 'quality_desc'] }),
            ),
            !loadingPhotos && e('div', { className: 'detail-photos' },
              ...sortedGroupPhotos.map((p, i) =>
                e('div', {
                  key: p.face_id || p.id,
                  className: 'detail-photo',
                  onClick: () => openPhotoAt(i),
                },
                  e('img', {
                    src: API + '/api/photos/' + p.id + '/thumbnail',
                    alt: p.filename || '',
                    loading: 'lazy',
                  }),
                  p.match_source && e('span', { className: 'match-type' },
                    p.match_source === 'temporal' ? '\u23F1 temporal'
                    : p.match_source === 'strict' ? '\u2713 strict'
                    : p.match_source === 'manual' ? '\u270E manual' : p.match_source),
                )
              ),
            ),
          ),
        ),

        // Photo modal
        inspectPerson && e(PersonInspector, {
          person: inspectPerson,
          persons,
          onClose: () => setInspectPerson(null),
          onChanged: () => { loadGroups(); loadPersons(); },
        }),

        modalPhoto && e(PhotoModal, {
          photo: modalPhoto,
          onClose: closeModal,
          onPrev: () => openPhotoAt(modalIndex - 1),
          onNext: () => openPhotoAt(modalIndex + 1),
          index: modalIndex,
          total: sortedGroupPhotos.length,
          persons: persons,
          onFaceAssigned: (faceId, personName) => {
            // Refresh groups and persons after a face assignment change
            loadGroups();
            loadPersons();
          },
        }),
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(e(App));
  </script>
</body>
</html>
