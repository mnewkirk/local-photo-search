<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status — Photo Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #333;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #4a9eff;
      --accent-hover: #6bb3ff;
      --green: #4ade80;
      --yellow: #facc15;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 42px;
    }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .nav-link {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      margin-left: 4px;
    }
    .nav-link:hover { text-decoration: underline; }
    .nav-link.active { color: var(--text); font-weight: 600; }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-sub {
      font-size: 12px;
      color: var(--text-muted);
    }

    .progress-bar-wrap {
      margin-top: 10px;
      background: var(--surface2);
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--accent);
      transition: width 0.4s ease;
    }
    .progress-bar-fill.complete { background: var(--green); }

    .refresh-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }

    .error { color: #f87171; font-size: 14px; margin-top: 16px; }
    .loading { color: var(--text-muted); font-size: 14px; }

    h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
      margin-top: 8px;
    }

    .cmd-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .cmd-table tr {
      border-bottom: 1px solid var(--border);
    }
    .cmd-table tr:last-child { border-bottom: none; }
    .cmd-table td {
      padding: 10px 12px;
      vertical-align: top;
    }
    .cmd-table td:first-child {
      white-space: nowrap;
      color: var(--text-muted);
      width: 160px;
    }
    .cmd-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .cmd-wrap > div + div {
      border-top: 1px solid var(--border);
    }
    .cmd-note {
      font-size: 11px;
      color: var(--text-muted);
      padding: 6px 14px 4px;
    }
    code {
      font-family: "SF Mono", "Fira Code", "Cascadia Code", Menlo, monospace;
      font-size: 12px;
      color: var(--accent);
      background: none;
      display: block;
      padding: 6px 14px 10px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* Activity chart */
    .chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 32px;
    }
    .chart-area {
      display: flex;
      align-items: flex-end;
      gap: 1px;
      height: 160px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .chart-bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-end;
      height: 100%;
      position: relative;
      min-width: 0;
    }
    .chart-bar-col:hover { opacity: 0.85; }
    .chart-seg {
      min-height: 0;
      transition: height 0.3s ease;
    }
    .chart-clear-row {
      position: absolute;
      bottom: -14px;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .chart-clear-seg {
      width: 100%;
      background: #f87171;
      min-height: 0;
    }
    .chart-x-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 2px;
    }
    .chart-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 12px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .chart-legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .chart-legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }
    .chart-tooltip {
      position: fixed;
      background: #222;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 11px;
      color: var(--text);
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
    }
    .chart-tooltip-row {
      display: flex;
      align-items: center;
      gap: 6px;
      line-height: 1.6;
    }
    .chart-tooltip-swatch {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      display: inline-block;
    }
    .chart-empty {
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* Errors log */
    .errors-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 32px;
      max-height: 300px;
      overflow-y: auto;
    }
    .error-row {
      font-size: 12px;
      font-family: "SF Mono", "Fira Code", Menlo, monospace;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }
    .error-row:last-child { border-bottom: none; }
    .error-time { color: var(--text-muted); white-space: nowrap; }
    .error-pass {
      color: var(--yellow);
      white-space: nowrap;
      min-width: 60px;
    }
    .error-msg { color: #f87171; word-break: break-all; }

    /* Verify failures */
    .fail-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 32px;
    }
    .fail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .fail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      max-height: 520px;
      overflow-y: auto;
    }
    .fail-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }
    .fail-card:hover { border-color: var(--accent); }
    .fail-thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: #111;
      display: block;
    }
    .fail-meta {
      padding: 6px 8px;
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.35;
    }
    .fail-filename {
      color: var(--text);
      font-family: "SF Mono", "Fira Code", Menlo, monospace;
      font-size: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .fail-flag {
      color: #f87171;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .btn-primary {
      background: var(--accent);
      color: #0a1520;
      border-color: var(--accent);
      font-weight: 600;
    }
    .btn-primary:hover { background: var(--accent-hover); color: #0a1520; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .toast {
      margin-top: 10px;
      font-size: 12px;
      color: var(--green);
    }
    .toast.err { color: #f87171; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="/shared.js"></script>
  <script>
    var e = React.createElement;
    var useState = React.useState;
    var useEffect = React.useEffect;
    var useRef = React.useRef;

    function pct(n, total) {
      if (!total) return 0;
      return Math.round((n / total) * 100);
    }

    var PASS_COLORS = {
      clip: '#4a9eff',
      faces: '#4ade80',
      quality: '#facc15',
      describe: '#c084fc',
      verify: '#fb923c',
      stacks: '#22d3ee',
      concepts: '#f472b6',
      tags: '#2dd4bf',
    };
    var PASS_LABELS = {
      clip: 'CLIP',
      faces: 'Faces',
      quality: 'Quality',
      describe: 'Descriptions',
      verify: 'Verify',
      stacks: 'Stacks',
      concepts: 'Concepts',
      tags: 'Tags',
    };

    function StatCard(props) {
      var label = props.label;
      var value = props.value;
      var sub = props.sub;
      var total = props.total;
      var n = props.n;

      var fraction = (total != null && n != null) ? n / total : null;
      var complete = fraction === 1;

      return e('div', { className: 'stat-card' },
        e('div', { className: 'stat-label' }, label),
        e('div', { className: 'stat-value' }, value),
        sub && e('div', { className: 'stat-sub' }, sub),
        fraction !== null && e('div', { className: 'progress-bar-wrap' },
          e('div', {
            className: 'progress-bar-fill' + (complete ? ' complete' : ''),
            style: { width: Math.round(fraction * 100) + '%' }
          })
        )
      );
    }

    function ActivityChart(props) {
      var activity = props.activity;
      var _tip = useState(null); var tooltip = _tip[0]; var setTooltip = _tip[1];

      if (!activity || activity.length === 0) {
        return e('div', null,
          e('h2', null, 'Indexing activity (last 3 days)'),
          e('div', { className: 'chart-wrap' },
            e('div', { className: 'chart-empty' }, 'No indexing activity recorded yet.')
          )
        );
      }

      // Build 72 hourly buckets
      var now = new Date();
      var buckets = [];
      for (var i = 71; i >= 0; i--) {
        var d = new Date(now.getTime() - i * 3600000);
        d.setMinutes(0, 0, 0);
        buckets.push({ hour: d, index: {}, clear: {} });
      }

      // Map activity data into buckets
      var bucketMap = {};
      buckets.forEach(function(b, idx) {
        // Key by ISO hour string in UTC to match server response
        var key = b.hour.getUTCFullYear() + '-' +
          String(b.hour.getUTCMonth() + 1).padStart(2, '0') + '-' +
          String(b.hour.getUTCDate()).padStart(2, '0') + 'T' +
          String(b.hour.getUTCHours()).padStart(2, '0') + ':00:00';
        bucketMap[key] = idx;
      });

      activity.forEach(function(row) {
        var idx = bucketMap[row.hour];
        if (idx === undefined) return;
        var target = row.action === 'clear' ? buckets[idx].clear : buckets[idx].index;
        target[row.pass_type] = (target[row.pass_type] || 0) + row.total;
      });

      // Find max height for scaling
      var maxIndex = 0;
      var maxClear = 0;
      buckets.forEach(function(b) {
        var indexTotal = 0;
        Object.keys(b.index).forEach(function(k) { indexTotal += b.index[k]; });
        if (indexTotal > maxIndex) maxIndex = indexTotal;
        var clearTotal = 0;
        Object.keys(b.clear).forEach(function(k) { clearTotal += b.clear[k]; });
        if (clearTotal > maxClear) maxClear = clearTotal;
      });

      var maxVal = Math.max(maxIndex, 1);
      var clearScale = maxClear > 0 ? Math.max(maxClear, 1) : 1;
      var chartHeight = 160;
      var clearHeight = maxClear > 0 ? 24 : 0;

      // Determine which pass types appear
      var activePasses = {};
      activity.forEach(function(row) { activePasses[row.pass_type] = true; });
      var passOrder = ['clip', 'faces', 'quality', 'concepts', 'describe', 'tags', 'verify', 'stacks'];

      // X-axis labels: show every 12 hours
      var xLabels = [];
      buckets.forEach(function(b, idx) {
        if (idx % 12 === 0 || idx === 71) {
          var h = b.hour;
          var label = (h.getMonth() + 1) + '/' + h.getDate() + ' ' +
            String(h.getHours()).padStart(2, '0') + ':00';
          xLabels.push({ idx: idx, label: label });
        }
      });

      function handleMouseEnter(bucketIdx, ev) {
        var b = buckets[bucketIdx];
        var lines = [];
        var h = b.hour;
        var timeStr = (h.getMonth() + 1) + '/' + h.getDate() + ' ' +
          String(h.getHours()).padStart(2, '0') + ':00';
        passOrder.forEach(function(p) {
          if (b.index[p]) lines.push({ pass: p, count: b.index[p], action: 'indexed' });
        });
        passOrder.forEach(function(p) {
          if (b.clear[p]) lines.push({ pass: p, count: b.clear[p], action: 'cleared' });
        });
        if (lines.length === 0) return;
        setTooltip({ x: ev.clientX, y: ev.clientY, time: timeStr, lines: lines });
      }

      function handleMouseMove(ev) {
        if (tooltip) setTooltip(Object.assign({}, tooltip, { x: ev.clientX, y: ev.clientY }));
      }

      function handleMouseLeave() { setTooltip(null); }

      var columns = buckets.map(function(b, idx) {
        var segs = [];
        var indexTotal = 0;
        passOrder.forEach(function(p) {
          if (b.index[p]) {
            indexTotal += b.index[p];
            segs.push(e('div', {
              key: p,
              className: 'chart-seg',
              style: {
                height: Math.max(1, Math.round((b.index[p] / maxVal) * chartHeight)) + 'px',
                background: PASS_COLORS[p] || '#666',
              }
            }));
          }
        });

        var clearSegs = [];
        if (maxClear > 0) {
          passOrder.forEach(function(p) {
            if (b.clear[p]) {
              clearSegs.push(e('div', {
                key: 'c-' + p,
                className: 'chart-clear-seg',
                style: {
                  height: Math.max(1, Math.round((b.clear[p] / clearScale) * clearHeight)) + 'px',
                }
              }));
            }
          });
        }

        return e('div', {
          key: idx,
          className: 'chart-bar-col',
          onMouseEnter: function(ev) { handleMouseEnter(idx, ev); },
          onMouseMove: handleMouseMove,
          onMouseLeave: handleMouseLeave,
        },
          segs.length > 0 ? segs : null,
          clearSegs.length > 0 ? e('div', { className: 'chart-clear-row' }, clearSegs) : null
        );
      });

      var legend = passOrder.filter(function(p) { return activePasses[p]; }).map(function(p) {
        return e('div', { key: p, className: 'chart-legend-item' },
          e('div', { className: 'chart-legend-swatch', style: { background: PASS_COLORS[p] } }),
          PASS_LABELS[p] || p
        );
      });
      if (maxClear > 0) {
        legend.push(e('div', { key: 'clear', className: 'chart-legend-item' },
          e('div', { className: 'chart-legend-swatch', style: { background: '#f87171' } }),
          'Cleared (--force)'
        ));
      }

      var tooltipEl = tooltip ? e('div', {
        className: 'chart-tooltip',
        style: { left: (tooltip.x + 12) + 'px', top: (tooltip.y - 10) + 'px' }
      },
        e('div', { style: { fontWeight: 600, marginBottom: 2 } }, tooltip.time),
        tooltip.lines.map(function(line, i) {
          var color = line.action === 'cleared' ? '#f87171' : (PASS_COLORS[line.pass] || '#666');
          return e('div', { key: i, className: 'chart-tooltip-row' },
            e('span', { className: 'chart-tooltip-swatch', style: { background: color } }),
            (PASS_LABELS[line.pass] || line.pass) + ': ' + line.count.toLocaleString() + ' ' + line.action
          );
        })
      ) : null;

      return e('div', null,
        e('h2', null, 'Indexing activity (last 3 days)'),
        e('div', { className: 'chart-wrap' },
          e('div', { className: 'chart-area', style: { marginBottom: clearHeight + 'px' } }, columns),
          e('div', { className: 'chart-x-labels' },
            xLabels.map(function(xl) {
              return e('span', { key: xl.idx }, xl.label);
            })
          ),
          e('div', { className: 'chart-legend' }, legend)
        ),
        tooltipEl
      );
    }

    function ErrorsLog(props) {
      var errors = props.errors;
      if (!errors || errors.length === 0) return null;

      return e('div', null,
        e('h2', null, 'Recent errors (' + errors.length + ')'),
        e('div', { className: 'errors-wrap' },
          errors.map(function(err, i) {
            var t = err.created_at ? err.created_at.replace('T', ' ').substring(5, 16) : '';
            return e('div', { key: i, className: 'error-row' },
              e('span', { className: 'error-time' }, t),
              e('span', { className: 'error-pass' }, err.pass_type),
              e('span', { className: 'error-msg' },
                err.filepath ? err.filepath + ': ' : '',
                err.message
              )
            );
          })
        )
      );
    }

    function VerifyFailures(props) {
      var failures = props.failures;
      var onReload = props.onReload;
      var onOpen = props.onOpen;
      var _t = useState(null); var toast = _t[0]; var setToast = _t[1];
      var _b = useState(false); var busy = _b[0]; var setBusy = _b[1];

      if (!failures) return null;
      if (failures.length === 0) {
        return e('div', null,
          e('h2', null, 'Verify failures'),
          e('div', { className: 'fail-wrap' },
            e('div', { className: 'stat-sub' }, 'No photos have verification_status = fail.')
          )
        );
      }

      function collect() {
        var name = window.prompt(
          'Name for new collection of ' + failures.length + ' failed photos:',
          'Verify failures ' + new Date().toISOString().slice(0, 10)
        );
        if (!name) return;
        setBusy(true);
        setToast(null);
        fetch('/api/verify/failures/collect', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: name.trim() }),
        })
          .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
          .then(function(res) {
            setBusy(false);
            if (!res.ok) {
              setToast({ msg: res.data.error || 'Failed to create collection', err: true });
              return;
            }
            var c = res.data.collection;
            setToast({
              msg: 'Added ' + res.data.added + ' photos to collection "' + c.name + '"',
              err: false,
              link: '/collections/' + c.id,
            });
          })
          .catch(function(err) {
            setBusy(false);
            setToast({ msg: 'Error: ' + err.message, err: true });
          });
      }

      function flagSummary(flags) {
        if (!flags || !flags.length) return '';
        var items = flags.slice(0, 3).map(function(f) {
          return f.noun || f.tag || '';
        }).filter(Boolean);
        var extra = flags.length > 3 ? ' +' + (flags.length - 3) : '';
        return items.join(', ') + extra;
      }

      var cards = failures.map(function(p) {
        return e('div', {
          key: p.id,
          className: 'fail-card',
          onClick: function() { onOpen && onOpen(p); },
          title: p.filepath,
        },
          e('img', { className: 'fail-thumb', src: p.thumbnail, loading: 'lazy' }),
          e('div', { className: 'fail-meta' },
            e('div', { className: 'fail-filename' }, p.filename || ('id=' + p.id)),
            e('div', { className: 'fail-flag' }, flagSummary(p.hallucination_flags) || '(no flags recorded)')
          )
        );
      });

      return e('div', null,
        e('h2', null, 'Verify failures (' + failures.length + ')'),
        e('div', { className: 'fail-wrap' },
          e('div', { className: 'fail-header' },
            e('div', { className: 'stat-sub' },
              'Hallucinations confirmed but not regenerated. Collect into a collection to re-describe them.'),
            e('div', { style: { display: 'flex', gap: '8px' } },
              e('button', { className: 'btn', onClick: onReload }, 'Reload'),
              e('button', {
                className: 'btn btn-primary',
                onClick: collect,
                disabled: busy,
              }, busy ? 'Collecting…' : 'Collect into collection')
            )
          ),
          e('div', { className: 'fail-grid' }, cards),
          toast && e('div', { className: 'toast' + (toast.err ? ' err' : '') },
            toast.msg,
            toast.link && e('a', {
              href: toast.link,
              style: { color: 'var(--accent)', marginLeft: '8px', textDecoration: 'underline' }
            }, 'Open →')
          )
        )
      );
    }

    function StatusPage() {
