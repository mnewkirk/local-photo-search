<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status — Photo Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #333;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #4a9eff;
      --accent-hover: #6bb3ff;
      --green: #4ade80;
      --yellow: #facc15;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 42px;
    }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .nav-link {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      margin-left: 4px;
    }
    .nav-link:hover { text-decoration: underline; }
    .nav-link.active { color: var(--text); font-weight: 600; }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-sub {
      font-size: 12px;
      color: var(--text-muted);
    }

    .progress-bar-wrap {
      margin-top: 10px;
      background: var(--surface2);
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--accent);
      transition: width 0.4s ease;
    }
    .progress-bar-fill.complete { background: var(--green); }

    .refresh-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn:disabled:hover { border-color: var(--border); color: var(--text); }

    /* Deployment panel */
    .deploy-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 32px;
    }
    .deploy-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .deploy-state {
      font-size: 13px;
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 600;
    }
    .deploy-state.ok      { background: rgba(74,222,128,0.15); color: #4ade80; }
    .deploy-state.behind  { background: rgba(250,204,21,0.15); color: #facc15; }
    .deploy-state.dirty   { background: rgba(248,113,113,0.15); color: #f87171; }
    .deploy-state.unknown { background: rgba(136,136,136,0.15); color: #aaa; }
    .deploy-meta {
      font-size: 12px;
      color: var(--text-muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .deploy-meta .sha { color: var(--text); }
    .deploy-meta .subj { color: var(--text); }
    .deploy-actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .deploy-log {
      margin-top: 12px;
      background: #0b0b0b;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11.5px;
      color: var(--text-muted);
      max-height: 280px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .deploy-log.running { border-color: var(--accent); }
    /* After a successful build, the Restart button glows so it's clear the
       next action is to apply the new image. */
    .deploy-restart-ready {
      background: rgba(74,222,128,0.15);
      border-color: var(--green);
      color: var(--green);
      animation: pulse-ready 1.8s ease-in-out infinite;
    }
    .deploy-restart-ready:hover { border-color: var(--green); color: var(--green); }
    @keyframes pulse-ready {
      0%, 100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
      50%      { box-shadow: 0 0 0 3px rgba(74,222,128,0.2); }
    }

    /* Generations by model */
    .gens-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 32px;
    }
    .gens-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    .gens-col h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .gens-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .gens-row:last-child { border-bottom: 0; }
    .gens-model { color: var(--text); font-weight: 500; }
    .gens-model.null  { color: var(--text-muted); font-style: italic; }
    .gens-version { color: var(--text-muted); font-size: 11px; font-family: ui-monospace, monospace; margin-left: 6px; }
    .gens-count { color: var(--text-muted); font-variant-numeric: tabular-nums; }

    .error { color: #f87171; font-size: 14px; margin-top: 16px; }
    .loading { color: var(--text-muted); font-size: 14px; }

    h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
      margin-top: 8px;
    }

    .cmd-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .cmd-table tr {
      border-bottom: 1px solid var(--border);
    }
    .cmd-table tr:last-child { border-bottom: none; }
    .cmd-table td {
      padding: 10px 12px;
      vertical-align: top;
    }
    .cmd-table td:first-child {
      white-space: nowrap;
      color: var(--text-muted);
      width: 160px;
    }
    .cmd-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .cmd-wrap > div + div {
      border-top: 1px solid var(--border);
    }
    .cmd-note {
      font-size: 11px;
      color: var(--text-muted);
      padding: 6px 14px 4px;
    }
    code {
      font-family: "SF Mono", "Fira Code", "Cascadia Code", Menlo, monospace;
      font-size: 12px;
      color: var(--accent);
      background: none;
      display: block;
      padding: 6px 14px 10px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* Activity chart */
    .chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 32px;
    }
    .chart-area {
      display: flex;
      align-items: flex-end;
      gap: 1px;
      height: 160px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .chart-bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-end;
      height: 100%;
      position: relative;
      min-width: 0;
    }
    .chart-bar-col:hover { opacity: 0.85; }
    .chart-seg {
      min-height: 0;
      transition: height 0.3s ease;
    }
    .chart-clear-row {
      position: absolute;
      bottom: -14px;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .chart-clear-seg {
      width: 100%;
      background: #f87171;
      min-height: 0;
    }
    .chart-x-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 2px;
    }
    .chart-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 12px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .chart-legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .chart-legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }
    .chart-tooltip {
      position: fixed;
      background: #222;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 11px;
      color: var(--text);
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
    }
    .chart-tooltip-row {
      display: flex;
      align-items: center;
      gap: 6px;
      line-height: 1.6;
    }
    .chart-tooltip-swatch {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      display: inline-block;
    }
    .chart-empty {
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* Stacking form */
    .stack-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 32px;
    }
    .stack-form-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(140px, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }
    .stack-field label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .stack-field input[type="number"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      font-family: inherit;
    }
    .stack-field .field-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
    }
    .stack-toggles {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .stack-toggles label {
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .stack-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .stack-result {
      font-size: 13px;
      margin-left: 6px;
    }
    .stack-result.ok { color: var(--green); }
    .stack-result.err { color: #f87171; }
    .stack-progress {
      margin-top: 12px;
      padding: 10px 12px;
      background: var(--surface2);
      border-radius: 6px;
      font-size: 12px;
      font-family: "SF Mono", "Fira Code", Menlo, monospace;
    }
    .stack-progress-phase {
      color: var(--accent);
      margin-bottom: 6px;
    }
    .stack-progress-bar {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .stack-progress-bar-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.2s ease;
    }
    .stack-progress-meta {
      color: var(--text-muted);
      margin-top: 4px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    /* Workers */
    .workers-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 32px;
    }
    .workers-head {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .workers-title {
      font-size: 14px;
      font-weight: 600;
    }
    .workers-idle {
      color: var(--text-muted);
      font-size: 13px;
    }
    .queue-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }
    .queue-pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }
    .queue-pill .q-pass { color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .queue-pill .q-count { font-weight: 600; }
    .queue-pill.empty .q-count { color: var(--text-muted); font-weight: 400; }
    .active-row {
      font-size: 12px;
      font-family: "SF Mono", "Fira Code", Menlo, monospace;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: baseline;
    }
    .active-row:last-child { border-bottom: none; }
    .active-pass {
      color: var(--accent);
      white-space: nowrap;
      min-width: 70px;
    }
    .active-worker { color: var(--text-muted); min-width: 180px; }
    .active-count { color: var(--text); white-space: nowrap; }
    .active-ttl { color: var(--text-muted); white-space: nowrap; margin-left: auto; }
    .active-ttl.expiring { color: var(--yellow); }
    .active-ttl.expired { color: #f87171; }

    /* Errors log */
    .errors-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 32px;
      max-height: 300px;
      overflow-y: auto;
    }
    .error-row {
      font-size: 12px;
      font-family: "SF Mono", "Fira Code", Menlo, monospace;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }
    .error-row:last-child { border-bottom: none; }
    .error-time { color: var(--text-muted); white-space: nowrap; }
    .error-pass {
      color: var(--yellow);
      white-space: nowrap;
      min-width: 60px;
    }
    .error-msg { color: #f87171; word-break: break-all; }

    /* Verify failures */
    .fail-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 32px;
    }
    .fail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .fail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      max-height: 520px;
      overflow-y: auto;
    }
    .fail-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }
    .fail-card:hover { border-color: var(--accent); }
    .fail-thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: #111;
      display: block;
    }
    .fail-meta {
      padding: 6px 8px;
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.35;
    }
    .fail-filename {
      color: var(--text);
      font-family: "SF Mono", "Fira Code", Menlo, monospace;
      font-size: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .fail-flag {
      color: #f87171;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .btn-primary {
      background: var(--accent);
      color: #0a1520;
      border-color: var(--accent);
      font-weight: 600;
    }
    .btn-primary:hover { background: var(--accent-hover); color: #0a1520; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .toast {
      margin-top: 10px;
      font-size: 12px;
      color: var(--green);
    }
    .toast.err { color: #f87171; }

    .status-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 1px 5px;
      border-radius: 3px;
      margin-right: 4px;
      letter-spacing: 0.04em;
    }
    .status-badge.fail { background: #7f1d1d; color: #fecaca; }
    .status-badge.regenerated { background: #1e3a5f; color: #bfdbfe; }

    .fail-filter {
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 12px;
      color: var(--text-muted);
    }
    .fail-filter label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }
    .fail-filter input[type="checkbox"] { cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="/shared.js"></script>
  <script>
    var e = React.createElement;
    var useState = React.useState;
    var useEffect = React.useEffect;
    var useRef = React.useRef;

    function pct(n, total) {
      if (!total) return 0;
      return Math.round((n / total) * 100);
    }

    var PASS_COLORS = {
      clip: '#4a9eff',
      faces: '#4ade80',
      quality: '#facc15',
      describe: '#c084fc',
      verify: '#fb923c',
      stacks: '#22d3ee',
      concepts: '#f472b6',
      tags: '#2dd4bf',
    };
    var PASS_LABELS = {
      clip: 'CLIP',
      faces: 'Faces',
      quality: 'Quality',
      describe: 'Descriptions',
      verify: 'Verify',
      stacks: 'Stacks',
      concepts: 'Concepts',
      tags: 'Tags',
      'category-content': 'Categories',
      'category-visual': 'Visual tags',
      aesthetics: 'Aesthetics',
      keywords: 'Keywords',
    };

    function StatCard(props) {
      var label = props.label;
      var value = props.value;
      var sub = props.sub;
      var total = props.total;
      var n = props.n;

      var fraction = (total != null && n != null) ? n / total : null;
      var complete = fraction === 1;

      return e('div', { className: 'stat-card' },
        e('div', { className: 'stat-label' }, label),
        e('div', { className: 'stat-value' }, value),
        sub && e('div', { className: 'stat-sub' }, sub),
        fraction !== null && e('div', { className: 'progress-bar-wrap' },
          e('div', {
            className: 'progress-bar-fill' + (complete ? ' complete' : ''),
            style: { width: Math.round(fraction * 100) + '%' }
          })
        )
      );
    }

    function ActivityChart(props) {
      var activity = props.activity;
      var _tip = useState(null); var tooltip = _tip[0]; var setTooltip = _tip[1];

      if (!activity || activity.length === 0) {
        return e('div', null,
          e('h2', null, 'Indexing activity (last 3 days)'),
          e('div', { className: 'chart-wrap' },
            e('div', { className: 'chart-empty' }, 'No indexing activity recorded yet.')
          )
        );
      }

      // Build 72 hourly buckets
      var now = new Date();
      var buckets = [];
      for (var i = 71; i >= 0; i--) {
        var d = new Date(now.getTime() - i * 3600000);
        d.setMinutes(0, 0, 0);
        buckets.push({ hour: d, index: {}, clear: {} });
      }

      // Map activity data into buckets
      var bucketMap = {};
      buckets.forEach(function(b, idx) {
        // Key by ISO hour string in UTC to match server response
        var key = b.hour.getUTCFullYear() + '-' +
          String(b.hour.getUTCMonth() + 1).padStart(2, '0') + '-' +
          String(b.hour.getUTCDate()).padStart(2, '0') + 'T' +
          String(b.hour.getUTCHours()).padStart(2, '0') + ':00:00';
        bucketMap[key] = idx;
      });

      activity.forEach(function(row) {
        var idx = bucketMap[row.hour];
        if (idx === undefined) return;
        var target = row.action === 'clear' ? buckets[idx].clear : buckets[idx].index;
        target[row.pass_type] = (target[row.pass_type] || 0) + row.total;
      });

      // Find max height for scaling
      var maxIndex = 0;
      var maxClear = 0;
      buckets.forEach(function(b) {
        var indexTotal = 0;
        Object.keys(b.index).forEach(function(k) { indexTotal += b.index[k]; });
        if (indexTotal > maxIndex) maxIndex = indexTotal;
        var clearTotal = 0;
