<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shoot Review — Photo Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #333;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #4a9eff;
      --accent-hover: #6bb3ff;
      --green: #4ade80;
      --yellow: #facc15;
      --red: #f87171;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1600px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 42px;
    }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .nav-link {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      margin-left: 4px;
    }
    .nav-link:hover { text-decoration: underline; }
    .nav-link.active { color: var(--text); font-weight: 600; }

    /* Controls bar */
    .controls {
      max-width: 1600px;
      margin: 0 auto;
      padding: 12px 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .control-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .control-label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }
    select, .ctrl-input {
      padding: 6px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    select:focus, .ctrl-input:focus { border-color: var(--accent); }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-green { background: var(--green); color: #000; }
    .btn-green:hover:not(:disabled) { background: #22c55e; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover:not(:disabled) { background: var(--surface2); }

    .stats-bar {
      margin-left: auto;
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .stat-highlight { color: var(--green); font-weight: 600; }

    /* View toggle */
    .view-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .view-toggle button {
      padding: 6px 12px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .view-toggle button.active {
      background: var(--accent);
      color: #fff;
    }

    /* Photo grid */
    .content {
      max-width: 1600px;
      margin: 0 auto;
      padding: 8px 24px 40px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 6px;
    }
    .grid.large { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }

    .grid-item {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      cursor: pointer;
      background: var(--surface);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.3s, filter 0.3s;
    }
    .grid-item:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .grid-item img {
      width: 100%;
      height: auto;
      display: block;
    }
    /* Unselected photos: dimmed and blurred when filter is "selected only" or "obscure" mode */
    .grid-item.dimmed {
      opacity: 0.25;
      filter: grayscale(0.8);
    }
    .grid-item.dimmed:hover {
      opacity: 0.6;
      filter: grayscale(0.3);
    }
    .grid-item.hidden-item { display: none; }
    .stack-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      z-index: 2;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.15s;
    }
    .stack-badge:hover { background: rgba(74,158,255,0.7); }
    .grid-item.stack-member {
      outline: 3px solid #fff;
      outline-offset: -3px;
    }

    /* Cluster view */
    .cluster-section {
      margin-bottom: 16px;
    }
    .cluster-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 4px 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
    }
    .cluster-header .cluster-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      min-width: 40px;
    }
    .cluster-header .cluster-meta {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      gap: 12px;
    }
    .cluster-header .cluster-meta .has-selection {
      color: var(--green);
    }

    /* Selection badge */
    .select-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.6);
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      z-index: 5;
      transition: all 0.15s;
      cursor: pointer;
    }
    .select-badge.checked {
      background: var(--green);
      border-color: var(--green);
      color: #000;
    }

    /* Cluster indicator */
    .cluster-badge {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(0,0,0,0.6);
      font-size: 11px;
      color: var(--text-muted);
      z-index: 5;
    }

    /* Quality score */
    .quality-badge {
      position: absolute;
      bottom: 8px;
      right: 8px;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      z-index: 5;
    }

    /* Overlay with filename */
    .grid-item .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 6px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      font-size: 11px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .grid-item:hover .overlay { opacity: 1; }

    /* Raw file indicator */
    .raw-badge {
      position: absolute;
      bottom: 8px;
      left: 8px;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(74, 158, 255, 0.8);
      font-size: 10px;
      font-weight: 600;
      color: #fff;
      z-index: 5;
    }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal {
      background: var(--surface);
      border-radius: 12px;
      max-width: 1200px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: row;
    }
    .modal-image {
      flex: 1;
      min-width: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px 0 0 12px;
      max-height: 90vh;
    }
    .modal-image img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
    }
    .modal-sidebar {
      width: 320px;
      flex-shrink: 0;
      padding: 24px;
      border-left: 1px solid var(--border);
      overflow-y: auto;
      max-height: 90vh;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.6);
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 210;
    }
    .modal-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      border: none;
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 210;
    }
    .modal-nav.prev { left: 16px; }
    .modal-nav.next { right: 356px; }

    .detail-section { margin-bottom: 16px; }
    .detail-section h3 {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 3px 0;
      border-bottom: 1px solid var(--border);
    }
    .detail-row .label { color: var(--text-muted); }
    .detail-section p { font-size: 14px; line-height: 1.6; }
    .face-tag {
      display: inline-block;
      padding: 4px 10px;
      background: var(--surface2);
      border-radius: 12px;
      font-size: 13px;
      margin: 2px 4px 2px 0;
      cursor: pointer;
      transition: background 0.15s, outline 0.15s;
    }
    .face-tag:hover, .face-tag.active { background: var(--accent); color: #fff; }
    .face-tag .match-badge { font-size: 10px; margin-left: 4px; opacity: 0.7; }
    .face-edit-panel {
      display: flex; flex-direction: column; gap: 6px;
      margin: 4px 0; padding: 8px 10px;
      background: var(--surface2); border-radius: 8px; font-size: 13px;
    }
    .face-edit-panel select, .face-edit-panel input {
      font-size: 13px; padding: 4px 8px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); outline: none; width: 100%;
    }
    .face-edit-panel select:focus, .face-edit-panel input:focus { border-color: var(--accent); }
    .face-edit-buttons { display: flex; gap: 6px; margin-top: 2px; }
    .face-edit-buttons button {
      flex: 1; padding: 4px 0; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); cursor: pointer; font-size: 12px;
    }
    .face-edit-buttons button:hover { border-color: var(--accent); }
    .face-edit-buttons button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .face-edit-buttons button.danger { border-color: #f87171; color: #f87171; }
    .face-edit-buttons button.danger:hover { background: #f87171; color: #fff; }
    .face-bbox-overlay {
      position: absolute; border: 2px solid var(--accent); border-radius: 4px;
      pointer-events: none; box-shadow: 0 0 0 1px rgba(0,0,0,0.4); transition: opacity 0.15s;
    }
    .face-bbox-label {
      position: absolute; bottom: 100%; left: -2px;
      background: var(--accent); color: #fff; font-size: 11px;
      padding: 1px 6px; border-radius: 4px 4px 0 0; white-space: nowrap;
    }
    .color-dots { display: flex; gap: 3px; margin-top: 4px; }
    .color-dot {
      width: 12px; height: 12px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* Export modal */
    .export-modal {
      background: var(--surface);
      border-radius: 12px;
      padding: 24px;
      max-width: 500px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
    }
    .export-modal h2 {
      font-size: 18px;
      margin-bottom: 16px;
    }
    .export-list {
      max-height: 400px;
      overflow-y: auto;
      margin: 12px 0;
      font-family: monospace;
      font-size: 12px;
      background: var(--surface2);
      padding: 12px;
      border-radius: var(--radius);
      line-height: 1.8;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    .empty-state h2 {
      font-size: 24px;
      color: var(--text);
      margin-bottom: 12px;
      font-weight: 500;
    }

    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-muted);
      font-size: 15px;
    }

    /* ---- Responsive ---- */

    /* Tablet (≤ 768 px) */
    @media (max-width: 768px) {
      .controls { flex-direction: column; align-items: flex-start; gap: 8px; }
      .controls > * { flex-wrap: wrap; }
      .stats-bar { margin-left: 0; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 5px; }
      .grid.large { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
      /* Modal stacks vertically */
      .modal { flex-direction: column; }
      .modal-image { border-radius: 12px 12px 0 0; max-height: 50vh; }
      .modal-sidebar {
        width: 100%;
        border-left: none;
        border-top: 1px solid var(--border);
        max-height: 44vh;
        overflow-y: auto;
      }
    }

    /* Phone (≤ 480 px) */
    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 3px; }
      .grid.large { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
      /* Full-screen modal */
      .modal-overlay { padding: 0; }
      .modal { border-radius: 0; max-height: 100vh; height: 100vh; }
      .modal-image { border-radius: 0; max-height: 56vh; }
      .modal-sidebar { max-height: 44vh; }
      .modal-nav.prev { left: 8px; }
      .modal-nav.next { right: 8px; }
      .modal-close { top: 8px; right: 8px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="/shared.js"></script>

  <script>
    const { useState, useEffect, useCallback, useRef, useMemo } = React;
    const e = React.createElement;
    const API = '';

    function getReviewUrlParams() {
      const p = new URLSearchParams(window.location.search);
      return {
        folder: p.get('folder') || '',
        target_pct: p.get('target_pct') || '10',
        view: p.get('view') || 'all',
        grid: p.get('grid') || 'normal',
      };
    }

    // -----------------------------------------------------------------------
    // App
    // -----------------------------------------------------------------------
    function App() {
      const initParams = getReviewUrlParams();
      const [folders, setFolders] = useState([]);
      const [selectedFolder, setSelectedFolder] = useState(initParams.folder);
      const [photos, setPhotos] = useState([]);
      const [stats, setStats] = useState(null);
      const [loading, setLoading] = useState(false);
      const [viewMode, setViewMode] = useState(initParams.view);       // all | selected | obscure | clusters
      const [gridSize, setGridSize] = useState(initParams.grid);     // normal | large
      const [modalPhoto, setModalPhoto] = useState(null);
      const [modalDetail, setModalDetail] = useState(null);
      const [showExport, setShowExport] = useState(false);
      const [exportFiles, setExportFiles] = useState([]);
      const [exportRaw, setExportRaw] = useState(false);
      const [showSaveCollection, setShowSaveCollection] = useState(false);
      const [saveCollName, setSaveCollName] = useState('');
      const [saveCollError, setSaveCollError] = useState(null);
      const [saveCollSuccess, setSaveCollSuccess] = useState(null);
      const [targetPct, setTargetPct] = useState(initParams.target_pct);
      const [threshold, setThreshold] = useState('0');

      // ---- Stack expansion state ----
      const [expandedStacks, setExpandedStacks] = useState(new Set());
      const [stackMembers, setStackMembers] = useState({});

      // Merge stack members into photos state so togglePhoto can find them.
      // review/load only returns photos saved via the cull algorithm; if a stack
      // was built after the last Run Review the non-top members may be absent.
      // Merging on expand ensures they're always present with correct stack fields.
      const mergeStackMembersIntoPhotos = useCallback((stackId, members) => {
        setPhotos(prev => {
          const existingIds = new Set(prev.map(p => p.id));
          const newMembers = members
            .filter(m => !existingIds.has(m.id))
            .map(m => ({
              id: m.id,
              filename: m.filename || '',
              filepath: m.filepath || '',
              aesthetic_score: m.aesthetic_score || null,
              date_taken: m.date_taken || null,
              selected: false,
              has_raw: !!m.raw_filepath,
              stack_id: stackId,
              stack_is_top: !!m.is_top,
              stack_count: members.length,
              cluster_id: null,
              rank_in_cluster: null,
            }));
          return newMembers.length > 0 ? [...prev, ...newMembers] : prev;
        });
      }, []);

      const toggleStack = useCallback((stackId) => {
        setExpandedStacks(prev => {
          const next = new Set(prev);
          if (next.has(stackId)) {
            next.delete(stackId);
          } else {
            next.add(stackId);
            if (!stackMembers[stackId]) {
              fetch(API + '/api/stacks/' + stackId)
                .then(r => r.json())
                .then(data => {
                  if (data && data.members) {
                    setStackMembers(prev => ({ ...prev, [stackId]: data.members }));
                    mergeStackMembersIntoPhotos(stackId, data.members);
                  }
                });
            } else {
              // Already fetched — ensure members are in photos state
              mergeStackMembersIntoPhotos(stackId, stackMembers[stackId]);
            }
          }
          return next;
        });
      }, [stackMembers, mergeStackMembersIntoPhotos]);

      const expandAllStacks = useCallback(() => {
        const stackIds = new Set();
        photos.forEach(r => { if (r.stack_id && r.stack_count > 1) stackIds.add(r.stack_id); });
        stackIds.forEach(sid => {
          if (!stackMembers[sid]) {
            fetch(API + '/api/stacks/' + sid)
              .then(r => r.json())
              .then(data => {
                if (data && data.members) {
                  setStackMembers(prev => ({ ...prev, [sid]: data.members }));
                  mergeStackMembersIntoPhotos(sid, data.members);
                }
              });
          } else {
            mergeStackMembersIntoPhotos(sid, stackMembers[sid]);
          }
        });
        setExpandedStacks(stackIds);
      }, [photos, stackMembers, mergeStackMembersIntoPhotos]);

      const collapseAllStacks = useCallback(() => {
        setExpandedStacks(new Set());
      }, []);

      // Load folders on mount
      useEffect(() => {
        fetch(API + '/api/review/folders')
          .then(r => r.json())
          .then(d => setFolders(d.folders || []))
          .catch(() => {});
      }, []);

      // Update browser URL with current review state
      const updateReviewUrl = useCallback((folder, pct, view, grid) => {
        const p = new URLSearchParams();
        if (folder) p.set('folder', folder);
        if (pct && pct !== '10') p.set('target_pct', pct);
        if (view && view !== 'all') p.set('view', view);
        if (grid && grid !== 'normal') p.set('grid', grid);
        const newUrl = window.location.pathname + (p.toString() ? '?' + p.toString() : '');
        window.history.replaceState(null, '', newUrl);
      }, []);

      const runReview = useCallback(() => {
        if (!selectedFolder) return;
        setLoading(true);
        setPhotos([]);
        setStats(null);

        // Update URL
        updateReviewUrl(selectedFolder, targetPct, viewMode, gridSize);

        const params = new URLSearchParams({
          directory: selectedFolder,
          target_pct: targetPct === '' ? 0.10 : parseFloat(targetPct) / 100,
          distance_threshold: threshold === '' ? 0.0 : parseFloat(threshold),
        });
        fetch(API + '/api/review/run?' + params)
          .then(r => r.json())
          .then(data => {
            setPhotos(data.photos || []);
            setStats(data.stats || null);
            setLoading(false);
          })
          .catch(() => { setLoading(false); });
      }, [selectedFolder, targetPct, threshold, viewMode, gridSize, updateReviewUrl]);

      const loadExisting = useCallback(() => {
        if (!selectedFolder) return;
        setLoading(true);
        fetch(API + '/api/review/load?directory=' + encodeURIComponent(selectedFolder))
          .then(r => r.json())
          .then(data => {
            if (data.photos && data.photos.length > 0) {
              setPhotos(data.photos);
              setStats(data.stats || null);
            }
            setLoading(false);
          })
          .catch(() => { setLoading(false); });
      }, [selectedFolder]);

      // Auto-load existing selections when folder changes
      useEffect(() => {
        if (selectedFolder) loadExisting();
      }, [selectedFolder]);

      const togglePhoto = useCallback((photoId) => {
        setPhotos(prev => {
          const updated = prev.map(p => {
            if (p.id === photoId) return { ...p, selected: !p.selected };
            return p;
          });
          // Update server
          const photo = updated.find(p => p.id === photoId);
          if (photo) {
            fetch(API + '/api/review/toggle/' + photoId + '?selected=' + photo.selected, { method: 'POST' });
          }
          return updated;
        });
        // Update stats
        setStats(prev => {
          if (!prev) return prev;
          const photo = photos.find(p => p.id === photoId);
          const delta = photo && photo.selected ? -1 : 1;
          const newSelected = prev.selected + delta;
          return {
            ...prev,
            selected: newSelected,
            pct: prev.total > 0 ? Math.round(newSelected / prev.total * 1000) / 10 : 0,
          };
        });
      }, [photos]);

      const visiblePhotos = useMemo(() => {
        if (viewMode === 'selected') return photos.filter(p => p.selected);
        return photos;
      }, [photos, viewMode]);

      // Build display list: filter non-top stack members, insert expanded members
      const displayItems = useMemo(() => {
        // Build a lookup from photos state so expanded stack members can inherit selection
        const photoById = {};
        photos.forEach(p => { photoById[p.id] = p; });
        const added = new Set();
        const items = [];
        visiblePhotos.forEach(photo => {
          const isNonTopMember = photo.stack_id && photo.stack_count > 1 && !photo.stack_is_top;
          const stackIsExpanded = photo.stack_id && expandedStacks.has(photo.stack_id);
          if (isNonTopMember) {
            if (stackIsExpanded) return; // will appear in expanded group below top photo
            if (!photo.selected) return; // collapsed + unselected → hide
            // collapsed but selected → show individually
          }
          if (added.has(photo.id)) return;
          added.add(photo.id);
          items.push({ photo, isStackMember: false });
          // When this is the top photo and the stack is expanded, insert all members
          if (photo.stack_is_top && stackIsExpanded && stackMembers[photo.stack_id]) {
            stackMembers[photo.stack_id].forEach(m => {
              if (m.id !== photo.id && !added.has(m.id)) {
                added.add(m.id);
                // Merge selection state from photos array if available
                const statePhoto = photoById[m.id];
                const merged = statePhoto ? { ...m, selected: statePhoto.selected } : m;
                items.push({ photo: merged, isStackMember: true, stackId: photo.stack_id });
              }
            });
          }
        });
        return items;
      }, [visiblePhotos, photos, expandedStacks, stackMembers]);

      const hasStacks = photos.some(p => p.stack_id && p.stack_count > 1);

      // Group photos by cluster for cluster view
      const clusterGroups = useMemo(() => {
        if (viewMode !== 'clusters') return null;
        const groups = {};
        for (const p of photos) {
          const cid = p.cluster_id != null ? p.cluster_id : -1;
          if (!groups[cid]) groups[cid] = [];
          groups[cid].push(p);
        }
        // Sort clusters: by cluster ID ascending
        const sorted = Object.entries(groups)
          .map(([cid, members]) => ({
            cid: parseInt(cid),
            members: members.sort((a, b) => (b.aesthetic_score || 0) - (a.aesthetic_score || 0)),
            selectedCount: members.filter(m => m.selected).length,
          }))
          .sort((a, b) => a.cid - b.cid);
        return sorted;
      }, [photos, viewMode]);

      const openExport = useCallback(() => {
        if (!selectedFolder) return;
        const params = new URLSearchParams({
          directory: selectedFolder,
          include_raw: exportRaw,
        });
        fetch(API + '/api/review/export?' + params)
          .then(r => r.json())
          .then(data => {
            setExportFiles(data.files || []);
            setShowExport(true);
          })
          .catch(() => {});
      }, [selectedFolder, exportRaw]);

      const copyExportList = useCallback(() => {
        const text = exportFiles.map(f => f.path).join('\n');
        navigator.clipboard.writeText(text).catch(() => {});
      }, [exportFiles]);

      const openSaveCollection = useCallback(() => {
        // Default name from folder
        const defaultName = selectedFolder || '';
        setSaveCollName(defaultName);
        setSaveCollError(null);
        setSaveCollSuccess(null);
        setShowSaveCollection(true);
      }, [selectedFolder]);

      const doSaveCollection = useCallback(async () => {
        const name = saveCollName.trim();
        if (!name) return;
        setSaveCollError(null);
        setSaveCollSuccess(null);

        // Get selected photo IDs
        const selectedIds = photos.filter(p => p.selected).map(p => p.id);
        if (!selectedIds.length) {
          setSaveCollError('No photos selected');
          return;
        }

        try {
          const res = await fetch('/api/collections', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, photo_ids: selectedIds }),
          });
          const data = await res.json();
          if (!res.ok) {
            setSaveCollError(data.error || 'Failed to create collection');
            return;
          }
          setSaveCollSuccess(`Saved ${selectedIds.length} photos to "${name}"`);
          setTimeout(() => { setShowSaveCollection(false); }, 1500);
        } catch {
          setSaveCollError('Network error');
        }
      }, [saveCollName, photos]);

      // Modal navigation
      const [modalIndex, setModalIndex] = useState(-1);

      const openModal = useCallback((photo) => {
        const idx = visiblePhotos.findIndex(p => p.id === photo.id);
        setModalPhoto(photo);
        setModalIndex(idx >= 0 ? idx : 0);
        setModalDetail(null);
        fetch(API + '/api/photos/' + photo.id)
          .then(r => r.json())
          .then(setModalDetail)
          .catch(() => {});
      }, [visiblePhotos]);

      const openModalAt = useCallback((index) => {
        if (!visiblePhotos.length) return;
        const i = ((index % visiblePhotos.length) + visiblePhotos.length) % visiblePhotos.length;
        const photo = visiblePhotos[i];
        setModalPhoto(photo);
        setModalIndex(i);
        setModalDetail(null);
        fetch(API + '/api/photos/' + photo.id)
          .then(r => r.json())
          .then(setModalDetail)
          .catch(() => {});
      }, [visiblePhotos]);

      const closeModal = useCallback(() => {
        setModalPhoto(null);
        setModalIndex(-1);
        setModalDetail(null);
      }, []);

      const goPrev = useCallback(() => openModalAt(modalIndex - 1), [modalIndex, openModalAt]);
      const goNext = useCallback(() => openModalAt(modalIndex + 1), [modalIndex, openModalAt]);

      // Keyboard shortcuts
      useEffect(() => {
        const handler = (ev) => {
          if (showExport) {
            if (ev.key === 'Escape') setShowExport(false);
            return;
          }
          if (modalPhoto) {
            if (ev.key === 'Escape') closeModal();
            else if (ev.key === 'ArrowLeft') { ev.preventDefault(); goPrev(); }
            else if (ev.key === 'ArrowRight') { ev.preventDefault(); goNext(); }
            else if (ev.key === 's' || ev.key === 'x') {
              ev.preventDefault();
              togglePhoto(modalPhoto.id);
              // Update modal photo state
              setModalPhoto(prev => prev ? { ...prev, selected: !prev.selected } : prev);
            }
          }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [modalPhoto, showExport, closeModal, goPrev, goNext, togglePhoto]);

      return e('div', null,
        // Header
        e(PS.SharedHeader, { activePage: 'review' },
          // Folder selector
          e('div', { className: 'control-group' },
            e('select', {
              value: selectedFolder,
              onChange: (ev) => setSelectedFolder(ev.target.value),
              style: { minWidth: 250 },
            },
              e('option', { value: '' }, 'Select a folder...'),
              ...folders.map(f => e('option', { key: f, value: f }, f)),
            ),
          ),
          // Target %
          e('div', { className: 'control-group' },
            e('span', { className: 'control-label' }, 'Target:'),
            e('input', {
              className: 'ctrl-input',
              type: 'number',
              value: targetPct,
              onChange: (ev) => setTargetPct(ev.target.value),
              min: 1, max: 50, step: 1,
              style: { width: 50 },
            }),
            e('span', { className: 'control-label' }, '%'),
          ),
          // Run button
          e('button', {
            className: 'btn btn-primary',
            onClick: runReview,
            disabled: !selectedFolder || loading,
          }, loading ? 'Analyzing...' : 'Run Review'),
        ),

        // Controls bar
        photos.length > 0 && e('div', { className: 'controls' },
          // View mode toggle
          e('div', { className: 'view-toggle' },
            e('button', {
              className: viewMode === 'all' ? 'active' : '',
              onClick: () => { setViewMode('all'); updateReviewUrl(selectedFolder, targetPct, 'all', gridSize); },
            }, 'All'),
            e('button', {
              className: viewMode === 'obscure' ? 'active' : '',
              onClick: () => { setViewMode('obscure'); updateReviewUrl(selectedFolder, targetPct, 'obscure', gridSize); },
            }, 'Obscure Unselected'),
            e('button', {
              className: viewMode === 'selected' ? 'active' : '',
              onClick: () => { setViewMode('selected'); updateReviewUrl(selectedFolder, targetPct, 'selected', gridSize); },
            }, 'Selected Only'),
            e('button', {
              className: viewMode === 'clusters' ? 'active' : '',
              onClick: () => { setViewMode('clusters'); updateReviewUrl(selectedFolder, targetPct, 'clusters', gridSize); },
            }, 'Clusters'),
          ),

          // Grid size
          e('div', { className: 'view-toggle' },
            e('button', {
              className: gridSize === 'normal' ? 'active' : '',
              onClick: () => { setGridSize('normal'); updateReviewUrl(selectedFolder, targetPct, viewMode, 'normal'); },
            }, 'Grid'),
            e('button', {
              className: gridSize === 'large' ? 'active' : '',
              onClick: () => { setGridSize('large'); updateReviewUrl(selectedFolder, targetPct, viewMode, 'large'); },
            }, 'Large'),
          ),

          // Export controls
          e('div', { className: 'control-group' },
            e('label', { style: { display: 'flex', alignItems: 'center', gap: 4, cursor: 'pointer', fontSize: 13, color: 'var(--text-muted)' } },
              e('input', {
                type: 'checkbox',
                checked: exportRaw,
                onChange: (ev) => setExportRaw(ev.target.checked),
              }),
              'Include ARW',
            ),
          ),
          e('button', {
            className: 'btn btn-green',
            onClick: openExport,
            disabled: !stats || stats.selected === 0,
          }, 'Export Selected'),
          e('button', {
            className: 'btn',
            onClick: openSaveCollection,
            disabled: !stats || stats.selected === 0,
            style: { marginLeft: 4 },
          }, 'Save to Collection'),

          // Stats
          stats && e('div', { className: 'stats-bar' },
            e('span', null, stats.total + ' photos'),
            e('span', null, stats.clusters + ' clusters'),
            e('span', null,
              e('span', { className: 'stat-highlight' }, stats.selected + ' selected'),
              ' (' + stats.pct + '%)',
            ),
            e('span', { style: { fontSize: 11, color: 'var(--text-muted)' } },
              'S/X to toggle in modal',
            ),
          ),
        ),

        // Content
        e('div', { className: 'content' },
          !photos.length && !loading && e('div', { className: 'empty-state' },
            e('h2', null, 'Shoot Review'),
            e('p', null, 'Select a folder to analyze. The algorithm will cluster visually similar photos and pick the best from each group.'),
            e('p', { style: { color: 'var(--text-muted)', fontSize: 13 } },
              'Aim for ~10% of your shoot \u2014 the best, most diverse selection.'),
          ),
          loading && e('div', { className: 'loading' }, 'Analyzing photos and clustering...'),
          // Cluster view
          photos.length > 0 && !loading && viewMode === 'clusters' && clusterGroups &&
            clusterGroups.map(group =>
              e('div', { key: group.cid, className: 'cluster-section' },
                e('div', { className: 'cluster-header' },
                  e('span', { className: 'cluster-label' }, 'C' + group.cid),
                  e('div', { className: 'cluster-meta' },
                    e('span', null, group.members.length + ' photo' + (group.members.length !== 1 ? 's' : '')),
                    e('span', { className: group.selectedCount > 0 ? 'has-selection' : '' },
                      group.selectedCount + ' selected'),
                  ),
                ),
                e('div', { className: 'grid' + (gridSize === 'large' ? ' large' : '') },
                  ...group.members.map(photo => e(ReviewGridItem, {
                    key: photo.id,
                    photo: photo,
                    dimmed: !photo.selected,
                    onClick: () => openModal(photo),
                    onToggle: (ev) => { ev.stopPropagation(); togglePhoto(photo.id); },
                  })),
                ),
              )
            ),
          // Expand/Close Stacks button (normal grid views only)
          photos.length > 0 && !loading && viewMode !== 'clusters' && hasStacks &&
            e('div', { style: { display: 'flex', justifyContent: 'flex-end', marginBottom: 8 } },
              e('button', {
                className: 'btn btn-outline',
                onClick: () => { expandedStacks.size > 0 ? collapseAllStacks() : expandAllStacks(); },
              }, expandedStacks.size > 0 ? 'Close Stacks' : 'Expand Stacks'),
            ),
          // Normal grid views
          photos.length > 0 && !loading && viewMode !== 'clusters' && e('div', { className: 'grid' + (gridSize === 'large' ? ' large' : '') },
            ...displayItems.map(item => e(ReviewGridItem, {
              key: (item.isStackMember ? 'sm-' : '') + item.photo.id,
              photo: item.photo,
              isStackMember: item.isStackMember,
              dimmed: viewMode === 'obscure' && !item.photo.selected,
              onClick: () => openModal(item.photo),
              onToggle: (ev) => { ev.stopPropagation(); togglePhoto(item.photo.id); },
              expandedStacks,
              toggleStack,
            })),
          ),
        ),

        // Photo modal
        modalPhoto && e(PS.PhotoModal, {
          photo: modalPhoto,
          detail: modalDetail,
          onClose: closeModal,
          onPrev: goPrev,
          onNext: goNext,
          index: modalIndex,
          total: visiblePhotos.length,
          showFaces: true,
          showCollections: false,
          showLocation: true,
          showAesthetics: true,
          onStackNavigate: (member) => {
            setModalPhoto(member);
            setModalDetail(null);
            // Update index so arrow-key navigation works from the correct position
            const idx = visiblePhotos.findIndex(p => p.id === member.id);
            if (idx >= 0) setModalIndex(idx);
            fetch(API + '/api/photos/' + member.id)
              .then(r => r.json())
              .then(setModalDetail)
              .catch(() => {});
          },
          headerChildren: e('div', { className: 'detail-section' },
            e('button', {
              className: 'btn ' + (modalPhoto.selected ? 'btn-green' : 'btn-outline'),
              onClick: () => {
                togglePhoto(modalPhoto.id);
                setModalPhoto(prev => prev ? { ...prev, selected: !prev.selected } : prev);
              },
              style: { width: '100%', marginBottom: 8 },
            }, modalPhoto.selected ? '\u2713 Selected' : 'Select this photo'),
            e('div', { style: { fontSize: 11, color: 'var(--text-muted)', textAlign: 'center' } },
              'Press S or X to toggle'),
          ),
          footerChildren: e('div', null,
            // Cluster info
            e('div', { className: 'detail-section' },
              e('h3', null, 'Cluster'),
              e('div', { className: 'detail-row' },
                e('span', { className: 'label' }, 'Cluster #'),
                e('span', null, modalPhoto.cluster_id),
              ),
              e('div', { className: 'detail-row' },
                e('span', { className: 'label' }, 'Rank in cluster'),
                e('span', null, '#' + modalPhoto.rank_in_cluster),
              ),
            ),
            // Raw file
            modalPhoto.has_raw && e('div', { className: 'detail-section' },
              e('h3', null, 'Raw File'),
              e('p', { style: { fontSize: 13, color: 'var(--accent)' } }, 'ARW available'),
            ),
          ),
        }),

        // Export modal
        showExport && e('div', { className: 'modal-overlay', onClick: (ev) => {
          if (ev.target === ev.currentTarget) setShowExport(false);
        }},
          e('div', { className: 'export-modal' },
            e('h2', null, 'Export Selected Photos'),
            e('p', { style: { fontSize: 14, color: 'var(--text-muted)', marginBottom: 8 } },
              exportFiles.length + ' file(s) selected' +
              (exportRaw ? ' (including ARW)' : ' (JPG only)'),
            ),
            e('div', { className: 'export-list' },
              ...exportFiles.map((f, i) =>
                e('div', { key: i, style: { color: f.type === 'arw' ? 'var(--accent)' : 'var(--text)' } },
                  f.path,
                )
              ),
            ),
            e('div', { style: { display: 'flex', gap: 8, marginTop: 16 } },
              e('button', {
                className: 'btn btn-primary',
                onClick: copyExportList,
              }, 'Copy paths to clipboard'),
              e('button', {
                className: 'btn btn-outline',
                onClick: () => setShowExport(false),
              }, 'Close'),
            ),
            e('p', { style: { fontSize: 12, color: 'var(--text-muted)', marginTop: 12 } },
              'Tip: Use the copied paths with cp or rsync to move files to a new location.'),
          ),
        ),

        // Save to Collection modal
        showSaveCollection && e('div', { className: 'modal-overlay', onClick: (ev) => {
          if (ev.target === ev.currentTarget) setShowSaveCollection(false);
        }},
          e('div', { className: 'export-modal', style: { maxWidth: 420 } },
            e('h2', null, 'Save to Collection'),
            e('p', { style: { fontSize: 14, color: 'var(--text-muted)', marginBottom: 12 } },
              (stats ? stats.selected : 0) + ' selected photo(s) will be added.',
            ),
            e('input', {
              type: 'text',
              placeholder: 'Collection name',
              value: saveCollName,
              onChange: ev => setSaveCollName(ev.target.value),
              onKeyDown: ev => ev.key === 'Enter' && doSaveCollection(),
              style: {
                width: '100%', padding: '10px 14px', background: 'var(--surface2)',
                border: '1px solid var(--border)', borderRadius: 'var(--radius)',
                color: 'var(--text)', fontSize: 14, marginBottom: 8, outline: 'none',
              },
              autoFocus: true,
            }),
            saveCollError && e('p', { style: { color: '#f87171', fontSize: 13, marginBottom: 8 } }, saveCollError),
            saveCollSuccess && e('p', { style: { color: '#4ade80', fontSize: 13, marginBottom: 8 } }, saveCollSuccess),
            e('div', { style: { display: 'flex', gap: 8, marginTop: 8 } },
              e('button', {
                className: 'btn btn-primary',
                onClick: doSaveCollection,
                disabled: !saveCollName.trim() || !!saveCollSuccess,
              }, 'Save'),
              e('button', {
                className: 'btn btn-outline',
                onClick: () => setShowSaveCollection(false),
              }, 'Cancel'),
            ),
          ),
        ),
      );
    }


    // -----------------------------------------------------------------------
    // Review grid item
    // -----------------------------------------------------------------------
    function ReviewGridItem({ photo, dimmed, onClick, onToggle, isStackMember, expandedStacks, toggleStack }) {
      const [loaded, setLoaded] = useState(false);
      const [error, setError] = useState(false);

      const qualityColor = photo.aesthetic_score >= 6 ? 'var(--green)' :
                           photo.aesthetic_score >= 4.5 ? 'var(--yellow)' : 'var(--red)';

      const isExpanded = photo.stack_id && expandedStacks && expandedStacks.has(photo.stack_id);
      const showBadge = photo.stack_count > 1 && photo.stack_is_top;

      return e('div', {
        className: 'grid-item' + (dimmed ? ' dimmed' : '') + (isStackMember ? ' stack-member' : ''),
        onClick: onClick,
      },
        // Selection badge
        e('div', {
          className: 'select-badge' + (photo.selected ? ' checked' : ''),
          onClick: onToggle,
        }, photo.selected ? '\u2713' : ''),

        // Stack badge
        showBadge && e('div', {
          className: 'stack-badge',
          onClick: (ev) => {
            ev.stopPropagation();
            if (toggleStack) toggleStack(photo.stack_id);
          },
        }, isExpanded ? '\u2715' : '\u00d7' + photo.stack_count),

        // Cluster badge
        photo.cluster_id != null &&
          e('div', { className: 'cluster-badge' }, 'C' + photo.cluster_id),

        // Quality badge
        photo.aesthetic_score != null &&
          e('div', {
            className: 'quality-badge',
            style: { background: qualityColor + '22', color: qualityColor },
          }, photo.aesthetic_score.toFixed(1)),

        // Raw indicator
        photo.has_raw && e('div', { className: 'raw-badge' }, 'RAW'),

        // Image
        !error && e('img', {
          src: API + '/api/photos/' + photo.id + '/thumbnail?v=' + encodeURIComponent(photo.filename),
          alt: photo.filename,
          loading: 'lazy',
          onLoad: () => setLoaded(true),
          onError: () => setError(true),
          style: loaded ? {} : { opacity: 0 },
        }),
        error && e('div', {
          style: {
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            height: '100%', color: 'var(--text-muted)', fontSize: 12,
          },
        }, photo.filename),

        // Filename overlay on hover
        e('div', { className: 'overlay' },
          e('span', null, photo.filename),
        ),
      );
    }




    // -----------------------------------------------------------------------
    // Mount
    // -----------------------------------------------------------------------
    ReactDOM.createRoot(document.getElementById('root')).render(e(App));
  </script>
</body>
</html>
