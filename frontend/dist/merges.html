<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merge review — Photo Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #333;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #4a9eff;
      --accent-hover: #6bb3ff;
      --green: #4ade80;
      --yellow: #facc15;
      --red: #f87171;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* Shared header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 42px;
    }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .nav-link {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      margin-left: 4px;
    }
    .nav-link:hover { text-decoration: underline; }
    .nav-link.active { color: var(--text); font-weight: 600; }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .page-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .page-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .stats-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
    }
    .stats-row .stat { display: flex; gap: 6px; align-items: baseline; }
    .stats-row .stat .val { font-weight: 600; font-size: 16px; }
    .stats-row .stat .lbl { color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; font-size: 11px; }
    .stats-row .stat.accent .val { color: var(--accent); }
    .stats-row .stat.green .val { color: var(--green); }
    .stats-row .stat.muted .val { color: var(--text-muted); }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .pill {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .pill:hover { border-color: var(--accent); color: var(--accent); }
    .pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }
    .toolbar .spacer { flex: 1; }
    .toolbar .label {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: 6px;
      margin-right: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .toolbar select {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
    }

    .btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
      font-weight: 600;
    }
    .btn.btn-primary:hover { background: var(--accent-hover); color: var(--bg); }
    .btn.btn-danger:hover { border-color: var(--red); color: var(--red); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
    .btn.small { padding: 4px 10px; font-size: 12px; }

    .error {
      color: var(--red);
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .info {
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      font-size: 14px;
    }
    .info code {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      color: var(--accent);
    }

    /* Merge cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
      contain-intrinsic-size: 280px;
      content-visibility: auto;
      position: relative;
      outline: none;
    }
    .card.focused {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(74, 158, 255, 0.25);
    }
    .card.acting { opacity: 0.5; pointer-events: none; }
    .card.done {
      border-color: var(--green);
      background: rgba(74, 222, 128, 0.05);
    }
    .confidence {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .confidence.strong { background: rgba(74, 222, 128, 0.2); color: var(--green); }
    .confidence.probable { background: rgba(250, 204, 21, 0.18); color: var(--yellow); }
    .confidence.borderline { background: rgba(248, 113, 113, 0.18); color: var(--red); }
    .risk-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .risk-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(250, 204, 21, 0.1);
      color: var(--yellow);
      border: 1px solid rgba(250, 204, 21, 0.35);
    }
    .kbd {
      display: inline-block;
      font-family: "SF Mono", Consolas, monospace;
      font-size: 11px;
      padding: 1px 5px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom-width: 2px;
      border-radius: 3px;
      color: var(--text-muted);
    }
    .shortcuts-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: auto;
    }
    .shortcuts-hint .kbd { margin: 0 2px; }

    .card-row {
      display: grid;
      grid-template-columns: 1fr 56px 1fr;
      gap: 14px;
      align-items: stretch;
    }
    .side {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    .side.right { flex-direction: row-reverse; text-align: right; }
    .side .meta { flex: 1; min-width: 0; }
    .side .label {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 2px;
      word-break: break-word;
    }
    .side .label.person { color: var(--green); }
    .side .sublabel {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .face-strip {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4px;
      flex: none;
      width: 164px;
    }
    .face-strip .face-crop {
      width: 80px;
      height: 80px;
    }
    .face-crop {
      width: 110px;
      height: 110px;
      border-radius: var(--radius);
      object-fit: cover;
      flex: none;
      background: var(--surface2);
      border: 1px solid var(--border);
      cursor: pointer;
    }
    .face-crop.primary {
      width: 110px;
      height: 110px;
      grid-column: 1 / span 2;
      grid-row: 1;
    }
    .face-crop.missing {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 11px;
      cursor: default;
    }

    /* Photo preview popover — click a face crop to see the full photo with
       the bbox highlighted, so tight bboxes don't hide context */
    .preview-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 24px;
    }
    .preview-inner {
      max-width: 95vw;
      max-height: 90vh;
      position: relative;
    }
    .preview-inner img {
      max-width: 95vw;
      max-height: 90vh;
      border-radius: var(--radius);
      display: block;
    }
    .preview-close {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-caption {
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 8px;
      text-align: center;
    }
    .side-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .arrow {
      align-self: center;
      color: var(--text-muted);
      font-size: 22px;
      text-align: center;
      user-select: none;
    }
    .arrow.cluster-to-person { color: var(--green); }

    .scores {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }
    .scores .score { display: flex; align-items: baseline; gap: 4px; }
    .scores .score .val {
      color: var(--text);
      font-family: "SF Mono", Consolas, "Liberation Mono", monospace;
      font-weight: 600;
    }
    .scores .score .val.good { color: var(--green); }
    .scores .score .val.warn { color: var(--yellow); }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .status-tag {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .status-tag.accepted { background: rgba(74, 222, 128, 0.2); color: var(--green); }
    .status-tag.dismissed { background: rgba(136, 136, 136, 0.2); color: var(--text-muted); }

    @media (max-width: 720px) {
      .card-row { grid-template-columns: 1fr; }
      .arrow { justify-self: center; }
      .side.right { flex-direction: row; text-align: left; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="/shared.js"></script>
  <script>
    const { useState, useEffect, useCallback, useMemo } = React;
    const e = React.createElement;
    const API = '';

    // Dismissals persist in localStorage keyed by rep_face_id pair. rep_face_id
    // is stable across recluster-faces runs (AUTOINCREMENT, no reuse), so a
    // dismissal survives regenerations of the suggestions JSON.
    const DISMISS_KEY = 'photosearch:dismissed_merges:v1';

    function loadDismissed() {
      try {
        const raw = localStorage.getItem(DISMISS_KEY);
        if (!raw) return {};
        const parsed = JSON.parse(raw);
        return (parsed && typeof parsed === 'object') ? parsed : {};
      } catch (_) {
        return {};
      }
    }
    function saveDismissed(map) {
      try { localStorage.setItem(DISMISS_KEY, JSON.stringify(map)); } catch (_) {}
    }

    // Canonical key: sort the two rep_face_ids so (a, b) == (b, a).
    function pairKey(sug) {
      const lf = sug.left.rep_face_id || 0;
      const rf = sug.right.rep_face_id || 0;
      return lf < rf ? lf + ':' + rf : rf + ':' + lf;
    }

    function formatScore(x) {
      return (typeof x === 'number') ? x.toFixed(3) : '—';
    }
    function scoreClass(x, goodBelow, warnBelow) {
      if (typeof x !== 'number') return '';
      if (x < goodBelow) return 'good';
      if (x < warnBelow) return 'warn';
      return '';
    }

    // Confidence tiers — calibrated from the 2026-04-18 review batch where
    // 125 suggestions produced 15 FPs, all at min_pair ≥ 0.554. TPs were
    // all < 0.50 (top 12 named-person matches at 0.05–0.48).
    function confidenceTier(sug) {
      const m = sug.min_pair_dist;
      if (typeof m !== 'number') return { tier: 'probable', label: 'Probable' };
      if (m < 0.50) return { tier: 'strong', label: 'Strong' };
      if (m < 0.55) return { tier: 'probable', label: 'Probable' };
      return { tier: 'borderline', label: 'Borderline' };
    }

    // Risk signals — hints that a pair may be a false positive even if the
    // numeric scores pass the cutoff. Each returns a short badge label or ''.
    function riskBadges(sug) {
      const badges = [];
      const left = sug.left, right = sug.right;
      // Large "attractor" target cluster: many small tidy clusters can score
      // badly-low against a muddy 100+-face bucket via a single coincidental
      // pair. Flagged in the observed FP batch on clusters like #15, #423.
      if (right.type === 'cluster' && right.face_count >= 50 &&
          left.type === 'cluster' && left.face_count < 15) {
        badges.push('attractor risk');
      }
      // Cluster↔cluster with overlap spanning months across unrelated events
      // was a repeat offender in the FP batch (overlaps of 371–469 days).
      if (left.type === 'cluster' && right.type === 'cluster' &&
          typeof sug.shared_days === 'number' && sug.shared_days > 180) {
        badges.push('long overlap');
      }
      // Edge of DBSCAN's own eps — everything just above 0.55 is knife-edge
      // and over-represented in the observed FPs.
      if (typeof sug.min_pair_dist === 'number' && sug.min_pair_dist >= 0.55) {
        badges.push('edge score');
      }
      return badges;
    }
    function formatWhen(ts) {
      if (!ts) return '';
      try {
        const d = new Date(ts * 1000);
        return d.toLocaleString();
      } catch (_) { return ''; }
    }
    function formatOverlap(days) {
      if (days === null || days === undefined) return '—';
      if (days === 0) return 'same day';
      if (days === 1) return '1 day';
      if (days < 365) return days + ' days';
      const years = Math.round(days / 36.5) / 10;
      return years + 'y';
    }

    function faceCrop(faceId, label, onClick, extraClass) {
      if (!faceId) {
        return e('div', { className: 'face-crop missing' + (extraClass ? ' ' + extraClass : '') }, 'no crop');
      }
      return e('img', {
        className: 'face-crop' + (extraClass ? ' ' + extraClass : ''),
        src: API + '/api/faces/crop/' + faceId + '?size=220',
        alt: label || 'face',
        loading: 'lazy',
        onClick: onClick,
        title: 'Click to see the full photo',
      });
    }

    // Strip of up to 4 face crops per side. The first is the largest-bbox
    // face (rep); the rest are secondary so the user has fallback signal when
    // a single bbox is tight/off-center.
    function faceStrip(ids, label, onFaceClick) {
      const list = ids && ids.length ? ids : [];
      if (!list.length) {
        return e('div', { className: 'face-crop missing' }, 'no crops');
      }
      const children = [];
      for (let i = 0; i < Math.min(list.length, 4); i++) {
        children.push(faceCrop(
          list[i],
          label + ' #' + (i + 1),
          () => onFaceClick(list[i]),
          i === 0 ? 'primary' : '',
        ));
      }
      return e('div', { className: 'face-strip' }, ...children);
    }

    function groupUrl(side) {
      if (side.type === 'cluster') return '/faces?cluster_id=' + side.id;
      return '/faces?person_id=' + side.id;
    }

    // --------------------------------------------------------------------
    // One suggestion card
    // --------------------------------------------------------------------
    const MergeCard = React.forwardRef(function MergeCard(
      { sug, onAccept, onDismiss, onUndismiss, onPreview, status, busy, focused },
      cardRef,
    ) {
      const left = sug.left;
      const right = sug.right;
      const isDone = status === 'accepted' || status === 'dismissed';
      const conf = confidenceTier(sug);
      const risks = riskBadges(sug);

      // Prefer augmented sample_face_ids (up to 4 per side) over the single
      // rep_face_id. Falls back to [rep_face_id] if the server JSON wasn't
      // augmented (pre-upgrade suggestions file).
      const leftIds = (left.sample_face_ids && left.sample_face_ids.length)
        ? left.sample_face_ids
        : (left.rep_face_id ? [left.rep_face_id] : []);
      const rightIds = (right.sample_face_ids && right.sample_face_ids.length)
        ? right.sample_face_ids
        : (right.rep_face_id ? [right.rep_face_id] : []);

      return e('div', {
        ref: cardRef,
        tabIndex: focused ? 0 : -1,
        className: 'card'
          + (busy ? ' acting' : '')
          + (isDone ? ' done' : '')
          + (focused ? ' focused' : ''),
      },
        // Confidence tier is a large, always-visible signal — with 237 to
        // review, the user triages by color before reading scores.
        e('span', { className: 'confidence ' + conf.tier },
          conf.label + ' · ' + formatScore(sug.min_pair_dist)),
        isDone && e('div', { style: { textAlign: 'right', marginBottom: 6 } },
          e('span', { className: 'status-tag ' + status }, status),
        ),
        e('div', { className: 'card-row', style: { marginTop: 20 } },
          // Left side
          e('div', { className: 'side left' },
            faceStrip(leftIds, left.label, onPreview),
            e('div', { className: 'meta' },
              e('div', { className: 'label ' + (left.type === 'person' ? 'person' : '') }, left.label),
              e('div', { className: 'sublabel' },
                left.face_count + ' face' + (left.face_count !== 1 ? 's' : '') +
                (left.date_min ? ' · ' + left.date_min.slice(0, 10) + ' → ' + (left.date_max || '').slice(0, 10) : ''),
              ),
              e('div', { className: 'side-actions' },
                e('a', {
                  className: 'btn small', href: groupUrl(left), target: '_blank', rel: 'noopener',
                }, 'Open ↗'),
              ),
            ),
          ),
          // Arrow
          e('div', {
            className: 'arrow' + (right.type === 'person' ? ' cluster-to-person' : ''),
          }, right.type === 'person' ? '→' : '↔'),
          // Right side
          e('div', { className: 'side right' },
            faceStrip(rightIds, right.label, onPreview),
            e('div', { className: 'meta' },
              e('div', { className: 'label ' + (right.type === 'person' ? 'person' : '') }, right.label),
              e('div', { className: 'sublabel' },
                right.face_count + ' face' + (right.face_count !== 1 ? 's' : '') +
                (right.date_min ? ' · ' + right.date_min.slice(0, 10) + ' → ' + (right.date_max || '').slice(0, 10) : ''),
              ),
              e('div', { className: 'side-actions', style: { justifyContent: 'flex-end' } },
                e('a', {
                  className: 'btn small', href: groupUrl(right), target: '_blank', rel: 'noopener',
                }, 'Open ↗'),
              ),
            ),
          ),
        ),
        // Scores
        e('div', { className: 'scores' },
          e('div', { className: 'score' },
            e('span', null, 'min_pair'),
            e('span', { className: 'val ' + scoreClass(sug.min_pair_dist, 0.45, 0.60) },
              formatScore(sug.min_pair_dist)),
          ),
          e('div', { className: 'score' },
            e('span', null, 'centroid'),
            e('span', { className: 'val ' + scoreClass(sug.centroid_dist, 0.55, 0.80) },
              formatScore(sug.centroid_dist)),
          ),
          e('div', { className: 'score' },
            e('span', null, 'overlap'),
            e('span', { className: 'val' }, formatOverlap(sug.shared_days)),
          ),
        ),
        // Buttons
        risks.length > 0 && e('div', { className: 'risk-badges' },
          ...risks.map((r, i) => e('span', { key: i, className: 'risk-badge' }, r)),
        ),
        !isDone && e('div', { className: 'card-actions' },
          e('button', {
            className: 'btn btn-danger small',
            onClick: () => onDismiss(sug),
            disabled: busy,
          }, 'Dismiss'),
          e('button', {
            className: 'btn btn-primary small',
            onClick: () => onAccept(sug),
            disabled: busy,
          },
            right.type === 'person'
              ? 'Merge → ' + right.label
              : 'Merge clusters'),
        ),
        status === 'dismissed' && e('div', { className: 'card-actions' },
          e('button', {
            className: 'btn small',
            onClick: () => onUndismiss(sug),
          }, 'Undo dismiss'),
        ),
      );
    });

    // --------------------------------------------------------------------
    // Main app
    // --------------------------------------------------------------------
    // --------------------------------------------------------------------
    // Photo preview modal — shows the full photo for a face_id with the
    // bbox highlighted, so the user can see context when a tight bbox
    // hides whether it's really the right person.
    // --------------------------------------------------------------------
    function PhotoPreview({ faceId, onClose }) {
      const [detail, setDetail] = useState(null);
      const [loadErr, setLoadErr] = useState('');

      useEffect(() => {
        if (!faceId) return;
        setDetail(null); setLoadErr('');
        // Face detail lives on a face → photo join. Easiest route: fetch
        // face group-info? No — just hit /api/faces/{id}-like via a small
        // inline endpoint. We'll piggy-back on /api/photos/{id} once we know
        // the photo id, but we don't know it yet. Use /api/faces/crop to
        // get a crop (we already have it in the card) AND fetch the full
        // photo by walking through /api/faces/group/*/photos is overkill.
        // Simplest: a dedicated face-detail endpoint. For now fall back to
        // /api/faces/crop at a bigger size as the preview image.
        fetch(API + '/api/faces/face-detail/' + faceId)
          .then(r => r.ok ? r.json() : null)
          .then(data => { if (data) setDetail(data); else setLoadErr('not found'); })
          .catch(err => setLoadErr(err.message || 'error'));
      }, [faceId]);

      const onKey = useCallback((ev) => {
        if (ev.key === 'Escape') onClose();
      }, [onClose]);
      useEffect(() => {
        document.addEventListener('keydown', onKey);
        return () => document.removeEventListener('keydown', onKey);
      }, [onKey]);

      if (!faceId) return null;

      // Use the photo_id from detail to show the full thumbnail, with bbox
      // overlay if we have it. Fall back to an enlarged crop while detail
      // loads or if the endpoint doesn't exist yet (graceful).
      const imgSrc = detail && detail.photo_id
        ? API + '/api/photos/' + detail.photo_id + '/preview'
        : API + '/api/faces/crop/' + faceId + '?size=600';

      const bbox = detail && detail.bbox;
      const imgW = detail && detail.image_width;
      const imgH = detail && detail.image_height;

      return e('div', { className: 'preview-overlay', onClick: onClose },
        e('div', {
          className: 'preview-inner',
          onClick: (ev) => ev.stopPropagation(),
        },
          e('button', { className: 'preview-close', onClick: onClose }, '×'),
          e('div', { style: { position: 'relative' } },
            e('img', { src: imgSrc, alt: 'preview' }),
            bbox && imgW && imgH && e('div', {
              style: {
                position: 'absolute',
                left: (100 * bbox.left / imgW) + '%',
                top: (100 * bbox.top / imgH) + '%',
                width: (100 * (bbox.right - bbox.left) / imgW) + '%',
                height: (100 * (bbox.bottom - bbox.top) / imgH) + '%',
                border: '3px solid #4ade80',
                borderRadius: 4,
                boxShadow: '0 0 12px rgba(74,222,128,0.55)',
                pointerEvents: 'none',
              },
            }),
          ),
          e('div', { className: 'preview-caption' },
            detail && detail.filename
              ? detail.filename + (detail.date_taken ? ' · ' + detail.date_taken.slice(0, 10) : '')
              : (loadErr ? 'Loading failed — showing face crop only' : 'Loading…'),
          ),
        ),
      );
    }

    function App() {
      const [payload, setPayload] = useState(null);
      const [loading, setLoading] = useState(true);
      const [loadError, setLoadError] = useState('');
      const [typeFilter, setTypeFilter] = useState('all'); // all | to_person | to_cluster
      const [sort, setSort] = useState('min');             // min | faces_desc
      const [actedOn, setActedOn] = useState({});          // key → 'accepted'|'dismissed'
      const [busyKeys, setBusyKeys] = useState({});        // key → true
      const [apiError, setApiError] = useState('');
      const [dismissed, setDismissed] = useState(loadDismissed);
      const [previewFaceId, setPreviewFaceId] = useState(null);
      const [hideBorderline, setHideBorderline] = useState(false);
      const [focusIdx, setFocusIdx] = useState(0);
      const cardRefs = React.useRef([]);

      const reload = useCallback(() => {
        setLoading(true);
        setLoadError('');
        fetch(API + '/api/faces/suggestions')
          .then(r => {
            if (r.ok) return r.json();
            return r.json().then(data => { throw new Error(data && data.detail ? data.detail : 'HTTP ' + r.status); });
          })
          .then(data => { setPayload(data); setLoading(false); })
          .catch(err => { setLoadError(err.message || String(err)); setLoading(false); });
      }, []);

      useEffect(() => { reload(); }, [reload]);

      const rawSuggestions = (payload && payload.suggestions) || [];

      const annotated = useMemo(() => rawSuggestions.map(sug => {
        const key = pairKey(sug);
        const dismissedStatus = dismissed[key] ? 'dismissed' : null;
        const actedStatus = actedOn[key] || null;
        return { sug, key, status: actedStatus || dismissedStatus };
      }), [rawSuggestions, actedOn, dismissed]);

      const filtered = useMemo(() => {
        const pass = annotated.filter(({ sug, status }) => {
          if (status === 'accepted') return false;   // gone
          if (typeFilter === 'to_person' && sug.right.type !== 'person') return false;
          if (typeFilter === 'to_cluster' && sug.right.type !== 'cluster') return false;
          if (hideBorderline && typeof sug.min_pair_dist === 'number'
              && sug.min_pair_dist >= 0.55) return false;
          return true;
        });
        const sorted = pass.slice();
        if (sort === 'faces_desc') {
          sorted.sort((a, b) =>
            (b.sug.left.face_count + b.sug.right.face_count) -
            (a.sug.left.face_count + a.sug.right.face_count));
        } else {
          sorted.sort((a, b) => a.sug.min_pair_dist - b.sug.min_pair_dist);
        }
        return sorted;
      }, [annotated, typeFilter, sort, hideBorderline]);

      const counts = useMemo(() => {
        let toPerson = 0, toCluster = 0, accepted = 0, dism = 0;
        for (const { sug, status } of annotated) {
          if (status === 'accepted') { accepted++; continue; }
          if (status === 'dismissed') { dism++; continue; }
          if (sug.right.type === 'person') toPerson++;
          else toCluster++;
        }
        return { toPerson, toCluster, accepted, dismissed: dism, total: annotated.length };
      }, [annotated]);

      const setBusy = (key, val) => {
        setBusyKeys(prev => {
          const next = { ...prev };
          if (val) next[key] = true; else delete next[key];
          return next;
        });
      };

      const handleAccept = useCallback((sug) => {
        const key = pairKey(sug);
        setApiError('');
        setBusy(key, true);
        fetch(API + '/api/faces/merges', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            source: { type: sug.left.type, id: sug.left.id },
            target: { type: sug.right.type, id: sug.right.id },
          }),
        })
          .then(r => r.json().then(d => ({ ok: r.ok, data: d })))
          .then(({ ok, data }) => {
            setBusy(key, false);
            if (!ok) { setApiError(data && data.detail ? data.detail : 'Merge failed'); return; }
            setActedOn(prev => ({ ...prev, [key]: 'accepted' }));
          })
          .catch(err => {
            setBusy(key, false);
            setApiError(err.message || String(err));
          });
      }, []);

      const handleDismiss = useCallback((sug) => {
        const key = pairKey(sug);
        setDismissed(prev => {
          const next = { ...prev, [key]: Date.now() };
          saveDismissed(next);
          return next;
        });
      }, []);

      const handleUndismiss = useCallback((sug) => {
        const key = pairKey(sug);
        setDismissed(prev => {
          const next = { ...prev };
          delete next[key];
          saveDismissed(next);
          return next;
        });
      }, []);

      const clearDismissals = useCallback(() => {
        if (!confirm('Clear all ' + Object.keys(dismissed).length + ' local dismissals?')) return;
        setDismissed({});
        saveDismissed({});
      }, [dismissed]);

      // Keyboard review: J/↓ next, K/↑ prev, A/Enter accept focused card,
      // D dismiss focused card. Skips when a preview or text input is active.
      useEffect(() => {
        function onKey(ev) {
          if (previewFaceId) return;
          const tag = ev.target && ev.target.tagName;
          if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
          if (ev.metaKey || ev.ctrlKey || ev.altKey) return;

          if (ev.key === 'j' || ev.key === 'ArrowDown') {
            ev.preventDefault();
            setFocusIdx(i => Math.min(i + 1, Math.max(0, filtered.length - 1)));
          } else if (ev.key === 'k' || ev.key === 'ArrowUp') {
            ev.preventDefault();
            setFocusIdx(i => Math.max(0, i - 1));
          } else if (ev.key === 'a' || ev.key === 'Enter') {
            const entry = filtered[focusIdx];
            if (entry && !entry.status) {
              ev.preventDefault();
              handleAccept(entry.sug);
              setFocusIdx(i => Math.min(i + 1, Math.max(0, filtered.length - 1)));
            }
          } else if (ev.key === 'd') {
            const entry = filtered[focusIdx];
            if (entry && !entry.status) {
              ev.preventDefault();
              handleDismiss(entry.sug);
              setFocusIdx(i => Math.min(i + 1, Math.max(0, filtered.length - 1)));
            }
          } else if (ev.key === 'Escape') {
            setFocusIdx(-1);
          }
        }
        document.addEventListener('keydown', onKey);
        return () => document.removeEventListener('keydown', onKey);
      }, [filtered, focusIdx, handleAccept, handleDismiss, previewFaceId]);

      // When focusIdx changes, scroll the card into view.
      useEffect(() => {
        const ref = cardRefs.current[focusIdx];
        if (ref && ref.scrollIntoView) {
          ref.scrollIntoView({ block: 'center', behavior: 'smooth' });
        }
      }, [focusIdx]);

      // Reset focus when filter/sort shrinks the list
      useEffect(() => {
        if (focusIdx >= filtered.length) setFocusIdx(Math.max(0, filtered.length - 1));
      }, [filtered.length, focusIdx]);

      // --- Render ---
      return e(React.Fragment, null,
        e(PS.SharedHeader, { activePage: 'merges' }),
        e('div', { className: 'container' },
          e('div', { className: 'page-title' }, 'Face merge review'),
          e('div', { className: 'page-subtitle' },
            'Suggestions from ',
            e('code', null, 'photosearch suggest-face-merges'),
            payload && payload.generated_at ? ' · generated ' + formatWhen(payload.generated_at) : '',
          ),

          apiError && e('div', { className: 'error' }, apiError),

          loading && e('div', { className: 'info' }, 'Loading suggestions…'),

          !loading && loadError && e('div', { className: 'info' },
            loadError,
            e('div', { style: { marginTop: 12 } },
              'Run ',
              e('code', null, 'docker compose -f docker-compose.nas.yml run --rm photosearch ' +
                'suggest-face-merges --json-out /data/suggestions.json'),
              ' on the NAS, then reload this page.',
            ),
          ),

          !loading && !loadError && payload && e(React.Fragment, null,
            e('div', { className: 'stats-row' },
              e('div', { className: 'stat accent' },
                e('span', { className: 'val' }, counts.toPerson + counts.toCluster),
                e('span', { className: 'lbl' }, 'pending'),
              ),
              e('div', { className: 'stat' },
                e('span', { className: 'val' }, counts.toPerson),
                e('span', { className: 'lbl' }, '→ person'),
              ),
              e('div', { className: 'stat' },
                e('span', { className: 'val' }, counts.toCluster),
                e('span', { className: 'lbl' }, '↔ cluster'),
              ),
              e('div', { className: 'stat green' },
                e('span', { className: 'val' }, counts.accepted),
                e('span', { className: 'lbl' }, 'accepted'),
              ),
              e('div', { className: 'stat muted' },
                e('span', { className: 'val' }, counts.dismissed),
                e('span', { className: 'lbl' }, 'dismissed'),
              ),
              e('div', { className: 'stat muted' },
                e('span', { className: 'val' }, counts.total),
                e('span', { className: 'lbl' }, 'total'),
              ),
            ),

            e('div', { className: 'toolbar' },
              e('button', {
                className: 'pill' + (typeFilter === 'all' ? ' active' : ''),
                onClick: () => setTypeFilter('all'),
              }, 'All'),
              e('button', {
                className: 'pill' + (typeFilter === 'to_person' ? ' active' : ''),
                onClick: () => setTypeFilter('to_person'),
              }, '→ Person (' + counts.toPerson + ')'),
              e('button', {
                className: 'pill' + (typeFilter === 'to_cluster' ? ' active' : ''),
                onClick: () => setTypeFilter('to_cluster'),
              }, '↔ Cluster (' + counts.toCluster + ')'),
              e('button', {
                className: 'pill' + (hideBorderline ? ' active' : ''),
                onClick: () => setHideBorderline(v => !v),
                title: 'Hide borderline (min_pair ≥ 0.55) — the band where FPs concentrated in prior reviews',
              }, hideBorderline ? 'Strict ✓' : 'Strict'),
              e('div', { className: 'spacer' }),
              e('span', { className: 'label' }, 'Sort'),
              e('select', {
                value: sort, onChange: (ev) => setSort(ev.target.value),
              },
                e('option', { value: 'min' }, 'min_pair (closest first)'),
                e('option', { value: 'faces_desc' }, 'combined face count'),
              ),
              e('button', { className: 'btn small', onClick: reload }, 'Reload'),
              counts.dismissed > 0 && e('button', {
                className: 'btn small', onClick: clearDismissals,
              }, 'Clear dismissals'),
            ),
            e('div', { className: 'shortcuts-hint', style: { marginBottom: 14 } },
              e('span', { className: 'kbd' }, 'J'), '/', e('span', { className: 'kbd' }, '↓'), ' next ',
              e('span', { className: 'kbd' }, 'K'), '/', e('span', { className: 'kbd' }, '↑'), ' prev ',
              e('span', { className: 'kbd' }, 'A'), ' accept ',
              e('span', { className: 'kbd' }, 'D'), ' dismiss ',
              e('span', { className: 'kbd' }, 'Esc'), ' blur',
            ),

            filtered.length === 0
              ? e('div', { className: 'info' },
                  counts.total === 0
                    ? 'No suggestions in the JSON file.'
                    : 'Nothing pending under the current filter.')
              : filtered.map(({ sug, key, status }, idx) =>
                  e(MergeCard, {
                    key: key,
                    sug: sug,
                    status: status,
                    busy: !!busyKeys[key],
                    focused: idx === focusIdx,
                    ref: (el) => { cardRefs.current[idx] = el; },
                    onAccept: handleAccept,
                    onDismiss: handleDismiss,
                    onUndismiss: handleUndismiss,
                    onPreview: setPreviewFaceId,
                  })),
          ),
        ),
        previewFaceId && e(PhotoPreview, {
          faceId: previewFaceId,
          onClose: () => setPreviewFaceId(null),
        }),
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(e(App));
  </script>
</body>
</html>
